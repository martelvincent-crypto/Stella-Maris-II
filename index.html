aints": [{"text": "« Veillez donc, car vous ne savez pas quel jour votre Seigneur vient. »", "author": "Mt 24, 42"}, {"text": "« […] Jésus désire avoir sa Mère corps et âme, dans la Gloire. Et la Cour céleste déploie toute sa Splendeur pour accueillir Notre Dame. Toi et moi qui ne sommes, après tout, que des enfants, nous prenons la traîne du magnifique manteau bleu de Marie et ainsi nous pouvons contempler cette scène merveilleuse. »", "author": "Saint José-Maria Escriva de Balaguer"}, {"text": "« Chacun doit garder à l’esprit la perspective de la mort et doit être prêt à se présenter devant le Seigneur. »", "author": "Saint Jean-Paul II"}, {"text": "« Au Ciel, notre cœur sera tellement perdu, noyé dans le bonheur d’aimer Dieu, que nous ne nous occuperons ni de nous, ni des autres, mais de Dieu seul »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}], "vertus": [{"label": "L’humilité et le renoncement à toute ambition déréglée", "citation": "« Mange de la paille, porte de la paille, couche sur la paille, c’est-à-dire : fais fi de toutes choses, et acquiers un cœur d’acier »", "author": "Euprépios", "rest": ""}, {"label": "Le désir sincère et ardent de la sainteté", "citation": "« Ils sont des avares spirituels ceux qui se nourrissent de beaucoup d’actes de piété pour obtenir plus rapidement la perfection, comme ils disent ; comme si la perfection consistait dans la réalisation de beaucoup de choses et non dans la perfection avec laquelle nous les faisons. Dieu n’a pas mis la perfection dans la multiplicité des actes que nous devons faire pour lui plaire, mais dans la manière de les faire ; pas autre chose que de faire le peu que devons faire suivant notre vocation, c’est-à-dire dans l’amour, par l’amour et pour l’amour. »", "author": "Saint François de Sales", "rest": ""}, {"label": "La totale confiance en l’intercession de Marie", "citation": "« Souvenez-vous, ô très miséricordieuse Vierge Marie, qu'on n'a jamais entendu dire qu'aucun de ceux qui ont eu recours à votre protection ait été abandonné »", "author": "Saint Bernard de Clairvaux", "rest": ""}, {"label": "Crains et n’aie pas honte", "citation": "« Honte et manque de crainte apportent souvent le péché »", "author": "Sisoès", "rest": ""}], "graces": [{"label": "La grâce de trouver en Marie le phare de notre vie", "citation": "« Si les vents de la tentation se lèvent… regarde l'étoile, appelle Marie » (Saint Bernard de Clairvaux, Homélies à la louange de la Vierge Mère, IIe homélie — le « Respice stellam, voca Mariam »).", "author": null, "rest": ", l’ancre de notre âme, la mesure de notre sainteté."}, {"label": "La grâce de trouver en notre Mère le réconfort d’un amour sans limite", "citation": "« Femme, voici ton fils… Voici ta mère. »", "author": "Jn 19, 26-27", "rest": ""}, {"label": "La grâce d’éprouver la tendresse de la Sainte Vierge Marie", "citation": null, "author": null, "rest": ", et la crainte de ne pas lui être suffisamment dévoué."}, {"label": "Trouver dans nos larmes l’occasion de se tourner vers Marie", "citation": "« Toutes les fois que quelqu’un éclate de pleurs, dans le milieu de la foule ou dans la solitude, c’est elle-même qui pleure, parce que toutes les larmes lui appartiennent en sa qualité d’Impératrice de la Béatitude et de l’Amour. Quand Marie pleure sur nous, ses Larmes sont un véritable déluge universel du Sang divin, dont elle est la Dispensatrice souveraine, et cette effusion est en même temps la plus parfaite de toutes les oblations. Comme elle est la seule Mère selon la Grâce qui ait le pouvoir de le faire adorer à l’innombrable multitude de ses autres enfants par la seule vertu de ses larmes. »", "author": "Léon Bloy", "rest": ""}], "peches": [{"label": "La jalousie ou l’envie devant la gloire d’autrui", "citation": "« Nous serons donc ambidextres lorsque nous serons toujours les mêmes, dans l’abondance ou dans la privation des choses présentes, lorsque nous ne nous laisserons pas aller au relâchement dans le bonheur, ni au découragement et à la plainte dans l’adversité ; mais que nous rendrons toujours également grâces à Dieu dans les biens et dans les maux »", "author": "Théodore", "rest": ""}, {"label": "La tiédeur et la négligence dans la dévotion mariale", "citation": "« De Maria numquam satis »", "author": "de Marie, on n'en dira jamais assez", "rest": ""}, {"label": "Le désespoir de sa propre sainteté", "citation": "« Plus l’homme approche de Dieu, plus il se voit pécheur »", "author": "Matoés", "rest": ""}, {"label": "Oublier la mort et le jugement (la bonne mort)", "citation": "« Va, conforme ta pensée à celle des malfaiteurs qui sont en prison. Car ils demandent constamment aux hommes où est le juge, quand il viendra, et ils pleurent à l’attendre. Ainsi, le moine doit-il en tout temps être préoccupé et blâmer son âme en disant : Malheur à moi ! Comment me tiendrai-je au tribunal du Christ ? Comment me défendrai-je devant lui ? Si tu t’exerces ainsi continuellement, tu peux être sauvé »", "author": "Abbé Ammonas", "rest": ""}, {"label": "La modestie et la repentance", "citation": "« Je préfère le pécheur qui sait qu’il a péché et qui se repent à celui qui se considère comme pratiquant la justice »", "author": "Sarmatas", "rest": ""}], "clausules": {"courte": "Et Jésus, qui t’élève corps et âme dans sa gloire", "longue": ["Et Jésus, qui nous a donné sa mère, est béni.", "Et Jésus, qui te préserve de la corruption du tombeau, est béni.", "Et Jésus, qui t’élève corps et âme dans sa gloire, est béni.", "Et Jésus, qui te fait entrer dans la joie du Père, est béni.", "Et Jésus, à qui tu chantes pour toujours ton amour, est béni.", "Et Jésus, qui t’élève au-dessus des anges, est béni.", "Et Jésus, qui fait de ton assomption un signe d’espérance pour tous les hommes, est béni.", "Et Jésus, qui tourne nos désirs vers les réalités éternelles, est béni.", "Et Jésus, qui nous ressuscitera tous à la fin des temps, est béni.", "Et Jésus, qui donne la vie éternelle, est béni."]}}, {"n": "V", "title": "Le couronnement de la Vierge Marie", "fruit": "La persévérance finale et la confiance en Marie", "parole": {"text": "Un signe grandiose apparut dans le ciel : une Femme, ayant le soleil pour manteau, la lune sous les pieds, et sur la tête une couronne de douze étoiles » (Ap 12, 1).", "ref": ""}, "histo": [], "comm": [{"t": "p", "x": "Le couronnement de la Vierge Marie au ciel révèle sa place unique en tant que \" Femme de l’Alliance \", triomphante sur le péché et la mort, et pleinement associée au règne du Christ. Ce symbole riche de sens exprime à la fois ses noces spirituelles parfaites avec Dieu, sa vie immortelle dans la gloire, et la gratitude profonde de Jésus et des croyants envers celle qui dispense tant de grâces."}, {"t": "p", "x": "Comprendre la richesse du symbolisme de la couronne, c’est aussi comprendre la richesse du couronnement de la Vierge Marie."}, {"t": "p", "x": "La couronne est le symbole des noces : en Orient, les mariés portent une couronne (Voir ci-contre les mariés sur la miniature des noces de Cana). La Vierge Marie est la \" Femme de l’Alliance \", son couronnement au ciel exprime que ses noces avec le Seigneur Dieu ont été parfaites, vécues en plénitude."}, {"t": "p", "x": "La couronne est aussi symbole de triomphe, de victoire, comme on peut le voir d’une façon générale dans le Nouveau Testament (Jc 1,12 ; 1 Pt 5,4 ; 1 Co 9,25 ; Ph 4,1) et dans l’Apocalypse en particulier (Ap 3,11 ; 4,4.10 ; 6,2 ; 14,14). Le couronnement de Marie marque son triomphe sur toutes les forces destructrices du péché et de la mort, pendant toute sa vie et à l’heure de la Passion de son Fils."}, {"t": "p", "x": "Le couronnement de Marie au ciel signifie que Marie prend part au règne du Christ. Elle s’est désignée « je suis la servante du Seigneur » (Lc 1, 38), et servir c’est régner."}, {"t": "p", "x": "C’est en particulier une couronne de vie et d’immortalité (Ap 2, 11). La bienheureuse mère de Dieu vit dans la gloire et son couronnement signifie que Marie au ciel est intensément vivante, aimante, agissante, jubilante."}, {"t": "p", "x": "Le couronnement est un geste de gratitude : gratitude de Jésus envers sa mère ; gratitude des hommes envers Marie pleine de grâce qui savent combien elle leur a obtenu de grâces."}], "saints": [{"text": "« Je vous choisis, aujourd’hui ô Marie, en présence de toute la cour céleste, pour ma Mère et ma Reine. Je vous livre et consacre, en toute soumission et amour, mon corps et mon âme, mes biens intérieurs et extérieurs, et la valeur même de mes bonnes actions passées, présentes et futures, vous laissant un entier et plein droit de disposer de moi, et de tout ce qui m’appartient, sans exception, selon votre bon plaisir, à la plus grande Gloire de Dieu, dans le temps et l’éternité. Amen. »", "author": null}, {"text": "", "author": "Saint Louis-Marie Grignion de Montfort"}], "vertus": [{"label": "Modèle de vertu", "citation": null, "author": null, "rest": " : Marie, couronnée de gloire, est un modèle de vertu et de sainteté pour tous les croyants."}, {"label": "Renforcement de la foi", "citation": null, "author": null, "rest": " : en priant sur ce mystère, nous approfondissons notre compréhension de la glorification de Marie, renforçant ainsi notre foi."}, {"label": "Espérance et joie", "citation": null, "author": null, "rest": " : cette prière nous inspire à vivre avec espérance et joie, sachant que Marie intercède pour nous auprès de son fils."}, {"label": "S’identifier à Marie", "citation": null, "author": null, "rest": " : nous nous identifions plus profondément avec Marie, trouvant en elle un modèle de foi et de vertu."}, {"label": "La persévérance finale", "citation": "« Il faut avoir un cœur grand et de longue haleine : les grandes choses ne se font qu’à force de temps et de patience. Ce qui croît en un jour meurt en un autre. »", "author": "Saint François de Sales", "rest": ""}, {"label": "Travailler (le paresseux et la vigne)", "citation": "« J’ai passé près du champ d’un paresseux, et près de la vigne d’un insensé. Et voici,… les épines y croissaient partout, les ronces en couvraient la surface, et le mur de pierres était écroulé. J’ai regardé, et j’ai appliqué mon cœur, j’ai considéré et j’ai tiré cette leçon : « Un peu de sommeil, un peu d’assoupissement, un peu croiser les mains pour dormir, et ta pauvreté viendra comme un rôdeur, et ton indigence comme un homme armé. »", "author": "Proverbes 24, 30-34", "rest": ""}, {"label": "La modestie (ne pas prendre les devants)", "citation": "« Si tu veux être sauvé, quand tu vas chez quelqu’un, ne prends pas les devants pour parler avant qu’on t’interroge »", "author": "Euprépios", "rest": ""}, {"label": "L’éparpillement évité – faire peu, mais bien", "citation": "« Maintenant, au séminaire, on nous envoie des enfants de chœur, des petits va-nu-pieds, qui s’imaginent travailler plus que tout autre parce qu’ils ne viennent à bout de rien ».", "author": null, "rest": ""}], "graces": [{"label": "Consolation et confiance", "citation": null, "author": null, "rest": " : en méditant sur le Couronnement de Marie, nous trouvons consolation et confiance dans l’intercession puissante de notre mère céleste."}, {"label": "Persévérer à travers la nuit (du sensible à l’esprit)", "citation": "« Il faut de la patience et de l’humilité sur ce chemin. Il se peut bien que dans les débuts l’on ait une relation très forte avec le Seigneur, presque immédiate et l’on a l’impression que lui et nous c’est tout un. Le temps passant, ces expériences deviennent moins fortes, moins sensibles et l’on croit que Dieu s’éloigne de nous ou que l’on s’éloigne de lui, sans qu’il y ait de faute apparente de notre part. Parfois cela peut aller jusqu’au désespoir. En fait nous nous heurtons à un faux problème car c’est à ce niveau de la relation que le Seigneur nous attend, mais il veut nous emmener plus loin et nous aider à passer du sensible à l’esprit, car il est Esprit. »", "author": "Sainte Thérèse d’Avila", "rest": ""}], "peches": [{"label": "Fuir l’effort et le labeur (le relâchement final)", "citation": "« Il faut beaucoup de labeur : s’il n’y a pas de labeur, on ne peut avoir son Dieu, car lui a été crucifié pour nous »", "author": "Héraclios", "rest": ""}], "clausules": {"courte": "Et Jésus, qui te couronne reine du Ciel.", "longue": ["Et Jésus, qui te couronne reine du Ciel, est béni.", "Et Jésus, qui fait de toi la reine des apôtres, est béni.", "Et Jésus, qui fait de toi la reine des martyrs, est béni.", "Et Jésus, qui fait de toi la reine des vierges, est béni.", "Et Jésus, qui fait de toi la reine de tous les saints, est béni.", "Et Jésus, qui fait de toi la reine de l’Église, est béni.", "Et Jésus, qui fait de toi le secours des chrétiens, est béni.", "Et Jésus, qui fait de toi la consolatrice des affligés, est béni.", "Et Jésus, qui fait de toi le refuge des pécheurs, est béni.", "Et Jésus, qui fait de toi la médiatrice de toutes grâces, est béni"]}}]}]};
const STORE_KEY="rosaire_stella_overrides_v1";

/* ---------- persistence ---------- */
let STORE={overrides:{}};
let storageOK=true;
try{const raw=localStorage.getItem(STORE_KEY); if(raw) STORE=JSON.parse(raw);}catch(e){storageOK=false;}
function saveStore(){ try{localStorage.setItem(STORE_KEY,JSON.stringify(STORE));}catch(e){storageOK=false;} }

/* ---------- effective data ---------- */
function mid(key,n){return key+"/"+n;}
function clone(o){return JSON.parse(JSON.stringify(o));}
const baseIndex={};
BASE.series.forEach(s=>s.mysteres.forEach(m=>baseIndex[mid(s.key,m.n)]=m));
function effMystery(key,n){ const id=mid(key,n); return STORE.overrides[id]?STORE.overrides[id]:baseIndex[id]; }
function effSeries(){ return BASE.series.map(s=>({key:s.key,name:s.name,subtitle:s.subtitle,
  mysteres:s.mysteres.map(m=>effMystery(s.key,m.n))})); }
const seriesByKey=Object.fromEntries(BASE.series.map(s=>[s.key,s]));

/* ---------- emblem ---------- */

  <g fill="none" stroke="var(--acc-strong)" stroke-width="1"><circle cx="50" cy="50" r="34" opacity=".45"/><circle cx="50" cy="50" r="27" opacity=".25"/></g>
  <g class="twinkle"><polygon points="50,6 56,44 94,50 56,56 50,94 44,56 6,50 44,44" fill="var(--acc-strong)" opacity=".95"/>
  <polygon points="50,18 53,47 82,50 53,53 50,82 47,53 18,50 47,47" fill="var(--acc)"/>
  <g stroke="var(--acc-strong)" stroke-width="1" opacity=".7"><line x1="50" y1="50" x2="71" y2="29"/><line x1="50" y1="50" x2="29" y2="29"/><line x1="50" y1="50" x2="71" y2="71"/><line x1="50" y1="50" x2="29" y2="71"/></g>
  <circle cx="50" cy="50" r="3.4" fill="var(--text)"/></g></svg>`;}

const DAY_SERIES={0:"Glorieux",1:"Joyeux",2:"Douloureux",3:"Glorieux",4:"Lumineux",5:"Douloureux",6:"Joyeux"};
const DAY_NAMES={0:"dimanche",1:"lundi",2:"mardi",3:"mercredi",4:"jeudi",5:"vendredi",6:"samedi"};
const MODE_DESC={rapide:"L’essentiel : la Parole, le fruit, une vertu, une grâce, un péché, une clausule.",
  intermediaire:"On y ajoute les paroles des saints et des Pères.",
  complet:"Tout le mystère : historique, commentaires, et toutes les clausules d’un seul tenant."};
const STEP_EYEBROW={vertu:"Une vertu à demander",grace:"Une grâce à implorer",peche:"Un péché à combattre",
  saints:"Paroles des saints et des Pères",histo:"Histoire & contexte",comm:"Méditation"};

const CUSTOM_DESC={clausCourtesAll:"Toutes les clausules courtes, une par mystère, réunies sur une seule page.",clausLongues:"Les dix clausules longues de chaque mystère, une page par mystère.",customVGP:"Par mystère : une vertu, une grâce, un péché, puis la clausule."};
const state={selected:new Set(),mode:"rapide",custom:null,flow:[],idx:0};
state.selected.add(DAY_SERIES[new Date().getDay()]);
const stagesEl=document.getElementById("stages");
const topEl=document.getElementById("top");
const editorEl=document.getElementById("editor");
const toastEl=document.getElementById("toast");

function el(html){const d=document.createElement("div");d.innerHTML=html.trim();return d.firstElementChild;}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function toast(msg){toastEl.textContent=msg;toastEl.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>toastEl.classList.remove("show"),1800);}

/* =================== HOME =================== */

  editorEl.classList.remove("show");
  state.flow=[];APP.swipe=null;APP.lock(false);updateProg();
  stagesEl.innerHTML="";topEl.innerHTML="";topEl.classList.add("on-dark");
  const hb=el(`<button>‹ Accueil</button>`);hb.onclick=e=>{e.stopPropagation();showHub();};topEl.appendChild(hb);
  const day=DAY_NAMES[new Date().getDay()];
  const sugg=seriesByKey[DAY_SERIES[new Date().getDay()]].name.toLowerCase();
  const stage=el(`<div class="stage dark show"><div class="home-inner"></div></div>`);

  inner.appendChild(el(`<div class="today">Nous sommes ${day} — l’Église médite volontiers les <b>${sugg}</b>.</div>`));
  const cards=el(`<div class="cards"></div>`);

    const c=el(`<div class="card ${state.selected.has(s.key)?'sel':''}"><div class="ck">✦</div><div class="cn">${s.name}</div><div class="cs">${s.subtitle}</div></div>`);
    c.onclick=()=>{state.selected.has(s.key)?state.selected.delete(s.key):state.selected.add(s.key);renderHome();};
    cards.appendChild(c);
  });
  inner.appendChild(cards);
  const whole=el(`<div class="whole ${state.selected.size===4?'sel':''}"><span class="box"></span> Prier le rosaire entier</div>`);
  whole.onclick=()=>{ if(state.selected.size===4)state.selected.clear(); else BASE.series.forEach(s=>state.selected.add(s.key)); renderHome(); };
  inner.appendChild(whole);
  const modes=el(`<div class="modes"></div>`);
  [["rapide","Rapide"],["intermediaire","Intermédiaire"],["complet","Complet"]].forEach(([k,lbl])=>{
    const b=el(`<button class="${state.mode===k?'on':''}">${lbl}</button>`);b.onclick=()=>{state.mode=k;state.custom=null;renderHome();};modes.appendChild(b);});
  if(state.custom)modes.style.opacity=".45";inner.appendChild(modes);
  inner.appendChild(el(`<div class="mode-desc">${state.custom?CUSTOM_DESC[state.custom]:MODE_DESC[state.mode]}</div>`));
  const cwrap=el(`<div class="customsel"></div>`);
  cwrap.appendChild(el(`<div class="cs-title">Custom — configurations particulières</div>`));
  const crow=el(`<div class="crow"></div>`);
  [["clausCourtesAll","Clausules courtes"],["clausLongues","Clausules longues"],["customVGP","Vertu · grâce · péché + clausule"]].forEach(([k,lbl])=>{
    const b=el(`<button class="${state.custom===k?'on':''}">${lbl}</button>`);
    b.onclick=()=>{state.custom=(state.custom===k?null:k);renderHome();};
    crow.appendChild(b);
  });
  cwrap.appendChild(crow);inner.appendChild(cwrap);
  const begin=el(`<button class="begin" ${state.selected.size?'':'disabled'}>Commencer</button>`);
  begin.onclick=start;inner.appendChild(begin);
  const links=el(`<div class="linkrow"><button class="tlink">✎ Personnaliser les mystères</button></div>`);
  links.querySelector("button").onclick=openEditor;

}

/* =================== FLOW =================== */
function buildCustomFlow(chosen){
  const steps=[];
  if(state.custom==="clausCourtesAll"){ steps.push({type:"clausCourtesAll",groups:chosen}); }
  else if(state.custom==="clausLongues"){ chosen.forEach(s=>s.mysteres.forEach(m=>steps.push({type:"clausLongues",m,series:s}))); }
  else if(state.custom==="customVGP"){ chosen.forEach(s=>s.mysteres.forEach(m=>{ const v=m.vertus.length?rnd(m.vertus):null,g=m.graces.length?rnd(m.graces):null,p=m.peches.length?rnd(m.peches):null; steps.push({type:"customVGP",m,series:s,v,g,p}); })); }
  steps.push({type:"closing"});
  return steps;
}
function buildFlow(){
  const steps=[];
  const chosen=effSeries().filter(s=>state.selected.has(s.key));
  if(state.custom) return buildCustomFlow(chosen);
  chosen.forEach(s=>{
    steps.push({type:"series",series:s});
    s.mysteres.forEach(m=>{
      const v=m.vertus.length?rnd(m.vertus):null, g=m.graces.length?rnd(m.graces):null, p=m.peches.length?rnd(m.peches):null;
      steps.push({type:"parole",m,series:s});
      if(state.mode==="complet" && m.histo.length) steps.push({type:"histo",m,series:s});
      if(state.mode==="complet" && m.comm.length) steps.push({type:"comm",m,series:s});
      if(state.mode!=="rapide" && m.saints.length) steps.push({type:"saints",m,series:s});
      if(v) steps.push({type:"vertu",m,series:s,item:v});
      if(g) steps.push({type:"grace",m,series:s,item:g});
      if(p) steps.push({type:"peche",m,series:s,item:p});
      steps.push({type:"clausule",m,series:s});
    });
  });
  steps.push({type:"closing"});
  return steps;
}
function customProgress(){const cur=state.flow[state.idx];const same=state.flow.filter(x=>x.type===cur.type);return {pos:same.indexOf(cur),total:same.length};}
function addCustomBeads(stage){const {pos,total}=customProgress();if(total>1){const b=el(`<div class="beads"></div>`);for(let k=0;k<total;k++)b.appendChild(el(`<div class="bead ${k<=pos?'on':''}"></div>`));stage.appendChild(b);}}
function start(){state.flow=buildFlow();state.idx=0;renderStep(1);APP.lock(true);APP.swipe=d=>{d>0?advance():goBack();};}
function mysteryStepInfo(i){const f=state.flow,cur=f[i];if(!cur||!cur.m)return null;
  let s=i;while(s>0&&f[s-1].m===cur.m&&f[s-1].type!=="series")s--;
  let e=i;while(e+1<f.length&&f[e+1].m===cur.m)e++;return {pos:i-s,total:e-s+1};}
function fmtItem(it){let h="";
  const lab=it.label?`<b style="font-weight:600">${esc(it.label)}</b>${it.rest?`<span class="restx">${esc(it.rest)}</span>`:""}`:"";
  if(it.label&&it.citation){h+=`<div class="plain" style="margin-bottom:.2rem">${lab}</div><div class="citation">${esc(it.citation)}</div>`;}
  else if(it.citation){h+=`<div class="citation">${esc(it.citation)}</div>`;}
  else{h+=`<div class="plain">${lab}</div>`;}
  if(it.author)h+=`<div class="author">${esc(it.author)}</div>`;return h;}
function blocksHtml(bl){return bl.map(b=>b.t==="h"?`<div class="ph">${esc(b.x)}</div>`:b.t==="s"?`<div class="sh">${esc(b.x)}</div>`:`<p>${esc(b.x)}</p>`).join("");}

function renderStep(dir){
  const cur=state.flow[state.idx];let stage;
  if(cur.type==="series"){
    stage=el(`<div class="stage dark tap"><div style="display:flex;flex-direction:column;align-items:center;gap:1.2rem">${emblem('spin')}<div class="eyebrow">Nous entrons dans les</div><div class="series-name">${esc(cur.series.name)}</div><div class="series-sub">— ${esc(cur.series.subtitle)} —</div></div><div class="hint">Toucher pour avancer · glisser pour naviguer</div></div>`);
  }else if(cur.type==="closing"){
    stage=el(`<div class="stage dark tap"><div style="display:flex;flex-direction:column;align-items:center;gap:.6rem">${emblem('sm twinkle')}<div class="latin">Sub tuum praesidium confugimus,<br>sancta Dei Genetrix.</div><div class="fr">Sous l’abri de ta miséricorde, nous nous réfugions, sainte Mère de Dieu. Bonne Mère, veille sur ceux qui prennent la mer et sur ceux qui rentrent au port.</div><div class="amen">Amen</div></div><div class="hint">Toucher pour revenir au seuil</div></div>`);
  }else if(cur.type==="parole"){const m=cur.m;
    stage=el(`<div class="stage tap"><div class="lead"><div class="eyebrow">${esc(cur.series.name)} · ${esc(m.n)}</div><div class="myst-title">${esc(m.title)}</div>${m.fruit?`<div class="fruit"><b>Fruit du mystère</b>${esc(m.fruit)}</div>`:""}<div class="parole"><div class="verse">${esc(m.parole.text)}</div>${m.parole.ref?`<div class="ref">${esc(m.parole.ref)}</div>`:""}</div></div></div>`);
  }else if(cur.type==="histo"||cur.type==="comm"){
    stage=el(`<div class="stage tap"><div style="width:100%;display:flex;flex-direction:column;align-items:center"><div class="eyebrow">${STEP_EYEBROW[cur.type]} · ${esc(cur.m.title)}</div><div class="scroll">${blocksHtml(cur.type==="histo"?cur.m.histo:cur.m.comm)}</div></div></div>`);
  }else if(cur.type==="saints"){
    const list=cur.m.saints.map(s=>`<div class="saint"><div class="q">${esc(s.text)}</div>${s.author?`<div class="a">— ${esc(s.author)}</div>`:""}</div>`).join("");
    stage=el(`<div class="stage tap"><div style="width:100%;display:flex;flex-direction:column;align-items:center"><div class="eyebrow">${STEP_EYEBROW.saints}</div><div class="saints">${list}</div></div></div>`);
  }else if(cur.type==="vertu"||cur.type==="grace"||cur.type==="peche"){
    stage=el(`<div class="stage tap"><div class="lead"><div class="eyebrow">${STEP_EYEBROW[cur.type]}</div>${fmtItem(cur.item)}</div></div>`);
  }else if(cur.type==="clausule"){const c=cur.m.clausules;
    let body=`<div class="clausule-courte">${esc(c.courte)}</div>`;
    if(state.mode==="complet"&&c.longue&&c.longue.length){body+=`<div class="clausule-list">${c.longue.map(x=>`<div class="c">${esc(x)}</div>`).join("")}</div>`;}
    stage=el(`<div class="stage tap"><div class="clausules"><div class="eyebrow">Clausule${state.mode==="complet"?"s":""}</div>${body}</div></div>`);
  }
  else if(cur.type==="clausCourtesAll"){
    let html="";
    cur.groups.forEach(s=>{ html+=`<div class="cc-serie">${esc(s.name)}</div>`;
      s.mysteres.forEach(m=>{ html+=`<div class="cc-item"><div class="cc-myst">${esc(m.n)}. ${esc(m.title)}</div><div class="cc-claus">${esc(m.clausules.courte)}</div></div>`; }); });
    stage=el(`<div class="stage tap"><div style="width:100%;display:flex;flex-direction:column;align-items:center"><div class="eyebrow">Clausules — les mystères choisis</div><div class="scroll" style="max-width:44rem">${html}</div></div></div>`);
  }
  else if(cur.type==="clausLongues"){const c=cur.m.clausules;
    const body=`<div class="clausule-list">${(c.longue||[]).map(x=>`<div class="c">${esc(x)}</div>`).join("")}</div>`;
    stage=el(`<div class="stage tap"><div style="width:100%;display:flex;flex-direction:column;align-items:center"><div class="eyebrow">${esc(cur.series.name)} · ${esc(cur.m.n)} — clausules</div><div class="myst-title" style="font-size:1.6rem;margin-bottom:1rem">${esc(cur.m.title)}</div><div class="clausules">${body}</div></div></div>`);
    addCustomBeads(stage);
  }
  else if(cur.type==="customVGP"){const m=cur.m;
    let html=`<div class="eyebrow">${esc(cur.series.name)} · ${esc(m.n)}</div><div class="myst-title" style="font-size:1.7rem;margin-bottom:.8rem">${esc(m.title)}</div>`;
    if(cur.v)html+=`<div class="cvgp"><div class="cvgp-lbl">Une vertu à demander</div>${fmtItem(cur.v)}</div>`;
    if(cur.g)html+=`<div class="cvgp"><div class="cvgp-lbl">Une grâce à implorer</div>${fmtItem(cur.g)}</div>`;
    if(cur.p)html+=`<div class="cvgp"><div class="cvgp-lbl">Un péché à combattre</div>${fmtItem(cur.p)}</div>`;
    html+=`<div class="cvgp"><div class="cvgp-lbl">Clausule</div><div class="clausule-courte">${esc(m.clausules.courte)}</div></div>`;
    stage=el(`<div class="stage tap"><div class="lead" style="max-width:44rem">${html}</div></div>`);
    addCustomBeads(stage);
  }
  const info=cur.m?mysteryStepInfo(state.idx):null;
  if(info&&info.total>1){const beads=el(`<div class="beads"></div>`);for(let k=0;k<info.total;k++)beads.appendChild(el(`<div class="bead ${k<=info.pos?'on':''}"></div>`));stage.appendChild(beads);}
  const old=stagesEl.querySelector(".stage.show");
  if(dir===1)stage.classList.add("enter-r");else if(dir===-1)stage.classList.add("enter-l");
  stagesEl.appendChild(stage);
  requestAnimationFrame(()=>requestAnimationFrame(()=>stage.classList.add("show")));
  if(old){old.classList.remove("show");if(dir===1)old.classList.add("bye-l");else if(dir===-1)old.classList.add("bye-r");setTimeout(()=>old.remove(),650);}
  if(stage.classList.contains("tap"))stage.addEventListener("click",e=>{
    if(APP.noClick())return;
    if(window.getSelection&&String(window.getSelection()))return;
    if(state.idx>0&&e.clientX<Math.min(96,innerWidth*.16))goBack();else advance();
  });
  renderChrome();
}
function renderChrome(){
  const cur=state.flow[state.idx];topEl.innerHTML="";
  const dark=(cur.type==="series"||cur.type==="closing");
  const back=el(`<button>‹ Retour</button>`);back.onclick=e=>{e.stopPropagation();goBack();};back.style.visibility=state.idx>0?"visible":"hidden";
  const home=el(`<button>✕ Quitter</button>`);home.onclick=e=>{e.stopPropagation();renderHome();};
  let where=cur.series&&cur.m?`${cur.series.name} · ${cur.m.n}`:cur.series?cur.series.name:"";
  topEl.appendChild(back);topEl.appendChild(el(`<div class="where">${esc(where)}</div>`));topEl.appendChild(home);
  topEl.classList.toggle("on-dark",dark);
  updateProg();
}
function advance(){if(state.idx<state.flow.length-1){state.idx++;renderStep(1);}else if(state.flow[state.idx]&&state.flow[state.idx].type==="closing"){renderHome();}}
function goBack(){if(state.idx>0){state.idx--;renderStep(-1);}}
document.addEventListener("keydown",e=>{
  if(editorEl.classList.contains("show"))return;
  if(!state.flow.length||!stagesEl.querySelector(".stage.tap"))return;
  if(e.key==="ArrowRight"||e.key===" "||e.key==="Enter"||e.key==="PageDown"){e.preventDefault();advance();}
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();goBack();}
  else if(e.key==="Escape")renderHome();
});

/* =================== EDITOR =================== */
let edSel={key:"Joyeux",n:"I"};
let edDraft=null;
function openEditor(){editorEl.classList.add("show");renderEditor();}
function closeEditor(){editorEl.classList.remove("show");edDraft=null;renderHome();}
function loadDraft(){edDraft=clone(effMystery(edSel.key,edSel.n));}
function isOverridden(key,n){return !!STORE.overrides[mid(key,n)];}

function renderEditor(){
  if(!edDraft||edDraft._k!==edSel.key||edDraft._n!==edSel.n){loadDraft();edDraft._k=edSel.key;edDraft._n=edSel.n;}
  const m=edDraft;
  editorEl.innerHTML="";
  const head=el(`<div class="ed-head"><div class="t">Atelier — personnaliser</div><div class="ed-actions"></div></div>`);
  const acts=head.querySelector(".ed-actions");
  const bSave=el(`<button class="btn solid">Enregistrer</button>`);bSave.onclick=saveDraft;
  const bReset=el(`<button class="btn warn">Rétablir l’original</button>`);bReset.onclick=resetCurrent;bReset.style.display=isOverridden(edSel.key,edSel.n)?"":"none";
  const bExp=el(`<button class="btn">Exporter</button>`);bExp.onclick=exportOverrides;
  const bImp=el(`<button class="btn">Importer</button>`);bImp.onclick=importOverrides;
  const bClose=el(`<button class="btn">Fermer</button>`);bClose.onclick=closeEditor;
  [bSave,bReset,bExp,bImp,bClose].forEach(b=>acts.appendChild(b));
  editorEl.appendChild(head);

  const body=el(`<div class="ed-body"></div>`);
  if(!storageOK) body.appendChild(el(`<div class="note">⚠︎ Le stockage local est indisponible ici (aperçu). Tes modifications tiendront le temps de la session ; utilise <b>Exporter</b> pour les conserver, et ouvre le fichier hors de l’aperçu pour la persistance.</div>`));
  // picker
  const pick=el(`<div class="ed-pick"></div>`);
  BASE.series.forEach(s=>s.mysteres.forEach(mm=>{
    const on=(edSel.key===s.key&&edSel.n===mm.n);
    const ov=isOverridden(s.key,mm.n);
    const chip=el(`<button class="chip ${on?'on':''}">${s.name.split(' ')[1][0].toUpperCase()}·${mm.n}${ov?' ✎':''}</button>`);
    chip.title=`${s.name} — ${mm.n}. ${baseIndex[mid(s.key,mm.n)].title}`;
    chip.onclick=()=>{edSel={key:s.key,n:mm.n};edDraft=null;renderEditor();};
    pick.appendChild(chip);
  }));
  body.appendChild(pick);
  body.appendChild(el(`<div class="note">${seriesByKey[edSel.key].name} — mystère ${edSel.n}${isOverridden(edSel.key,edSel.n)?'<span class="tag">modifié</span>':''}</div>`));

  // --- identité ---
  const fsId=el(`<fieldset class="fieldset"><legend>Identité</legend></fieldset>`);
  fsId.appendChild(field("Intitulé",m.title,v=>m.title=v));
  fsId.appendChild(field("Fruit du mystère",m.fruit,v=>m.fruit=v));
  body.appendChild(fsId);

  // --- Parole ---
  const fsP=el(`<fieldset class="fieldset"><legend>La Parole</legend></fieldset>`);
  fsP.appendChild(field("Texte du verset",m.parole.text,v=>m.parole.text=v,true));
  fsP.appendChild(field("Référence",m.parole.ref,v=>m.parole.ref=v));
  body.appendChild(fsP);

  // --- Historique ---
  body.appendChild(blocksEditor("Historique & contexte",m.histo));
  // --- Commentaires ---
  body.appendChild(blocksEditor("Commentaires & méditation",m.comm));
  // --- Saints ---
  body.appendChild(saintsEditor(m.saints));
  // --- Vertus/Grâces/Péchés ---
  body.appendChild(itemsEditor("Vertus à demander",m.vertus));
  body.appendChild(itemsEditor("Grâces à implorer",m.graces));
  body.appendChild(itemsEditor("Péchés à combattre",m.peches));
  // --- Clausules ---
  body.appendChild(clausulesEditor(m.clausules));

  editorEl.appendChild(body);
  editorEl.scrollTop=0;
}
function field(label,val,onchange,area){
  const wrap=el(`<div></div>`);
  wrap.appendChild(el(`<label class="flabel">${label}</label>`));
  const inp=area?el(`<textarea class="f"></textarea>`):el(`<input class="f" type="text">`);
  inp.value=val||"";inp.oninput=()=>onchange(inp.value);
  wrap.appendChild(inp);return wrap;
}
function rowControls(arr,i,rerender){
  const mv=el(`<div class="mv"><button title="Monter">▲</button><button title="Descendre">▼</button></div>`);
  mv.children[0].onclick=()=>{if(i>0){[arr[i-1],arr[i]]=[arr[i],arr[i-1]];rerender();}};
  mv.children[1].onclick=()=>{if(i<arr.length-1){[arr[i+1],arr[i]]=[arr[i],arr[i+1]];rerender();}};
  const del=el(`<button class="del" title="Supprimer">✕</button>`);
  del.onclick=()=>{arr.splice(i,1);rerender();};
  return {mv,del};
}
function blocksEditor(title,arr){
  const fs=el(`<fieldset class="fieldset"><legend>${title}</legend></fieldset>`);
  const host=el(`<div></div>`);fs.appendChild(host);
  function draw(){host.innerHTML="";
    arr.forEach((b,i)=>{
      const row=el(`<div class="row"></div>`);
      const {mv,del}=rowControls(arr,i,draw);row.appendChild(mv);row.appendChild(del);
      const sel=el(`<select class="f" style="max-width:14rem"><option value="h">Sous-titre de partie</option><option value="s">Sous-titre</option><option value="p">Paragraphe</option></select>`);
      sel.value=b.t;sel.onchange=()=>b.t=sel.value;
      row.appendChild(el(`<label class="flabel">Type</label>`));row.appendChild(sel);
      const ta=el(`<textarea class="f" style="margin-top:.4rem"></textarea>`);ta.value=b.x;ta.oninput=()=>b.x=ta.value;
      row.appendChild(ta);host.appendChild(row);
    });
    const add=el(`<button class="addbtn">+ Ajouter un bloc</button>`);
    add.onclick=()=>{arr.push({t:"p",x:""});draw();};host.appendChild(add);
  }
  draw();return fs;
}
function saintsEditor(arr){
  const fs=el(`<fieldset class="fieldset"><legend>Paroles des saints et des Pères</legend></fieldset>`);
  const host=el(`<div></div>`);fs.appendChild(host);
  function draw(){host.innerHTML="";
    arr.forEach((s,i)=>{const row=el(`<div class="row"></div>`);const {mv,del}=rowControls(arr,i,draw);row.appendChild(mv);row.appendChild(del);
      const ta=el(`<textarea class="f"></textarea>`);ta.value=s.text;ta.oninput=()=>s.text=ta.value;
      row.appendChild(el(`<label class="flabel">Citation</label>`));row.appendChild(ta);
      const au=el(`<input class="f" type="text" style="margin-top:.4rem">`);au.value=s.author||"";au.oninput=()=>s.author=au.value||null;
      row.appendChild(el(`<label class="flabel">Auteur</label>`));row.appendChild(au);host.appendChild(row);});
    const add=el(`<button class="addbtn">+ Ajouter une parole</button>`);add.onclick=()=>{arr.push({text:"",author:""});draw();};host.appendChild(add);
  }draw();return fs;
}
function itemsEditor(title,arr){
  const fs=el(`<fieldset class="fieldset"><legend>${title}</legend></fieldset>`);
  const host=el(`<div></div>`);fs.appendChild(host);
  function draw(){host.innerHTML="";
    arr.forEach((it,i)=>{const row=el(`<div class="row"></div>`);const {mv,del}=rowControls(arr,i,draw);row.appendChild(mv);row.appendChild(del);
      const g=el(`<div class="grid2"></div>`);
      const f1=el(`<div></div>`);f1.appendChild(el(`<label class="flabel">Intitulé</label>`));
      const lab=el(`<input class="f" type="text">`);lab.value=it.label||"";lab.oninput=()=>it.label=lab.value||null;f1.appendChild(lab);
      const f2=el(`<div></div>`);f2.appendChild(el(`<label class="flabel">Auteur</label>`));
      const au=el(`<input class="f" type="text">`);au.value=it.author||"";au.oninput=()=>it.author=au.value||null;f2.appendChild(au);
      g.appendChild(f1);g.appendChild(f2);row.appendChild(g);
      const ta=el(`<textarea class="f" style="margin-top:.4rem"></textarea>`);ta.value=it.citation||"";ta.oninput=()=>it.citation=ta.value||null;
      row.appendChild(el(`<label class="flabel">Citation (laisser vide pour une simple intention)</label>`));row.appendChild(ta);
      host.appendChild(row);});
    const add=el(`<button class="addbtn">+ Ajouter</button>`);add.onclick=()=>{arr.push({label:"",citation:"",author:""});draw();};host.appendChild(add);
  }draw();return fs;
}
function clausulesEditor(c){
  const fs=el(`<fieldset class="fieldset"><legend>Clausules</legend></fieldset>`);
  fs.appendChild(field("Version courte",c.courte,v=>c.courte=v));
  const host=el(`<div></div>`);fs.appendChild(el(`<label class="flabel" style="margin-top:.8rem">Version longue</label>`));fs.appendChild(host);
  function draw(){host.innerHTML="";
    c.longue.forEach((x,i)=>{const row=el(`<div class="row"></div>`);const {mv,del}=rowControls(c.longue,i,draw);row.appendChild(mv);row.appendChild(del);
      const inp=el(`<input class="f" type="text">`);inp.value=x;inp.oninput=()=>c.longue[i]=inp.value;row.appendChild(inp);host.appendChild(row);});
    const add=el(`<button class="addbtn">+ Ajouter une clausule</button>`);add.onclick=()=>{c.longue.push("et Jésus, … est béni.");draw();};host.appendChild(add);
  }draw();return fs;
}
function cleanDraft(m){
  const d=clone(m);delete d._k;delete d._n;
  d.vertus=d.vertus.filter(x=>(x.label||x.citation));
  d.graces=d.graces.filter(x=>(x.label||x.citation));
  d.peches=d.peches.filter(x=>(x.label||x.citation));
  d.saints=d.saints.filter(x=>x.text);
  d.histo=d.histo.filter(x=>x.x);d.comm=d.comm.filter(x=>x.x);
  d.clausules.longue=d.clausules.longue.filter(x=>x.trim());
  return d;
}
function saveDraft(){STORE.overrides[mid(edSel.key,edSel.n)]=cleanDraft(edDraft);saveStore();toast("Enregistré");renderEditor();}
function resetCurrent(){delete STORE.overrides[mid(edSel.key,edSel.n)];saveStore();edDraft=null;toast("Original rétabli");renderEditor();}
function exportOverrides(){
  const blob=new Blob([JSON.stringify(STORE,null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="rosaire_personnalisations.json";a.click();URL.revokeObjectURL(a.href);toast("Exporté");
}
function importOverrides(){
  const inp=document.createElement("input");inp.type="file";inp.accept="application/json,.json";
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const o=JSON.parse(r.result);if(o&&o.overrides){STORE=o;saveStore();edDraft=null;toast("Importé");renderEditor();}else toast("Fichier non reconnu");}catch(e){toast("Erreur de lecture");}};
    r.readAsText(f);};inp.click();
}

 {o:"Ave Maria, gratia plena,\nDominus tecum.",
  fr:"Je vous salue, Marie, pleine de grâce,\nle Seigneur est avec vous."},
 {o:"Benedicta tu in mulieribus,\net benedictus fructus ventris tui, Iesus.",
  fr:"Vous êtes bénie entre toutes les femmes,\net Jésus, le fruit de vos entrailles, est béni."},
 {o:"Sancta Maria, Mater Dei,\nora pro nobis peccatoribus,\nnunc et in hora mortis nostræ. Amen.",
  fr:"Sainte Marie, Mère de Dieu,\npriez pour nous, pauvres pécheurs,\nmaintenant et à l’heure de notre mort. Amen."}],
 note:"Prière composite qui joint en un seul souffle trois sources : la salutation de l’ange Gabriel et celle d’Élisabeth viennent de l’Évangile de Luc ; la supplique de l’Église s’est fixée au tournant des XVᵉ et XVIᵉ siècles, avant d’entrer au Bréviaire romain en 1568. Le Rosaire en est l’écrin contemplatif."},

{id:"sub_tuum",cat:"À la Vierge Marie",t:"Sous l’abri de ta miséricorde",tl:"Sub tuum præsidium",lang:"la",
 secs:[
 {o:"Sub tuum præsidium confugimus,\nsancta Dei Genitrix.",
  fr:"Sous l’abri de ta miséricorde,\nnous nous réfugions, sainte Mère de Dieu."},
 {o:"Nostras deprecationes ne despicias\nin necessitatibus,",
  fr:"Ne méprise pas nos prières\nquand nous sommes dans l’épreuve,"},
 {o:"sed a periculis cunctis libera nos semper,\nVirgo gloriosa et benedicta.",
  fr:"mais de tous les dangers délivre-nous toujours,\nVierge glorieuse et bénie."}],
 note:"La plus ancienne prière connue adressée à la Vierge : sa forme grecque, sur un papyrus égyptien, est datée du IIIᵉ siècle, peut-être du IVᵉ ; la version latine, ici donnée, remonte au XIᵉ. Dès les premiers temps, l’Église nommait déjà Marie Theotokos, Mère de Dieu."},

{id:"magnificat",cat:"À la Vierge Marie",t:"Magnificat",tl:"Magnificat",lang:"la",
 secs:[
 {o:"Magnificat anima mea Dominum,",fr:"Mon âme exalte le Seigneur,"},
 {o:"et exsultavit spiritus meus in Deo salutari meo,",fr:"exulte mon esprit en Dieu, mon Sauveur !"},
 {o:"quia respexit humilitatem ancillæ suæ.",fr:"Il s’est penché sur son humble servante ;"},
 {o:"Ecce enim ex hoc beatam me dicent omnes generationes,",fr:"désormais tous les âges me diront bienheureuse."},
 {o:"quia fecit mihi magna qui potens est, et sanctum nomen eius,",fr:"Le Puissant fit pour moi des merveilles ; Saint est son nom !"},
 {o:"et misericordia eius a progenie in progenies timentibus eum.",fr:"Sa miséricorde s’étend d’âge en âge sur ceux qui le craignent."},
 {o:"Fecit potentiam in brachio suo, dispersit superbos mente cordis sui ;",fr:"Déployant la force de son bras, il disperse les superbes."},
 {o:"deposuit potentes de sede, et exaltavit humiles ;",fr:"Il renverse les puissants de leurs trônes, il élève les humbles."},
 {o:"esurientes implevit bonis, et divites dimisit inanes.",fr:"Il comble de biens les affamés, renvoie les riches les mains vides."},
 {o:"Suscepit Israel puerum suum, recordatus misericordiæ suæ,",fr:"Il relève Israël, son serviteur, il se souvient de son amour,"},
 {o:"sicut locutus est ad patres nostros, Abraham et semini eius in sæcula.",fr:"de la promesse faite à nos pères, en faveur d’Abraham et de sa descendance, à jamais."}],
 note:"Le cantique de Marie (Lc 1, 46-55) : la prière mariale par excellence — non pas adressée à Marie, mais prononcée par elle. L’Église le chante chaque soir aux vêpres. Traduction liturgique en vigueur depuis 2016."},

{id:"salve",cat:"À la Vierge Marie",t:"Salut, ô Reine",tl:"Salve Regina",lang:"la",
 secs:[
 {o:"Salve, Regina, Mater misericordiæ,\nvita, dulcedo et spes nostra, salve.",
  fr:"Salut, ô Reine, Mère de miséricorde,\nnotre vie, notre douceur, notre espérance, salut."},
 {o:"Ad te clamamus, exsules filii Hevæ.\nAd te suspiramus, gementes et flentes\nin hac lacrimarum valle.",
  fr:"Vers toi nous crions, enfants d’Ève exilés.\nVers toi nous soupirons, gémissant et pleurant\ndans cette vallée de larmes."},
 {o:"Eia ergo, advocata nostra,\nillos tuos misericordes oculos ad nos converte.",
  fr:"Ô toi, notre avocate,\ntourne vers nous tes regards miséricordieux."},
 {o:"Et Iesum, benedictum fructum ventris tui,\nnobis post hoc exsilium ostende.",
  fr:"Et, après cet exil, montre-nous Jésus,\nle fruit béni de tes entrailles."},
 {o:"O clemens, o pia, o dulcis Virgo Maria.",
  fr:"Ô clémente, ô miséricordieuse, ô douce Vierge Marie."}],
 note:"Le cri de l’exil, traditionnellement attribué à Hermann le Contrefait, moine de Reichenau au XIᵉ siècle — l’attribution demeure discutée. C’est l’une des quatre grandes antiennes mariales de l’office ; sa cadence finale compte parmi les plus pures de la latinité chrétienne."},

{id:"memorare",cat:"À la Vierge Marie",t:"Souvenez-vous",tl:"Memorare",lang:null,
 secs:[
 {fr:"Souvenez-vous, ô très miséricordieuse Vierge Marie, qu’on n’a jamais entendu dire qu’aucun de ceux qui ont eu recours à votre protection, imploré votre assistance et réclamé vos suffrages, ait été abandonné."},
 {fr:"Animé d’une pareille confiance, ô Vierge des vierges, ô ma Mère, je viens vers vous, et, gémissant sous le poids de mes péchés, je me prosterne à vos pieds."},
 {fr:"Ô Mère du Verbe incarné, ne méprisez pas mes prières, mais écoutez-les favorablement et daignez les exaucer. Amen."}],
 note:"On attribue souvent cette prière à saint Bernard de Clairvaux : c’est une erreur. Sa forme connue date des XVᵉ et XVIᵉ siècles ; elle fut popularisée au XVIIᵉ par un prêtre parisien, Claude Bernard — homonymie qui explique sans doute la confusion. Le Memorare est la prière de la sainte audace : il ose rappeler à Marie sa propre fidélité."},

{id:"ephrem_bouche",cat:"À la Vierge Marie",t:"Remplis ma bouche",tl:null,lang:null,
 secs:[
 {fr:"Remplis ma bouche, ô Marie,\nde la grâce de ta douceur,\nafin que je chante dignement\ntes louanges et tes grandeurs."},
 {fr:"Reçois mes prières, exauce mes vœux,\nécarte de moi toute tristesse,\ntoute peine de l’âme et du corps,\net conduis-moi à ton Fils."},
 {fr:"Car tu es l’espérance des désespérés,\nle secours des abandonnés,\nle refuge assuré de tous ceux\nqui se confient en toi."}],
 note:"L’humilité faite chant : cette prière demande à Marie la grâce même de la louer. Elle est attribuée par la tradition à saint Éphrem le Syrien, diacre et docteur du IVᵉ siècle, « la harpe de l’Esprit ». Le corpus marial transmis sous son nom est en partie d’origine grecque ; l’attribution demeure traditionnelle plus que strictement établie."},

{id:"anselme",cat:"À la Vierge Marie",t:"Tendrement puissante",tl:null,lang:null,
 secs:[
 {fr:"Ô toi, tendrement puissante, puissamment tendre, ô Marie, de qui est sortie la source des miséricordes, n’arrête pas, je t’en prie, cette miséricorde si vraie là où tu reconnais une vraie misère."},
 {fr:"Car si moi je suis confondu en face de ta sainteté éblouissante, tu n’as pas à rougir de tes sentiments miséricordieux, qui te sont si naturels. Ô tendre Dame, plus mes fautes paraissent impures à la face de Dieu, plus aussi elles ont besoin d’être guéries grâce à ton intervention."},
 {fr:"Ô toi, belle à voir, aimable à contempler, délectable à aimer : tu es pleine de grâce, surabondante de grâce, et du trop-plein de cette plénitude, tu inondes toutes créatures pour leur redonner vigueur."},
 {fr:"Ô Vierge bénie, garde souci de celui qui se confie à toi ; fais que le cri de mes nécessités te suive partout, et que tes regards de bonté m’accompagnent. Amen."}],
 note:"Fragments choisis des trois grandes prières mariales de saint Anselme de Cantorbéry, moine bénédictin du XIᵉ siècle, « le nouvel Augustin ». Le texte intégral, beaucoup plus ample, déborderait ce trésor."},

{id:"bernard_etoile",cat:"À la Vierge Marie",t:"Regarde l’étoile",tl:"Respice stellam",lang:"la",
 secs:[
 {o:"Si insurgant venti tentationum,\nsi incurras scopulos tribulationum,\nrespice stellam, voca Mariam.",
  fr:"Si se lèvent les vents de la tentation,\nsi tu heurtes les écueils de l’épreuve,\nregarde l’étoile, appelle Marie."},
 {o:"Si jactaris superbiæ undis, si ambitionis,\nsi detractionis, si æmulationis,\nrespice stellam, voca Mariam.",
  fr:"Si tu es ballotté sur les flots de l’orgueil, de l’ambition,\nde la médisance, de la jalousie,\nregarde l’étoile, appelle Marie."},
 {o:"In periculis, in angustiis, in rebus dubiis,\nMariam cogita, Mariam invoca.",
  fr:"Dans les périls, les angoisses, les incertitudes,\npense à Marie, invoque Marie."},
 {o:"Ipsam sequens non devias,\nipsam rogans non desperas.",
  fr:"En la suivant, tu ne dévies pas ;\nen la priant, tu ne désespères pas."},
 {o:"Ipsa tenente, non corruis ;\nipsa protegente, non metuis.",
  fr:"Si elle te tient, tu ne tombes pas ;\nsi elle te protège, tu ne crains rien."}],
 note:"Après le Memorare, faussement mis sous son nom, voici un texte pleinement authentique de saint Bernard, tiré de la deuxième homélie Super Missus est : non pas une prière, mais une exhortation parmi les plus aimées de la littérature mariale."},

{id:"francois_salut",cat:"À la Vierge Marie",t:"Salutation à la Vierge",tl:null,lang:null,
 secs:[
 {fr:"Salut, Dame sainte, Reine très sainte,\nMère de Dieu, ô Marie toujours Vierge !"},
 {fr:"Tu fus choisie par le très saint Père du Ciel, consacrée par lui avec son très saint Fils bien-aimé et l’Esprit Paraclet, toi en qui fut et demeure toute plénitude de grâce et tout bien."},
 {fr:"Salut, palais de Dieu ; salut, tabernacle de Dieu ;\nsalut, demeure de Dieu ; salut, vêtement de Dieu ;\nsalut, servante de Dieu ; salut, Mère de Dieu !"},
 {fr:"Et salut à vous toutes, saintes vertus qui, par la grâce et l’illumination de l’Esprit Saint, êtes versées dans le cœur des fidèles, pour, d’infidèles que nous sommes, nous rendre fidèles à Dieu."}],
 note:"Saint François d’Assise emprunte ici la forme du « salut » courtois — l’hommage du poète à sa dame — pour le transfigurer en louange mariale. La traduction suivie est celle d’Alexandre Masseron."},

{id:"therese_marie",cat:"À la Vierge Marie",t:"Pourquoi je t’aime, ô Marie",tl:null,lang:null,
 secs:[
 {fr:"Oh ! je voudrais chanter, Marie, pourquoi je t’aime,\nPourquoi ton nom si doux fait tressaillir mon cœur,\nEt pourquoi la pensée de ta grandeur suprême\nNe saurait à mon âme inspirer de frayeur."},
 {fr:"Il faut, pour qu’un enfant puisse chérir sa mère,\nQu’elle pleure avec lui, partage ses douleurs.\nÔ ma Mère chérie, sur la rive étrangère,\nPour m’attirer à toi, que tu versas de pleurs !"},
 {fr:"Auprès de toi, Marie, j’aime à rester petite,\nDes grandeurs d’ici-bas je vois la vanité ;\nChez sainte Élisabeth, recevant ta visite,\nJ’apprends à pratiquer l’ardente charité."},
 {fr:"Toi qui vins me sourire au matin de ma vie,\nViens me sourire encore… Mère… voici le soir !\nJe ne crains plus l’éclat de ta gloire suprême,\nAvec toi j’ai souffert, et je veux maintenant\nChanter sur tes genoux, Marie, pourquoi je t’aime."}],
 note:"Florilège de quatre strophes de Pourquoi je t’aime, ô Marie, dernier poème de sainte Thérèse de l’Enfant-Jésus, mai 1897."},

{id:"totus_tuus",cat:"À la Vierge Marie",t:"Totus tuus",tl:"Totus tuus",lang:"la",
 secs:[
 {o:"Tuus totus ego sum,\net omnia mea tua sunt.",
  fr:"Je suis tout à toi,\net tout ce qui est mien est tien."}],
 note:"Devise de la consécration mariale selon saint Louis-Marie Grignion de Montfort, reprise par saint Jean-Paul II comme devise pontificale."},

{id:"montfort",cat:"À la Vierge Marie",t:"Je vous choisis aujourd’hui",tl:null,lang:null,
 secs:[
 {fr:"Je vous choisis aujourd’hui, ô Marie, en présence de toute la cour céleste, pour ma Mère et ma Reine."},
 {fr:"Je vous livre et consacre, en toute soumission et amour, mon corps et mon âme, mes biens intérieurs et extérieurs, et la valeur même de mes bonnes actions passées, présentes et futures, vous laissant un entier et plein droit de disposer de moi et de tout ce qui m’appartient, sans exception, selon votre bon plaisir, à la plus grande gloire de Dieu, dans le temps et l’éternité. Amen."}],
 note:"Le cœur de la consécration enseignée par saint Louis-Marie Grignion de Montfort dans le Traité de la vraie dévotion à la Sainte Vierge. Se donner à Marie n’y est pas une fin : c’est le chemin le plus court et le plus sûr pour aller au Christ."},

{id:"kolbe",cat:"À la Vierge Marie",t:"Ô Immaculée",tl:null,lang:null,
 secs:[
 {fr:"Ô Immaculée, Reine du ciel et de la terre, refuge des pécheurs et notre Mère très aimante, à qui Dieu voulut confier tout l’ordre de la miséricorde :"},
 {fr:"moi, pauvre pécheur, je me prosterne à vos pieds et vous implore humblement de me prendre tout entier comme votre chose et votre propriété, et de faire de moi, de toutes les facultés de mon âme et de mon corps, de toute ma vie, de ma mort et de mon éternité, tout ce qu’il vous plaira."},
 {fr:"Que je sois, entre vos mains toutes pures et si riches de miséricorde, un instrument docile, pour vous faire connaître et aimer de tant d’âmes. Amen."}],
 note:"Acte de consécration à l’Immaculée composé par saint Maximilien-Marie Kolbe, franciscain, mort martyr à Auschwitz en 1941 en offrant sa vie pour un autre. Le texte donné suit la forme stable, légèrement abrégée."},

{id:"medaille",cat:"À la Vierge Marie",t:"Ô Marie conçue sans péché",tl:null,lang:null,
 secs:[
 {fr:"Ô Marie conçue sans péché,\npriez pour nous\nqui avons recours à vous."}],
 note:"En 1830, rue du Bac à Paris, la Vierge demanda à sainte Catherine Labouré de faire frapper une médaille portant cette invocation. Innombrables furent les grâces obtenues : le peuple chrétien la nomma bientôt « la Médaille Miraculeuse ». La plus brève des prières, et le plus entier des abandons."}
);

/* ordre des catégories dans l'index */
const PR_CATS=["Padre Pio","Prières fondamentales","À Notre-Seigneur Jésus-Christ","À l’Esprit Saint","À la Sainte Trinité","À la Vierge Marie","Aux anges et aux saints","Cantiques et hymnes","Psaumes","Litanies"];

});

/* ---------- À L'ESPRIT SAINT ---------- */
{id:"veni_reple",cat:"À l’Esprit Saint",t:"Viens, Esprit Saint",tl:"Veni, Sancte Spiritus, reple",lang:"la",
 secs:[
 {o:"Veni, Sancte Spiritus,\nreple tuorum corda fidelium,\net tui amoris in eis ignem accende.",
  fr:"Viens, Esprit Saint,\nremplis le cœur de tes fidèles\net allume en eux le feu de ton amour."},
 {o:"℣. Emitte Spiritum tuum, et creabuntur.\n℟. Et renovabis faciem terræ.",
  fr:"℣. Envoie ton Esprit, et tout sera créé.\n℟. Et tu renouvelleras la face de la terre."},
 {o:"Oremus. Deus, qui corda fidelium Sancti Spiritus illustratione docuisti : da nobis in eodem Spiritu recta sapere, et de eius semper consolatione gaudere. Per Christum Dominum nostrum. Amen.",
  fr:null}],
 note:"L’invocation à l’Esprit Saint la plus usuelle, attestée dès le Xᵉ siècle, qui ouvre traditionnellement réunions, études et conciles. L’oraison finale (Deus, qui corda fidelium) est donnée en latin : sa traduction française connaît plusieurs variantes selon les livres, et seule celle du Missel fait foi."},

{id:"veni_creator",cat:"À l’Esprit Saint",t:"Veni Creator Spiritus",tl:"Veni Creator Spiritus",lang:"la",
 secs:[
 {o:"Veni, creator Spiritus,\nmentes tuorum visita :\nimple superna gratia,\nquæ tu creasti, pectora.",fr:null},
 {o:"Qui diceris Paraclitus,\ndonum Dei altissimi,\nfons vivus, ignis, caritas,\net spiritalis unctio.",fr:null},
 {o:"Tu septiformis munere,\ndextræ Dei tu digitus,\ntu rite promissum Patris,\nsermone ditans guttura.",fr:null},
 {o:"Accende lumen sensibus,\ninfunde amorem cordibus,\ninfirma nostri corporis\nvirtute firmans perpeti.",fr:null},
 {o:"Hostem repellas longius,\npacemque dones protinus :\nductore sic te prævio,\nvitemus omne noxium.",fr:null},
 {o:"Per te sciamus da Patrem,\nnoscamus atque Filium,\nte utriusque Spiritum\ncredamus omni tempore.",fr:null},
 {o:"Deo Patri sit gloria,\net Filio, qui a mortuis\nsurrexit, ac Paraclito,\nin sæculorum sæcula. Amen.",fr:null}],
 note:"L’hymne à l’Esprit Saint par excellence, attribuée à Raban Maur (IXᵉ siècle), chantée aux vêpres de la Pentecôte, aux ordinations, aux conciles et à l’ouverture de l’année. Le latin, ici intégral, est le texte de la Liturgie des Heures. La traduction liturgique française étant une œuvre protégée, elle n’est pas reproduite : on la trouvera dans la Liturgie des Heures ou sur le site de l’AELF."},

{id:"sequence_pentecote",cat:"À l’Esprit Saint",t:"Séquence de la Pentecôte",tl:"Veni Sancte Spiritus",lang:"la",
 secs:[
 {o:"Veni, Sancte Spiritus,\net emitte cælitus\nlucis tuæ radium.",fr:null},
 {o:"Veni, pater pauperum,\nveni, dator munerum,\nveni, lumen cordium.",fr:null},
 {o:"Consolator optime,\ndulcis hospes animæ,\ndulce refrigerium.",fr:null},
 {o:"In labore requies,\nin æstu temperies,\nin fletu solatium.",fr:null},
 {o:"O lux beatissima,\nreple cordis intima\ntuorum fidelium.",fr:null},
 {o:"Sine tuo numine\nnihil est in homine,\nnihil est innoxium.",fr:null},
 {o:"Lava quod est sordidum,\nriga quod est aridum,\nsana quod est saucium.",fr:null},
 {o:"Flecte quod est rigidum,\nfove quod est frigidum,\nrege quod est devium.",fr:null},
 {o:"Da tuis fidelibus,\nin te confidentibus,\nsacrum septenarium.",fr:null},
 {o:"Da virtutis meritum,\nda salutis exitum,\nda perenne gaudium. Amen. Alleluia.",fr:null}],
 note:"La « séquence d’or », chantée à la messe du jour de la Pentecôte avant l’Évangile, attribuée à Étienne Langton, archevêque de Cantorbéry († 1228). Le latin est celui du Missel romain. La traduction française de la séquence est celle, protégée, du Missel : elle n’est pas reproduite ici et se trouve dans tout missel des fidèles ou sur le site de l’AELF."},

/* ---------- ANGÉLUS ---------- */
{id:"angelus",cat:"À la Vierge Marie",t:"Angélus",tl:"Angelus Domini",lang:"la",
 secs:[
 {o:"℣. Angelus Domini nuntiavit Mariæ.\n℟. Et concepit de Spiritu Sancto.\nAve Maria…",
  fr:"℣. L’ange du Seigneur apporta l’annonce à Marie.\n℟. Et elle conçut du Saint-Esprit.\nJe vous salue, Marie…"},
 {o:"℣. Ecce ancilla Domini.\n℟. Fiat mihi secundum verbum tuum.\nAve Maria…",
  fr:"℣. Voici la servante du Seigneur.\n℟. Qu’il me soit fait selon votre parole.\nJe vous salue, Marie…"},
 {o:"℣. Et Verbum caro factum est.\n℟. Et habitavit in nobis.\nAve Maria…",
  fr:"℣. Et le Verbe s’est fait chair.\n℟. Et il a habité parmi nous.\nJe vous salue, Marie…"},
 {o:"℣. Ora pro nobis, sancta Dei Genitrix.\n℟. Ut digni efficiamur promissionibus Christi.",
  fr:"℣. Priez pour nous, sainte Mère de Dieu.\n℟. Afin que nous soyons rendus dignes des promesses du Christ."},
 {o:"Oremus. Gratiam tuam, quæsumus, Domine, mentibus nostris infunde : ut qui, Angelo nuntiante, Christi Filii tui incarnationem cognovimus, per passionem eius et crucem ad resurrectionis gloriam perducamur. Per eundem Christum Dominum nostrum. Amen.",
  fr:"Prions. Que ta grâce, Seigneur, se répande en nos cœurs. Par le message de l’ange, tu nous as fait connaître l’incarnation de ton Fils bien-aimé : conduis-nous, par sa passion et par sa croix, jusqu’à la gloire de la Résurrection. Par le Christ, notre Seigneur. Amen."}],
 note:"Prière de l’Incarnation, récitée trois fois par jour au son de la cloche — le matin, à midi et le soir — depuis le XIVᵉ siècle. Au temps pascal, elle cède la place au Regina cæli. Texte français selon les versions concordantes publiées par Vatican News et les diocèses de Paris et de Versailles."}
);

/* --- compléter la séquence de la Pentecôte (français fourni) --- */
(function(){
 const p=PRIERES.find(x=>x.id==="sequence_pentecote");
 const FR=[
 "Viens, Esprit Saint,\net envoie du haut du ciel\nun rayon de ta lumière.",
 "Viens, Père des pauvres,\nviens, dispensateur des dons,\nviens, lumière de nos cœurs.",
 "Consolateur souverain,\nhôte très doux de nos âmes,\nadoucissante fraîcheur.",
 "Dans le labeur, le repos ;\ndans la fièvre, la fraîcheur ;\ndans les pleurs, le réconfort.",
 "Ô lumière bienheureuse,\nviens remplir jusqu’à l’intime\nle cœur de tous tes fidèles.",
 "Sans ta puissance divine,\nil n’est rien en aucun homme,\nrien qui ne soit perverti.",
 "Lave ce qui est souillé,\nbaigne ce qui est aride,\nguéris ce qui est blessé.",
 "Assouplis ce qui est raide,\nréchauffe ce qui est froid,\nrends droit ce qui est faussé.",
 "À tous ceux qui ont la foi\net qui en toi se confient\ndonne tes sept dons sacrés.",
 "Donne mérite et vertu,\ndonne le salut final,\ndonne la joie éternelle. Amen."];
 FR.forEach((f,i)=>{if(p.secs[i])p.secs[i].fr=f;});
 p.note="La « séquence d’or », chantée à la messe du jour de la Pentecôte avant l’Évangile, attribuée à Étienne Langton, archevêque de Cantorbéry († 1228). Latin du Missel romain ; version française fournie d’après les livres en usage.";
})();

/* --- compléter le Veni Creator (français fourni) --- */
(function(){
 const p=PRIERES.find(x=>x.id==="veni_creator");
 const FR=[
 "Viens, Esprit Créateur,\nvisite l’âme de tes fidèles,\nemplis de la grâce d’En-Haut\nles cœurs que tu as créés.",
 "Toi qu’on nomme le Conseiller,\ndon du Dieu Très-Haut,\nsource vive, feu, charité,\ninvisible consécration.",
 "Tu es l’Esprit aux sept dons,\nle doigt de la main du Père,\nl’Esprit de vérité promis par le Père,\nc’est toi qui inspires nos paroles.",
 "Allume en nous ta lumière,\nemplis d’amour nos cœurs,\naffermis toujours de ta force\nla faiblesse de notre corps.",
 "Repousse l’ennemi loin de nous,\ndonne-nous ta paix sans retard,\npour que, sous ta conduite et ton conseil,\nnous évitions tout mal et toute erreur.",
 "Fais-nous connaître le Père,\nrévèle-nous le Fils,\net toi, leur commun Esprit,\nfais-nous toujours croire en toi.",
 "Gloire soit à Dieu le Père,\nau Fils ressuscité des morts,\nà l’Esprit Saint Consolateur,\nmaintenant et dans tous les siècles. Amen."];
 FR.forEach((f,i)=>{if(p.secs[i])p.secs[i].fr=f;});
 p.note="L’hymne à l’Esprit Saint par excellence, attribuée à Raban Maur (IXᵉ siècle), chantée aux vêpres de la Pentecôte, aux ordinations, aux conciles et à l’ouverture de l’année. Latin de la Liturgie des Heures ; version française fournie d’après les livres en usage.";
})();

PRIERES.push(

/* ---------- AUX ANGES ET AUX SAINTS ---------- */
{id:"st_michel",cat:"Aux anges et aux saints",t:"Prière à saint Michel Archange",tl:"Sancte Michael Archangele",lang:"la",
 secs:[
 {o:"Sancte Michael Archangele, defende nos in prœlio ; contra nequitiam et insidias diaboli esto præsidium. Imperet illi Deus, supplices deprecamur : tuque, Princeps militiæ cælestis, Satanam aliosque spiritus malignos, qui ad perditionem animarum pervagantur in mundo, divina virtute in infernum detrude. Amen.",
  fr:"Saint Michel Archange, défendez-nous dans le combat et soyez notre protecteur contre la méchanceté et les embûches du démon. Que Dieu exerce sur lui son empire, nous vous en supplions ; et vous, Prince de la Milice céleste, par le pouvoir divin qui vous a été confié, précipitez au fond des enfers Satan et les autres esprits mauvais qui parcourent le monde pour la perte des âmes. Amen."}],
 note:"Composée par Léon XIII en 1884 et jointe aux prières récitées après la messe basse jusqu’en 1964. Saint Jean-Paul II en a recommandé la reprise en 1994 : « Je demande à tous de ne pas l’oublier, et de la réciter pour obtenir de l’aide dans la bataille contre les forces des ténèbres. »"},

{id:"angele_dei",cat:"Aux anges et aux saints",t:"Ange de Dieu",tl:"Angele Dei",lang:"la",
 secs:[
 {o:"Angele Dei,\nqui custos es mei,\nme tibi commissum pietate superna,\nillumina, custodi,\nrege et guberna. Amen.",
  fr:"Ange de Dieu,\nqui es mon gardien,\net à qui j’ai été confié par la Bonté divine,\néclaire-moi, défends-moi,\nconduis-moi et dirige-moi. Amen."}],
 note:"La prière à l’ange gardien que l’Église met sur les lèvres des enfants et que gardent les adultes : cinq verbes qui confient au compagnon invisible la lumière, la garde et la conduite de toute une vie."},

{id:"st_joseph_pc",cat:"Aux anges et aux saints",t:"Prière à saint Joseph",tl:null,lang:null,
 secs:[
 {fr:"Salut, gardien du Rédempteur,\népoux de la Vierge Marie.\nÀ toi Dieu a confié son Fils ;\nen toi Marie a remis sa confiance ;\navec toi le Christ est devenu homme."},
 {fr:"Ô bienheureux Joseph,\nmontre-toi aussi un père pour nous,\net conduis-nous sur le chemin de la vie.\nObtiens-nous grâce, miséricorde et courage,\net défends-nous de tout mal. Amen."}],
 note:"Prière placée par le pape François au terme de la lettre apostolique Patris corde (8 décembre 2020), pour les cent cinquante ans de la proclamation de saint Joseph patron de l’Église universelle."},

{id:"ste_famille",cat:"Aux anges et aux saints",t:"Prière à la Sainte Famille",tl:null,lang:null,
 secs:[
 {fr:"Jésus, Marie et Joseph,\nen vous, nous contemplons la splendeur de l’amour vrai,\nen toute confiance nous nous adressons à vous."},
 {fr:"Sainte Famille de Nazareth,\nfais aussi de nos familles\nun lieu de communion et un cénacle de prière,\nd’authentiques écoles de l’Évangile\net de petites Églises domestiques."},
 {fr:"Sainte Famille de Nazareth,\nque plus jamais il n’y ait dans les familles\ndes scènes de violence, d’isolement et de division ;\nque celui qui a été blessé ou scandalisé\nsoit, bientôt, consolé et guéri."},
 {fr:"Sainte Famille de Nazareth,\nfais prendre conscience à tous\ndu caractère sacré et inviolable de la famille,\nde sa beauté dans le projet de Dieu."},
 {fr:"Jésus, Marie et Joseph,\nécoutez, exaucez notre prière. Amen !"}],
 note:"Prière du pape François concluant l’exhortation apostolique Amoris lætitia (n° 325, 2016), confiée aux familles pour qu’elles deviennent ce qu’elles contemplent."},

/* ---------- CANTIQUES ET HYMNES ---------- */
{id:"te_deum",cat:"Cantiques et hymnes",t:"Te Deum",tl:"Te Deum laudamus",lang:"la",
 secs:[
 {o:"Te Deum laudamus : te Dominum confitemur.\nTe æternum Patrem, omnis terra veneratur.",
  fr:"Dieu, notre louange !\nSeigneur, nous te glorifions.\nÀ toi, Père éternel,\nla terre entière te vénère."},
 {o:"Tibi omnes angeli, tibi cæli et universæ potestates :\ntibi cherubim et seraphim incessabili voce proclamant :",
  fr:"À toi les anges\net toutes les puissances d’en haut,\nà toi tous les esprits bienheureux\nredisent sans cesse :"},
 {o:"Sanctus, Sanctus, Sanctus Dominus Deus Sabaoth.\nPleni sunt cæli et terra maiestatis gloriæ tuæ.",
  fr:"Saint ! Saint ! Saint !\nLe Seigneur, Dieu de l’univers ;\nle ciel et la terre\nsont remplis de ta gloire."},
 {o:"Te gloriosus Apostolorum chorus,\nte prophetarum laudabilis numerus,\nte martyrum candidatus laudat exercitus.",
  fr:"Le chœur glorieux des Apôtres,\nles prophètes,\nl’armée des martyrs chante ta gloire."},
 {o:"Te per orbem terrarum sancta confitetur Ecclesia,\nPatrem immensæ maiestatis ;\nvenerandum tuum verum et unicum Filium ;\nSanctum quoque Paraclitum Spiritum.",
  fr:"Par toute la terre,\nla sainte Église confesse,\nô Père, ton infinie majesté,\nton adorable et unique vrai Fils,\navec le Saint-Esprit Consolateur."},
 {o:"Tu rex gloriæ, Christe.\nTu Patris sempiternus es Filius.\nTu, ad liberandum suscepturus hominem,\nnon horruisti Virginis uterum.",
  fr:"Ô Christ, tu es le Roi de gloire.\nTu es le Fils éternel du Père.\nPour libérer l’humanité,\ntu t’es fait homme,\nne dédaignant pas le corps de la Vierge."},
 {o:"Tu, devicto mortis aculeo,\naperuisti credentibus regna cælorum.\nTu ad dexteram Dei sedes, in gloria Patris.\nIudex crederis esse venturus.",
  fr:"Toi, Vainqueur de la mort,\ntu ouvres aux croyants le Royaume des cieux ;\ntu sièges à la droite de Dieu,\ndans la gloire du Père.\nNous croyons que tu es le juge qui doit venir."},
 {o:"Te ergo quæsumus, tuis famulis subveni,\nquos pretioso sanguine redemisti.\nÆterna fac cum sanctis tuis in gloria numerari.",
  fr:"Daigne alors secourir\ntes serviteurs que tu as rachetés\npar ton précieux sang.\nFais qu’ils soient au nombre de tes saints,\ndans la gloire éternelle."},
 {o:"Salvum fac populum tuum, Domine,\net benedic hereditati tuæ.\nEt rege eos, et extolle illos usque in æternum.",
  fr:"Sauve ton peuple, Seigneur,\net bénis ton héritage.\nSois leur guide et conduis-les\nsur le chemin d’éternité."},
 {o:"Per singulos dies benedicimus te ;\net laudamus nomen tuum in sæculum,\net in sæculum sæculi.",
  fr:"Chaque jour, nous te bénissons ;\nnous louons ton nom\nà jamais, et dans les siècles des siècles."},
 {o:"Dignare, Domine, die isto sine peccato nos custodire.\nMiserere nostri, Domine, miserere nostri.",
  fr:"Daigne, Seigneur,\nveiller sur nous et nous garder de tout péché.\nAie pitié de nous, Seigneur,\naie pitié de nous."},
 {o:"Fiat misericordia tua, Domine, super nos,\nquemadmodum speravimus in te.\nIn te, Domine, speravi :\nnon confundar in æternum.",
  fr:"Que ta miséricorde, Seigneur, soit sur nous,\npuisque tu es notre espoir.\nTu es, Seigneur, mon espérance ;\njamais je ne serai déçu."}],
 note:"L’hymne d’action de grâces de l’Église, attribuée par la légende à Ambroise et Augustin au soir du baptême de ce dernier, chantée à la fin des Te Deum solennels, aux offices des dimanches et fêtes et au dernier soir de l’année. Latin de la Liturgie des Heures ; version française fournie d’après le site du Vatican."},

{id:"benedictus",cat:"Cantiques et hymnes",t:"Benedictus",tl:"Benedictus Dominus Deus Israel",lang:"la",
 secs:[
 {o:"Benedictus Dominus, Deus Israel,\nquia visitavit et fecit redemptionem plebi suæ,",
  fr:"Béni soit le Seigneur, le Dieu d’Israël,\nqui visite et rachète son peuple."},
 {o:"et erexit cornu salutis nobis\nin domo David pueri sui,",
  fr:"Il a fait surgir la force qui nous sauve\ndans la maison de David, son serviteur,"},
 {o:"sicut locutus est per os sanctorum,\nqui a sæculo sunt, prophetarum eius,",
  fr:"comme il l’avait dit par la bouche des saints,\npar ses prophètes, depuis les temps anciens :"},
 {o:"salutem ex inimicis nostris\net de manu omnium, qui oderunt nos ;",
  fr:"salut qui nous arrache à l’ennemi,\nà la main de tous nos oppresseurs,"},
 {o:"ad faciendam misericordiam cum patribus nostris\net memorari testamenti sui sancti,",
  fr:"amour qu’il montre envers nos pères,\nmémoire de son alliance sainte,"},
 {o:"iusiurandum, quod iuravit ad Abraham patrem nostrum,\ndaturum se nobis,",
  fr:"serment juré à notre père Abraham\nde nous rendre sans crainte,"},
 {o:"ut sine timore, de manu inimicorum liberati,\nserviamus illi\nin sanctitate et iustitia coram ipso\nomnibus diebus nostris.",
  fr:"afin que, délivrés de la main des ennemis,\nnous le servions, dans la justice et la sainteté,\nen sa présence, tout au long de nos jours."},
 {o:"Et tu, puer, propheta Altissimi vocaberis :\npræibis enim ante faciem Domini parare vias eius,",
  fr:"Et toi, petit enfant,\ntu seras appelé prophète du Très-Haut :\ntu marcheras devant, à la face du Seigneur,\net tu prépareras ses chemins"},
 {o:"ad dandam scientiam salutis plebi eius\nin remissionem peccatorum eorum,",
  fr:"pour donner à son peuple de connaître le salut\npar la rémission de ses péchés,"},
 {o:"per viscera misericordiæ Dei nostri,\nin quibus visitabit nos oriens ex alto,",
  fr:"grâce à la tendresse, à l’amour de notre Dieu,\nquand nous visite l’astre d’en haut,"},
 {o:"illuminare his, qui in tenebris et in umbra mortis sedent,\nad dirigendos pedes nostros in viam pacis.",
  fr:"pour illuminer ceux qui habitent les ténèbres\net l’ombre de la mort,\npour conduire nos pas\nau chemin de la paix."},
 {fr:"Gloire au Père, et au Fils, et au Saint-Esprit,\nau Dieu qui est, qui était et qui vient,\npour les siècles des siècles. Amen."}],
 note:"Le cantique de Zacharie (Lc 1, 68-79), chanté chaque matin aux laudes : le père de Jean-Baptiste, rendu à la parole, bénit le Dieu qui visite son peuple. La doxologie finale est celle de la Liturgie des Heures."},

{id:"nunc_dimittis",cat:"Cantiques et hymnes",t:"Nunc dimittis",tl:"Nunc dimittis",lang:"la",
 secs:[
 {o:"Nunc dimittis servum tuum, Domine,\nsecundum verbum tuum in pace,",
  fr:"Maintenant, Seigneur, tu laisses ton serviteur\ns’en aller en paix, selon ta parole."},
 {o:"quia viderunt oculi mei salutare tuum,\nquod parasti ante faciem omnium populorum,",
  fr:"Car mes yeux ont vu ton salut,\nsalut que tu as préparé devant tous les peuples,"},
 {o:"lumen ad revelationem gentium\net gloriam plebis tuæ Israel.",
  fr:"lumière pour éclairer les nations,\net gloire d’Israël, ton peuple."}],
 note:"Le cantique de Syméon (Lc 2, 29-32), chanté chaque soir aux complies : le vieillard qui tient l’Enfant dans ses bras peut mourir en paix, ses yeux ont vu le salut. C’est la prière du seuil de la nuit — et du seuil de la vie."},

/* ---------- PSAUMES ---------- */
{id:"miserere",cat:"Psaumes",t:"Miserere",tl:"Psaume 50 (51)",lang:null,
 secs:[
 {fr:"Pitié pour moi, mon Dieu, dans ton amour,\nselon ta grande miséricorde, efface mon péché.\nLave-moi tout entier de ma faute,\npurifie-moi de mon offense."},
 {fr:"Oui, je connais mon péché,\nma faute est toujours devant moi.\nContre toi, et toi seul, j’ai péché,\nce qui est mal à tes yeux, je l’ai fait."},
 {fr:"Ainsi, tu peux parler et montrer ta justice,\nêtre juge et montrer ta victoire.\nMoi, je suis né dans la faute,\nj’étais pécheur dès le sein de ma mère."},
 {fr:"Mais tu veux au fond de moi la vérité ;\ndans le secret, tu m’apprends la sagesse.\nPurifie-moi avec l’hysope, et je serai pur ;\nlave-moi et je serai blanc, plus que la neige."},
 {fr:"Fais que j’entende les chants et la fête :\nils danseront, les os que tu broyais.\nDétourne ta face de mes fautes,\nenlève tous mes péchés."},
 {fr:"Crée en moi un cœur pur, ô mon Dieu,\nrenouvelle et raffermis au fond de moi mon esprit.\nNe me chasse pas loin de ta face,\nne me reprends pas ton esprit saint."},
 {fr:"Rends-moi la joie d’être sauvé ;\nque l’esprit généreux me soutienne.\nAux pécheurs, j’enseignerai tes chemins ;\nvers toi, reviendront les égarés."},
 {fr:"Libère-moi du sang versé, Dieu, mon Dieu sauveur,\net ma langue acclamera ta justice.\nSeigneur, ouvre mes lèvres,\net ma bouche annoncera ta louange."},
 {fr:"Si j’offre un sacrifice, tu n’en veux pas,\ntu n’acceptes pas d’holocauste.\nLe sacrifice qui plaît à Dieu, c’est un esprit brisé ;\ntu ne repousses pas, ô mon Dieu, un cœur brisé et broyé."},
 {fr:"Accorde à Sion le bonheur,\nrelève les murs de Jérusalem.\nAlors tu accepteras de justes sacrifices, oblations et holocaustes ;\nalors on offrira des taureaux sur ton autel."}],
 note:"Le grand psaume pénitentiel, prière de David après sa faute, que l’Église redit chaque vendredi aux laudes. Version française fournie d’après le psautier liturgique ; le latin sera joint après vérification du texte."},

{id:"de_profundis",cat:"Psaumes",t:"De profundis",tl:"Psaume 129 (130)",lang:"la",
 secs:[
 {o:"De profundis clamavi ad te, Domine ;\nDomine, exaudi vocem meam.\nFiant aures tuæ intendentes\nin vocem deprecationis meæ.",
  fr:"Des profondeurs je crie vers toi, Seigneur,\nSeigneur, écoute mon appel !\nQue ton oreille se fasse attentive\nau cri de ma prière !"},
 {o:"Si iniquitates observaveris, Domine,\nDomine, quis sustinebit ?\nQuia apud te propitiatio est,\nut timeamus te.",
  fr:"Si tu retiens les fautes, Seigneur,\nSeigneur, qui subsistera ?\nMais près de toi se trouve le pardon\npour que l’homme te craigne."},
 {o:"Sustinui te, Domine,\nsustinuit anima mea in verbo eius ;\nsperavit anima mea in Domino\nmagis quam custodes auroram.",
  fr:"J’espère le Seigneur de toute mon âme ;\nje l’espère, et j’attends sa parole.\nMon âme attend le Seigneur\nplus qu’un veilleur ne guette l’aurore."},
 {o:"Magis quam custodes auroram\nsperet Israel in Domino,\nquia apud Dominum misericordia,\net copiosa apud eum redemptio.\nEt ipse redimet Israel\nex omnibus iniquitatibus eius.",
  fr:"Plus qu’un veilleur ne guette l’aurore,\nattends le Seigneur, Israël.\nOui, près du Seigneur, est l’amour ;\nprès de lui, abonde le rachat.\nC’est lui qui rachètera Israël\nde toutes ses fautes."}],
 note:"Le sixième psaume pénitentiel, cri de l’abîme et acte d’espérance, que l’Église chante pour ses défunts et chaque soir à l’office. Le veilleur qui guette l’aurore en est l’image centrale : l’attente certaine d’une lumière promise."}
);
