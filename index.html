ous laisse toujours sur votre faim, que des jeûnes de trois jours. Mieux vaut manger chaque jour, mais peu, que rarement et beaucoup à la fois. La meilleure pluie, c’est celle qui pénètre peu à peu la terre. Une pluie soudaine et trop forte désole les campagnes. »", "author": "Saint Jérôme", "rest": ""}, {"label": "Le jeûne, frein contre le péché", "citation": "« Le jeûne est un frein pour le moine contre le péché. Qui le rejette se retrouve étalon en rut »", "author": "Jr 5,8", "rest": ""}], "graces": [{"label": "Demandons au Seigneur, par l’intermédiaire de Marie", "citation": null, "author": null, "rest": ", de savoir nous aussi l’aimer comme il nous a aimés et donc de ne compter ni nos efforts, ni nos peines pour le suivre et répondre à son amour !"}, {"label": "Seigneur, par Marie, aide-nous à garder un cœur pur au milieu de ce monde", "citation": "« Crée en moi un cœur pur, ô mon Dieu. »", "author": "Ps 51, 12, le Miserere", "rest": ""}, {"label": "Demandons la grâce de compatir aux souffrances des autres", "citation": null, "author": null, "rest": " et de nous unir à Jésus, comme Marie, dans nos souffrances."}, {"label": "Faire de notre corps un instrument de bonté et d’amour", "citation": "« Ne faites pas de vos membres des instruments d'injustice ; faites-en des instruments de justice au service de Dieu »", "author": "Rm 6, 13", "rest": " pour autrui, plutôt qu’une source de péché."}], "peches": [{"label": "La chair", "citation": "« L’entière mortification des sens, le détachement absolu du créé est indispensable à l’âme qui veut atteindre la divine union. La doctrine de Jésus Christ nous enseigne le détachement de toute chose afin d’être toujours libres à recevoir le Saint-Esprit dans nos âmes. Le créé tourmente et abaisse. L’Esprit de Dieu purifie et sanctifie. »", "author": "Marthe Robin", "rest": ""}, {"label": "Craindre la tentation", "citation": "« L’abbé Colobos s’en alla dire à un vieillard « Je me vois tranquille et sans aucun combat. » Alors, le vieillard lui dit : « Va, supplie Dieu pour que le combat te revienne, ainsi que l’affliction et l’humilité que tu avais précédemment ; car c’est par les combats que l’âme progresse ». Il supplia donc Dieu et, quand vint le combat, il ne priait plus pour qu’il lui soit enlevé, mais il disait : « Seigneur, donne-moi de l’endurance dans les combats »", "author": "Saint Jean Colobos", "rest": ""}, {"label": "La luxure et la médisance", "citation": "« Il ne faut pas parler de ces deux pensées, ni les remuer dans son cœur. Car, si on veut absolument en faire le discernement dans son cœur, on n’en tirera pas de profit. Mais si on est farouche avec elles, on aura le repos »", "author": "Poemen", "rest": ""}, {"label": "Les vices provenant de la vertu", "citation": "« Les vices qui semblent venir de la vertu et d’un motif spirituel sont plus dangereux et plus difficiles à guérir que ceux qui viennent évidemment des désirs de la chair ; car on s’empresse de combattre le mal qui s’aperçoit facilement, tandis que celui qui se cache sous de fausses apparences e peut être soigné, et l’erreur où l’on est rend la plaie désespérée »", "author": "Abbé Daniel", "rest": ""}], "clausules": {"courte": "Et Jésus flagellé.", "longue": ["Et Jésus, le plus beau des enfants des hommes, est béni.", "Et Jésus, qui est flagellé jusqu’au sang, est béni.", "Et Jésus, dont le corps devient une plaie, est béni.", "Et Jésus, qui verse son sang pour laver nos péchés, est béni.", "Et Jésus, qui nous purifie par sa chair flagellée, est béni.", "Et Jésus, qui n’ouvre pas la bouche pour se plaindre, est béni.", "Et Jésus, Agneau de Dieu, immolé pour nous sauver, est béni.", "Et Jésus, dont les meurtrissures nous guérissent, est béni.", "Et Jésus, qui est encore torturé dans tous les opprimés, est béni.", "Et Jésus, ton enfant bien-aimé écorché, est béni."]}}, {"n": "III", "title": "Le couronnement d’épines", "fruit": "L’humilité. « Humiliez-vous devant le Seigneur, et il vous élèvera. » (Jacques 4:10) « Enfin, soyez tous animés des mêmes pensées et des mêmes sentiments, pleins d’amour fraternel, de compassion, d’humilité. » (Pierre 3:8) « La crainte de l’Éternel enseigne la sagesse, Et l’humilité précède la gloire. » (Proverbes 15:33) « Dieu a choisi les choses viles du monde et celles qu’on méprise, celles qui ne sont point, pour réduire à néant celles qui sont, afin que nulle chair ne se glorifie devant Dieu. » (Corinthiens 1:28-29) « Alors il s’assit, appela les douze, et leur dit : Si quelqu’un veut être le premier, il sera le dernier de tous et le serviteur de tous. » (Marc 9:35) « Humiliez-vous donc sous la puissante main de Dieu, afin qu’il vous élève au temps convenable. » (Pierre 5:6) « Il faut qu’il croisse, et que je diminue. » (Jean 3:30) « Cherchez l’Eternel, vous tous, humbles du pays, Qui pratiquez ses ordonnances ! Recherchez la justice, recherchez l’humilité ! Peut-être serez-vous épargnés au jour de la colère de l’Eternel. » (Sophonie 2:3) « C’est pourquoi, quiconque se rendra humble comme ce petit enfant sera le plus grand dans le royaume des cieux » (Matthieu 18:4)", "parole": {"text": "Alors les soldats du gouverneur emmenèrent Jésus dans le prétoire et rassemblèrent autour de lui toute la garde. Ils lui enlevèrent ses vêtements et le couvrirent d’un manteau rouge. Puis, avec des épines, ils tressèrent une couronne, et la posèrent sur sa tête ; ils lui mirent un roseau dans la main droite et, pour se moquer de lui, ils s’agenouillaient en lui disant : « Salut, roi des Juifs ! ».", "ref": "Mt 27, 27-29"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "1. Le prétoire et la cohorte"}, {"t": "p", "x": "Les soldats emmènent Jésus dans le prétoire (la résidence du gouverneur) et rassemblent autour de lui « toute la cohorte ». La brutalité des soldats envers un condamné était un phénomène connu : le supplicié devenait l’objet de leurs moqueries."}, {"t": "s", "x": "2. La parodie des insignes royaux"}, {"t": "p", "x": "Tout est une parodie des honneurs royaux et impériaux : on revêt Jésus d’un manteau rouge (le manteau militaire, imitant la pourpre royale) ; on lui pose une couronne d’épines (à la place du diadème) ; on lui met un roseau dans la main (en guise de sceptre). Puis on s’agenouille en criant « Salut (Ave !), roi des Juifs ! » – comme on acclamait un empereur –, avant de cracher sur lui et de le frapper avec le roseau. C’est un couronnement de dérision."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "1. L’ironie sacrée"}, {"t": "p", "x": "Par dérision, les soldats proclament une vérité : Jésus est Roi. La couronne d’épines, le manteau de pourpre, le sceptre de roseau composent – à leur insu – l’image du vrai Roi, qui règne non par la force mais par l’humiliation et l’amour. La moquerie devient confession."}, {"t": "s", "x": "2. Le Serviteur outragé"}, {"t": "p", "x": "La scène accomplit le Serviteur souffrant : « J’ai présenté mon dos à ceux qui me frappaient… je n’ai pas dérobé ma face aux outrages et aux crachats » (Is 50, 6). Jésus subit sans se révolter ce que l’homme lui inflige."}], "saints": [{"text": "« Par ces épines, sont signifiés les aiguillons des péchés par lesquels la conscience est blessée. Le Christ les a acceptés à notre place, car il est mort pour nos péchés. Ou bien, on peut mettre cela en rapport avec la malédiction d’Adam, lorsqu’il est dit : Il te donnera des épines et des chardons. Il a ainsi été indiqué que cette malédiction était écartée. »", "author": "Saint Thomas d’Aquin"}, {"text": "« Que les pécheurs le contemplent donc avec sa couronne de misère, c’est-à-dire avec sa couronne d’épines, et qu’ils en soient touchés de regrets. Pour le moment, il se présente à nous non pas tel qu’il est, mais tel qu’il s’est fait pour nous, lui, notre Tête couronnée, non pas de gloire mais d’épines, des épines de nos péchés ! »", "author": "Saint Bernard de Clairvaux"}, {"text": "« Quiconque s’élèvera sera abaissé, et quiconque s’abaissera sera élevé. »", "author": "Mt 23, 12"}, {"text": "« Ceux qui nous humilient sont nos amis, et non ceux qui nous louent… »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}, {"text": "Si tu peux être moqué et injurié sans perdre ta paix, réjouis-toi le Seigneur est avec toi. Un Père du désert.", "author": null}], "vertus": [{"label": "Adorer le Roi couronné d’épines. Voici le renversement chrétien de la gloire", "citation": null, "author": null, "rest": " : le Roi couronné d’épines. Adorer ce visage défiguré, c’est reconnaître que la vraie royauté n’est pas dans la puissance, mais dans l’amour qui s’abaisse et souffre. La dévotion à la Sainte Face et à la Passion s’enracine ici."}, {"label": "Combattre notre orgueil", "citation": null, "author": null, "rest": " : Seigneur Jésus, je te confie l’orgueil que je souhaite combattre pour ainsi apaiser mes relations avec les autres mais également pour découvrir les talents des personnes autour de moi afin d’être ouverts à eux. C’est une grâce que je te demande au cours de cette dizaine."}, {"label": "La retenue", "citation": "« J’ai été troublé mais je n’ai rien dit »", "author": "Abbé Moïse", "rest": ""}], "graces": [{"label": "L’humilité", "citation": "« De même il est impossible de construire un navire sans clous, ainsi est-il inconcevable d’être sauvé sans humilité »", "author": "Synclétique", "rest": ""}, {"label": "Aimer notre prochain", "citation": "« L’aumône et la foi purifient des péchés (Pr., 15, 27). La foi, c’est vivre dans l’humilité, et faire l’aumône »", "author": "Poemen", "rest": ""}, {"label": "Voir dans tous les humiliés une image et un frère du Christ", "citation": "« Chaque fois que vous l'avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait »", "author": "Mt 25, 40", "rest": ""}], "peches": [{"label": "La moquerie et la médisance.", "citation": null, "author": null, "rest": " Reconnaître que, dans ces outrages, ce sont aussi nos mépris et nos péchés qui frappent le Christ. Devant ce visage souffleté et raillé, se tenir en silence, en compassion, et en réparation – non en spectateur, mais en pécheur aimé qui contemple le prix de son salut."}, {"label": "L’orgueil (ne pouvoir supporter le mépris)", "citation": "« Quand on ne supporte pas d’être méprisé dans le monde, on s’efforce d’étaler ses mérites cachés, s’il en est, et l’on est conduit de l’impatience à l’ostentation ; on ne peut supporter le mépris, et se découvrant soi-même on fait le fier en paradant. Aussi est-il écrit : L’homme patient vaut mieux que l’homme fier (Eccl 7,9). C’est que l’homme patient a mieux aimé souffrir tous les maux que faire connaître par une coupable ostentation ses mérites cachés. Par contre l’homme fier aime mieux que soient vantés ses mérites, même faux, pour ne pas avoir à souffrir la moindre blessure. »", "author": "Saint Grégoire le Grand", "rest": ""}, {"label": "Juger", "citation": "« Ne fais de mal à personne, n’aie pas dans ton cœur de pensée mauvaise à l’égard de quiconque. Ne méprise pas celui qui fait le mal. Ne te laisse pas circonvenir par cekui qui fait du mal à son prochain, et ne te réjouis pas non plus avec celui qui fait du mal à son prochain. Ne parle jamais mal de quelqu’un, mais dis : Dieu connaît chacun. Ne te laisse pas convaincre par le médisant et ne prends pas plaisir à ces racontars. N’imite pas non plus celui qui dit du mal de son prochain. C’est cela le : Ne jugez pas, et vous ne serez pas jugés » (Abbé Moïse) N’aie d’inimitié avec personne, et ne garde pas de haine dans ton cœur. N’imite pas non plus celui qui a de la haine pour son prochain. C’est cela la paix. Excite-toi à tout cela. La peine est pour peu de temps, et le repos pour toujours, par la grâce de Dieu »", "author": "Abbé Moïse", "rest": ""}, {"label": "S’attarder sur les fautes d’autrui", "citation": "« Si je vois une faute de mon frère, est-il bien de la cacher ? À l’heure même où nous cachons la faute de notre frère, Dieu cache la nôtre. Et à l’heure où nous manifestons la faute de notre frère, Dieu manifeste aussi la nôtre »", "author": "Poemen", "rest": ""}, {"label": "Juger autrui", "citation": "« Mes péchés coulent à flot derrière moi, et je ne les vois pas, et je viens aujourd’hui pour juger les fautes d’autrui »", "author": "Abbé Moïse", "rest": ""}, {"label": "Le mépris", "citation": "« Il n’est point de vertu comparable à celle qui consiste à ne pas mépriser »", "author": "Abbé Théodore de Phermé", "rest": ""}, {"label": "La médisance (réparation et mort de l’âme)", "citation": "« Si tu as mal parlé de ton frère, et que ta conscience te le reproche, fais-lui une métanie et dis-lui : J’ai mal parlé de toi. Et prends bien garde de ne plus te laisser jouer, car la médisance est la mort de l’âme »", "author": "Abbé Or", "rest": ""}], "clausules": {"courte": "Et Jésus, couronné d’épines.", "longue": ["Et Jésus, qui est notre seul roi, est béni.", "Et Jésus, humilié pour expier notre orgueil, est béni.", "Et Jésus, que les soldats couronnent d’épines, est béni.", "Et Jésus, dont la face ruisselle de sang, est béni.", "Et Jésus, dont le visage est couvert de crachats, est béni.", "Et Jésus, qui se tait devant les insultes, est béni.", "Et Jésus, toujours doux et humble de cœur, est béni.", "Et Jésus, toujours miséricordieux, est béni.", "Et Jésus, qui soutient les persécutés, est béni.", "Et Jésus, qui nous apprend la véritable humilité, est béni."]}}, {"n": "IV", "title": "Le portement de la Croix", "fruit": "La patience dans les épreuves", "parole": {"text": "Ils réquisitionnent, pour porter la croix, un passant, Simon de Cyrène, le père d’Alexandre et de Rufus, qui revenait des champs. Et ils amènent Jésus à l’endroit appelé Golgotha, c’est-à-dire : Lieu-du-Crâne, ou Calvaire » (Mc 15, 21-22).", "ref": ""}, "histo": [], "comm": [{"t": "s", "x": "1. Simon de Cyrène porte la croix"}, {"t": "p", "x": "À la sortie, on réquisitionne (le droit romain de l’angareia) un passant, Simon de Cyrène (ville de Libye ; Simon est un pèlerin juif, dont saint Marc nomme les fils, Alexandre et Rufus, connus de la communauté), pour porter la croix – car le condamné portait lui-même la poutre transversale (patibulum), et Jésus, épuisé par la flagellation, n’en peut plus."}, {"t": "p", "x": "Simon, contraint de porter la croix derrière Jésus, devient l’image de tout disciple : « qu’il prenne sa croix et me suive » (Mt 16, 24). Ce qu’on lui impose deviendra, selon la tradition, un chemin de foi (sa famille est chrétienne)."}, {"t": "s", "x": "2. Les femmes de Jérusalem"}, {"t": "p", "x": "Propre à Luc, ce cortège de femmes qui se frappent la poitrine et se lamentent prolonge la place que le troisième évangile leur accorde. Jésus les retourne vers elles-mêmes et vers l’avenir tragique de la ville : « pleurez sur vous-mêmes et sur vos enfants ». Reprenant un langage prophétique (Os 10, 8), il annonce le jugement qui frappera Jérusalem en l’an 70. La sentence finale – « si l’on traite ainsi le bois vert, qu’adviendra-t-il du bois sec ? » – oppose l’innocent au coupable."}, {"t": "s", "x": "3. Le Golgotha et le vin mêlé de fiel"}, {"t": "p", "x": "On arrive au Golgotha (« lieu du Crâne », Calvaire en latin), un escarpement rocheux hors des murs, près d’une route. On offre à Jésus du vin mêlé de fiel – sans doute une boisson stupéfiante proposée par pitié pour atténuer la douleur ; il y goûte mais refuse : il boira la coupe jusqu’au bout, en pleine conscience (cf. Ps 69, 22)."}], "saints": [{"text": "« En fait, c’étaient nos souffrances qu’il portait, nos douleurs dont il était chargé. Et nous, nous pensions qu’il était frappé, meurtri par Dieu, humilié. »", "author": "Isaïe 53,4"}, {"text": "« Notre Seigneur est notre Modèle : prenons notre croix et suivons-Le. Si vous craignez que le courage vous manque, portez vos regards sur la Croix où Jésus-Christ est mort, et vous verrez que le courage ne vous manquera pas »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}, {"text": "« La Croix est le plus savant livre qu’on peut lire. C’est la crainte des croix qui est notre grande croix. »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}], "vertus": [{"label": "Avoir foi en Dieu", "citation": "« Prendre le bouclier de la Foi, la cuirasse de la Charité, le casque de l’Espérance, et le glaive de l’Esprit »", "author": "Abbé Serenus", "rest": " : lui seul peut tout."}, {"label": "Avoir confiance en Dieu dans les épreuves, demander son secours et faire notre part", "citation": "« Que fera l’homme en toute tentation qui lui survient, et pour toute suggestion de l’ennemi ? Il doit pleurer devant la bonté de Dieu afin qu’elle lui vienne en aide, et il sera soulagé rapidement, pourvu qu’il demande en connaissance de cause. Il est écrit, en effet : Le Seigneur est mon secours, et je ne craindrai pas ce que me fera un homme »", "author": "Abbé Moïse", "rest": ""}, {"label": "Garder l’espérance au cœur de la souffrance", "citation": "« La Foi va de soi. La Charité va malheureusement de soi. Mais l’Espérance ne va pas de soi. L’Espérance ne va pas toute seule. Pour espérer, mon enfant, il faut être bienheureux, il faut avoir obtenu, reçu une grande grâce. La Foi voit ce qui est. La Charité aime ce qui est. L’Espérance voit ce qui n’est pas encore et qui sera. Elle aime ce qui n’est pas encore et qui sera. Sur le chemin montant, sablonneux, malaisé. Sur la route montante. Traînée, pendue aux bras de des grandes sœurs, qui la tiennent par la main, la petite espérance s’avance. Et au milieu de ses deux grandes sœurs elle a l’air de se laisser traîner. Comme une enfant qui n’aurait pas la force de marcher. Et qu’on traînerait sur cette route malgré elle. Et en réalité c’est elle qui fait marcher les deux autres. Et qui les traîne, et qui fait marcher le monde. Et qui le traîne. Car on ne travaille jamais que pour les enfants. Et les deux grandes ne marchent que pour la petite. »", "author": "Charles Péguy", "rest": " : c’est elle qui nous sauvera."}, {"label": "Accepter la Croix comme pain quotidien", "citation": "« Nous ne voulons pas admettre que la souffrance est nécessaire à notre âme ; que la croix doit être notre pain quotidien. La Croix est nécessaire à l’âme comme la nourriture au corps. Jour après jour ; c’est elle qui la purifie et la libère de son attachement aux créatures. Nous avons du mal à comprendre que Dieu ne veut pas, ne peut pas nous sauver sans la Croix ; et plus Il attire une âme à Lui, plus Il la purifie par la Croix. »", "author": "Saint Padre Pio", "rest": ""}], "graces": [{"label": "Regarder vers le haut quand nous sommes tirés vers le bas", "citation": null, "author": null, "rest": ", autant que nous devons regarder vers le bas lorsque nous sommes élevés."}, {"label": "Prendre ses responsabilités et regarder devant", "citation": "« Me voici, je viens pour accomplir Votre volonté », il reçoit maintenant la croix et l’embrasse avec amour", "author": null, "rest": " : alors que nous fuyons si souvent devant nos responsabilités, alors que nous ne voulons pas subir les conséquences de nos actions, alors même que la souffrance nous fait horreur, Jésus va jusqu’au bout : Lui qui s’était présenté à son Père en disant."}, {"label": "Prendre patience", "citation": "« Si quelqu’un veut venir après moi, qu’il prenne sa croix et me suive » ? Et si parfois elle vous semble trop pesante, croyez de toutes vos forces qu’un autre Simon de Cyrène viendra vous aider à la porter", "author": null, "rest": " : ne pouvez-vous pas aider mon Fils à porter sa croix, si lourde, en acceptant les vôtres, si petites ? Ne voulez-vous pas vous souvenir de ses paroles."}, {"label": "C’est quand l’extase de la foi refroidit qu’il est temps de persévérer", "citation": "« La prière demande la constance et la persévérance notamment lorsque nous n’y sommes pas disposés. D’abord Dieu récompense la volonté et non le sentiment. »", "author": "Saint Padre Pio", "rest": ""}], "peches": [{"label": "La tiédeur", "citation": "« Il faut avoir une grande détermination de n’abandonner jamais l’oraison, pour aucune difficulté qui s’y puisse rencontrer, et d’y aller sans aucune préoccupation ni désirs d’y être consolé et satisfait ; car c’est une chose certaine que notre oraison ne sera pas moins agréable à Dieu, ni à nous moins utile, pour être faite avec plus de difficulté »", "author": "Saint François de Sales", "rest": ""}, {"label": "Le relâchement", "citation": "« Malgré les erreurs commises, celui qui a commencé à faire oraison ne doit pas y renoncer ; c’est le moyen pour lui de se guérir ; sans l’oraison, ce serait beaucoup plus difficile… Quant à ceux qui n’ont pas encore commencé, pour l’amour du Seigneur, je les conjure de ne pas se priver d’un si grand bien. Il ne s’agit pas de craindre mais de désirer… Si on persévère, je mets mon espérance en la miséricorde de Dieu, puisque nul ne l’a pris pour ami sans qu’il l’ait récompensé ; l’oraison mentale n’est rien d’autre, à mon avis, qu’un commerce d’amitié où on s’entretient souvent et intimement avec Celui dont nous savons qu’il nous aime. »", "author": "Sainte Thérèse d’Avila", "rest": ""}, {"label": "Le désespoir", "citation": "« Dieu ne laisse pas venir les combats sur cette génération comme sur les anciens, car il sait que les gens d’aujourd’hui sont faibles et ne peuvent les supporter »", "author": "Saint Antoine le Grand", "rest": ""}, {"label": "La tristesse", "citation": "« Je ne souffre qu’un instant. C’est parce qu’on pense au passé et à l’avenir qu’on se décourage et qu’on désespère »", "author": "Sainte Thérèse de Lisieux", "rest": ""}, {"label": "La colère", "citation": "« Que le soleil ne se couche pas sur votre colère »", "author": "Eph., 4, 26", "rest": ""}, {"label": "Se justifier sans cesse", "citation": "« Délaissant le fardeau léger, c’est-à-dire le blâme de ses fautes, nous avons pris la lourde charge, à savoir la manie de se justifier »", "author": "Saint Jean Colobos", "rest": ""}, {"label": "La colère (l’œil troublé)", "citation": "« Si l’œil est troublé par la colère, il ne voit rien avec clémence. »", "author": "Saint Bernard de Clairvaux", "rest": ""}, {"label": "La colère (ne jamais la laisser monter à la gorge)", "citation": "« Pourquoi les démons ont-ils si peur de toi ? Parce que, depuis que je suis moine, je m’exerce à ne jamais laisser la colère monter jusqu’à ma gorge »", "author": "Isidore le Grand", "rest": ""}, {"label": "La colère et la prière", "citation": "« Si tu aspires à prier, ne fais rien de tout ce qui est incompatible avec la prière, afin que Dieu s’approche et fasse route avec toi. S’il te survient quelque provocation ou contradiction et que tu sois irrité et sentes ta colère se porter à rendre la pareille ou à répliquer, souviens-toi de la prière et du jugement qui t’y attend, et aussitôt le mouvement désordonné s’apaisera en toi. Tout ce que tu feras pour te venger d’un frère qui t’aura fait du tort, tout cela te deviendra une pierre d’achoppement au moment de la prière. »", "author": "Evagre le Pontique", "rest": ""}], "clausules": {"courte": "Et Jésus, qui porte sa croix.", "longue": ["Et Jésus, dont Pilate proclame l’innocence, est béni.", "Et Jésus, condamné à mort et chargé de sa croix, est béni.", "Et Jésus, qui tombe trois fois sous le poids de la croix, est béni.", "Et Jésus, qui se relève pour nous apprendre à nous relever de nos fautes, est béni.", "Et Jésus, que tu rencontres sur la route du calvaire, est béni.", "Et Jésus, avec qui tu souffres pour notre salut, est béni.", "Et Jésus, que Simon de Cyrène aide à porter sa croix, est béni.", "Et Jésus, qui imprime sa face sur le voile de Véronique, est béni.", "Et Jésus, qui nous invite à pleurer sur nos péchés, est béni.", "Et Jésus, qui nous apprend à porter notre croix, est béni."]}}, {"n": "V", "title": "Le crucifiement", "fruit": "L’amour de Dieu et le salut des âmes", "parole": {"text": "Lorsqu’on fut arrivé au lieu dit Le Crâne, ou Calvaire, on mit Jésus en croix, avec les deux malfaiteurs, l’un à droite et l’autre à gauche. Jésus disait : « Père, pardonne-leur : ils ne savent pas ce qu’ils font »… Il était déjà presque midi ; l’obscurité se fit dans tout le pays jusqu’à trois heures, car le soleil s’était caché. Le rideau du temple se déchira par le milieu. Alors, Jésus poussa un grand cri : « Père, entre tes mains je remets mon esprit » (Lc 23, 32-33, 44-46).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "La croix romaine et le Golgotha"}, {"t": "p", "x": "La crucifixion était le supplice romain des esclaves et des séditieux, conçu pour humilier autant que pour tuer : on l’infligeait hors les murs, en lieu passant, pour frapper les esprits. Jean situe la scène au Golgotha, « lieu du Crâne » (en latin Calvaria), tertre proche d’une porte de Jérusalem. Cette proximité et l’écriteau exposé donnent à la mort de Jésus le caractère d’un événement public, offert au regard des nations."}, {"t": "s", "x": "L’écriteau en trois langues"}, {"t": "p", "x": "Au-dessus du crucifié, Pilate fait clouer le titulus portant le motif de la condamnation : « Jésus le Nazaréen, roi des Juifs ». Détail propre au quatrième évangile, il est rédigé en hébreu, en latin et en grec – les trois langues du monde d’alors : celle de la révélation, celle de l’Empire, celle de la culture. Les grands prêtres protestent ; Pilate tranche : « Ce que j’ai écrit, je l’ai écrit. » Sans le savoir, il proclame à la face de l’univers une royauté que sa réticence n’efface pas."}, {"t": "s", "x": "Le partage des vêtements et la tunique sans couture"}, {"t": "p", "x": "Selon l’usage, les soldats se partagent les habits du supplicié, ultime dépouillement de l’homme livré nu à la mort. Mais la tunique, « sans couture, tissée d’une seule pièce depuis le haut », ne peut être déchirée : ils la tirent au sort, accomplissant le Psaume 22, 19. Plusieurs Pères, dont saint Cyprien, ont reconnu dans ce vêtement d’un seul tenant le symbole de l’unité indéchirable de l’Église ; d’autres y lisent la robe du grand prêtre, signe du sacerdoce du Crucifié."}, {"t": "s", "x": "« Père, pardonne-leur »"}, {"t": "p", "x": "Première des trois paroles en croix que rapporte Luc, cette prière révèle le cœur du mystère : Jésus intercède pour ses bourreaux au moment même où ils le clouent. Il accomplit ainsi son propre enseignement – « aimez vos ennemis » (Lc 6, 27-28) – et inaugure la lignée des martyrs, qu’Étienne imitera (Ac 7, 60). L’ignorance invoquée n’excuse pas la faute, mais ouvre la porte du pardon et laisse place à la conversion."}, {"t": "s", "x": "Les outrages et la tentation finale"}, {"t": "p", "x": "Chefs, soldats et l’un des crucifiés se moquent en triple vague : « qu’il se sauve lui-même s’il est le Messie ! » Le verbe sōzein (sauver) revient comme un refrain ironique, car Jésus sauve précisément en ne se sauvant pas. L’écriteau – « Celui-ci est le roi des Juifs » – proclame une vérité royale. Le « sauve-toi toi-même » fait écho aux tentations du désert (Lc 4, 9-12) : dernière offensive du Tentateur, invitant le Fils à refuser la Croix."}, {"t": "s", "x": "Le bon larron"}, {"t": "p", "x": "Scène propre à Luc et sommet de sa théologie de la miséricorde. L’un des malfaiteurs reconnaît sa faute, confesse l’innocence de Jésus, puis supplie : « souviens-toi de moi quand tu viendras dans ton Royaume » – acte de foi en un crucifié comme roi. La réponse dépasse la demande : « aujourd’hui (sēmeron), tu seras avec moi dans le paradis ». Cet « aujourd’hui » cher à Luc dit l’immédiateté du salut ; le paradeisos, jardin retrouvé, ouvre l’Éden perdu."}, {"t": "s", "x": "La mort de Jésus"}, {"t": "p", "x": "Trois signes scellent ce moment : les ténèbres sur tout le pays (Am 8, 9), le voile du Temple déchiré – l’ancien culte achevé, l’accès à Dieu désormais ouvert (He 10, 19-20) – et la dernière parole. Là où Marc rapporte un cri de déréliction, Luc place une citation paisible du psaume : « Père, entre tes mains je remets mon esprit » (Ps 31, 6). Jésus meurt dans la confiance filiale, maître de l’heure. Le centurion païen confesse : « vraiment, cet homme était juste » ; les foules s’en retournent en se frappant la poitrine."}, {"t": "s", "x": "« Femme, voici ton fils »"}, {"t": "p", "x": "Propre à Jean, la scène réunit au pied de la croix quelques femmes et le disciple bien-aimé. À sa mère, Jésus dit : « Femme, voici ton fils » ; au disciple : « voici ta mère ». Le titre de « Femme » fait écho à Cana (2, 4) et à la femme de la Genèse (Gn 3, 15). En confiant Marie au disciple, le Christ lui donne une maternité spirituelle qui déborde le seul Jean : la tradition catholique y voit Marie établie Mère de l’Église, au moment même où s’enfante le salut."}, {"t": "s", "x": "« J’ai soif » et « Tout est accompli »"}, {"t": "p", "x": "« J’ai soif » : derrière la souffrance réelle du crucifié, Jean entend l’accomplissement de l’Écriture (Ps 69, 22) et la soif ardente que Dieu a de notre salut. Le vinaigre présenté au moyen d’une branche d’hysope rappelle la Pâque (Ex 12, 22). Puis vient la parole décisive : « Tout est accompli » (tetelestai) – non le cri d’un vaincu, mais l’annonce d’une œuvre menée à son terme. « Il remit l’esprit » (paredōken to pneuma) : il livre son souffle librement, en plein don de soi."}, {"t": "s", "x": "Le côté transpercé : le sang et l’eau"}, {"t": "p", "x": "Pour hâter la mort avant le sabbat, on brise les jambes des suppliciés ; à Jésus déjà mort, on ne les brise pas, en sorte que s’accomplit la prescription de l’agneau pascal : « aucun de ses os ne sera brisé » (Ex 12, 46 ; Ps 34, 21). Un soldat lui perce le côté, et « aussitôt il en sortit du sang et de l’eau ». Les Pères y contemplent la naissance des sacrements – l’eau du baptême, le sang de l’Eucharistie – et de l’Église, nouvelle Ève tirée du côté ouvert du nouvel Adam endormi."}, {"t": "s", "x": "Le témoignage du disciple"}, {"t": "p", "x": "Jean scelle le récit d’une note insistante : « Celui qui a vu rend témoignage, et son témoignage est véridique […], afin que vous croyiez aussi. » L’évangéliste se présente en témoin oculaire, garant de la réalité charnelle de la Passion. Deux citations couronnent le tout : l’os non brisé de l’agneau et le regard porté sur « celui qu’ils ont transpercé » (Za 12, 10), promesse d’une conversion pour ceux qui lèveront les yeux vers le Crucifié."}, {"t": "s", "x": "Les ténèbres de midi à trois heures"}, {"t": "p", "x": "« De la sixième heure (midi) à la neuvième (15 h), il y eut des ténèbres sur toute la terre. » L’obscurité en plein jour est, dans la Bible, un signe de deuil cosmique et de jugement (« je ferai coucher le soleil en plein midi », Am 8, 9) : la création elle-même s’assombrit à la mort de son Seigneur."}, {"t": "s", "x": "« Éli, Éli, lema sabactani ? »"}, {"t": "p", "x": "Le grand cri de Jésus est le premier verset du Psaume 22, prononcé en araméen/hébreu : « Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné ? » Les assistants comprennent de travers (« il appelle Élie ») ; on lui tend une éponge de vinaigre (Ps 69, 22). Puis Jésus, poussant « de nouveau un grand cri », rend l’esprit (litt. « il remit l’esprit » – librement)."}], "comm": [{"t": "h", "x": "B – Commentaire :"}, {"t": "s", "x": "1. Le cri : non le désespoir, mais le Psaume 22"}, {"t": "p", "x": "Le cri de Jésus n’est pas un désespoir : c’est la prière du Psaume 22, qui, parti de la détresse, s’achève dans la confiance et la louange de toutes les nations. Le Fils assume notre abandon – il prend sur lui le cri de tout homme accablé – pour le racheter de l’intérieur. Il prie notre déréliction pour la sauver."}, {"t": "s", "x": "2. Le voile déchiré : l’accès rouvert"}, {"t": "p", "x": "Le voile déchiré « du haut jusqu’en bas » (donc par Dieu, non par une main d’homme) signifie que, par la mort du Christ, l’accès au Saint des saints – à Dieu – est désormais ouvert : l’ancien culte est achevé, le chemin vers le Père est rouvert (cf. He 10, 19-20). Les saints ressuscités sont les prémices de la victoire du Christ sur la mort."}, {"t": "s", "x": "3. Le centurion, prémices des nations"}, {"t": "p", "x": "Que le premier à confesser « Fils de Dieu » au pied de la croix soit un centurion païen annonce l’Église des nations : la Croix conduit les païens à la foi. Le Calvaire, lieu de la mort, devient le lieu de la première profession de foi pascale."}], "saints": [{"text": "« Ici, l’Évangéliste décrit la mort du Christ. Et d’abord il expose la cause de sa mort. En effet, il ne faut pas comprendre que c’est parce qu’il a remis l’esprit qu’il a incliné la tête, mais le contraire. Car l’inclination de la tête désigne l’obéissance, au nom de laquelle il a supporté la mort – Il s’est fait obéissant jusqu’à la mort. En second lieu nous est montrée la puissance de celui qui meurt parce qu’Il remit l’Esprit par sa propre puissance – Personne ne me l’enlève mon âme, mais moi je la livre de moi-même. Car, comme le dit Augustin, nul n’a ainsi en son pouvoir de dormir quand il veut, comme le Christ de mourir quand il le voulut. »", "author": "Saint Thomas d’Aquin"}], "vertus": [{"label": "Pardonner comme Jésus", "citation": "« Les moines ont perdu leur noblesse, qui est de dire : Pardon »", "author": "Théodore de Phermé", "rest": " : du haut de la croix, Jésus ne maudit pas mais pardonne. Suprême révélation de l’amour qui ne se reprend pas. Demander la grâce de pardonner ceux qui nous blessent, jusqu’à prier pour eux, est le sommet de la charité chrétienne et la marque la plus sûre du disciple. Là où l’instinct réclame vengeance, l’Esprit du Crucifié rend capable de bénir."}, {"label": "L’espérance", "citation": "« Aujourd’hui, avec moi dans le paradis ». Le bon larron est la grande espérance des pécheurs : il n’est jamais trop tard, et la miséricorde accueille quiconque se tourne vers le Christ, fût-ce au dernier souffle. Une vie d’égarements peut s’achever en un instant de foi vraie. Cette scène interdit pourtant la présomption autant que le désespoir : nul repentir sincère n’est rejeté, mais nul ne diffère sa conversion sans péril", "author": null, "rest": ""}, {"label": "L’abandon à Dieu", "citation": "« Entre tes mains je remets mon esprit ». La dernière parole de Jésus devient le modèle de l’abandon confiant au Père. L’Église en a fait la prière du soir et de l’agonie (complies), remettant chaque jour et finalement toute la vie entre les mains de Dieu. Mourir ainsi suppose d’avoir d’abord vécu dans cette confiance, déposant ses peurs et son avenir en Celui qui nous garde. La mort devient alors un acte de foi", "author": null, "rest": ""}, {"label": "Puiser à la source du côté ouvert. Du côté transpercé jaillissent l’eau et le sang", "citation": null, "author": null, "rest": " : le croyant est appelé à y puiser sans cesse, par le baptême qui le fait renaître et l’Eucharistie qui le nourrit. C’est là le foyer de la dévotion au Sacré-Cœur, où l’Église a reconnu l’amour de Dieu rendu visible. Toute grâce nous vient de la croix, d’où l’Église elle-même est née."}, {"label": "Le voile déchiré", "citation": "« entrer dans le sanctuaire » avec assurance (He 10, 19). De quoi vivre dans une proximité filiale, sans la crainte du voile.", "author": null, "rest": " : entrer auprès du Père. Par la mort du Christ, plus rien ne nous sépare du Père, sinon notre refus. La Croix a rouvert le chemin : nous pouvons."}, {"label": "Se libérer de soi-même (devenir saint)", "citation": "« Le mot “saint” exprime la nature particulière de Dieu. Lui seul est le Saint. L’homme devient saint dans la mesure où il commence à être avec Dieu. Être avec Dieu, c’est écarter ce qui est seulement le moi et devenir un avec le tout de la volonté de Dieu. Cependant, cette libération du moi peut se révéler douloureuse, et n’est jamais accomplie une fois pour toutes »", "author": "Benoît XVI", "rest": ""}, {"label": "Trois renoncements", "citation": null, "author": "Saint Jean Cassien", "rest": " : mépriser les richesses et honneurs du monde ; rejeter les passions, affections, vices déréglés de l’esprit et de la chair ; bannir de notre âme les choses visibles au profit des choses invisibles."}], "graces": [{"label": "La grâce de la conversion pour mériter le rachat de nos péchés", "citation": "« Jésus, souviens-toi de moi… — Aujourd'hui, tu seras avec moi dans le Paradis » (Lc 23, 42-43). Le bon larron : la conversion au pied de la Croix, arrachée au dernier souffle. C'est le mystère même.", "author": null, "rest": ""}, {"label": "Accueillir Marie pour mère", "citation": "« la prit chez lui », chaque croyant est invité à recevoir Marie dans sa vie et à lui faire une place réelle. La dévotion mariale n’est pas un ajout sentimental, mais l’accueil d’un don du Crucifié lui-même : se laisser conduire par celle qu’il nous a donnée pour mère fait entrer plus avant dans la confiance filiale et l’intimité du Fils", "author": null, "rest": " : comme le disciple bien-aimé qui, dès cette heure,."}, {"label": "Contempler l’œuvre achevée", "citation": "« Tout est accompli » : devant la croix, le chrétien apprend qu’il n’a rien à ajouter à la rédemption, mais tout à recevoir. La tentation reste grande de vouloir compléter par ses efforts ce que le Christ a parfaitement accompli. La vie spirituelle commence par cet accueil émerveillé : laisser l’amour donné jusqu’au bout devenir la source, et non le salaire, de notre propre don.", "author": null, "rest": ""}, {"label": "Regarder le Transpercé", "citation": "« Ils regarderont celui qu’ils ont transpercé » : cette parole demeure adressée à chaque génération. Contempler longuement le Crucifié, sans détourner les yeux de sa blessure, engendre la componction du cœur et fait naître l’amour en retour. Le regard de la foi transforme : de la croix méditée découle une vie peu à peu conformée à celui qui s’est livré, jusqu’à aimer comme il a aimé.", "author": null, "rest": ""}, {"label": "Le cri d’abandon sanctifié", "citation": null, "author": null, "rest": " : dans nos heures d’abandon – quand Dieu paraît absent –, ce cri de Jésus sanctifie le nôtre : on peut crier vers Dieu sa détresse, c’est encore une prière, et elle débouche sur la confiance (comme le Psaume 22). Le Christ a connu cette nuit pour nous y rejoindre ; nous n’y sommes jamais seuls."}], "peches": [{"label": "Les vaines gloires terrestres", "citation": "« Je suis étranger et voyageur sur la terre »", "author": "Psaume 37, 13", "rest": " : la vie est dans la Croix."}, {"label": "La peur de la mort", "citation": "« Souviens-toi de ta sortie, et n’oublie pas le jugement éternel, et il n’y aura oas de dissonance dans ton âme »", "author": "Evagre le Pontique", "rest": " : la mort est une promesse de la résurrection."}, {"label": "La haine et le refus de pardonner", "citation": "« Il est bon de ne pas se mettre en colère, mais si cela arrive, l’apôtre ne te concède même pas un délai d’un jour pour la passion, car il dit : « Que le soleil ne se couche pas sur elle (Ep 4, 26). Mais toi, tu attends jusqu’au couchant de ta vie. Pourquoi hais-tu l’homme qui t’a contristé ? Ce n’est pas lui qui commet l’injustice, c’est le diable. Hais la maladie, mais non le malade »", "author": "Sisoès", "rest": ""}, {"label": "La vanité (Dieu seul est la Pierre)", "citation": "« Reconnais donc enfin que Dieu seul est la Pierre sur laquelle on puisse reposer. Tout le reste et creux et décevant : c’est le monde des apparences et non des réalités. Elles ne sont d’aucun secours, car on les acquiert à grand peine, on les possède dans l’inquiétude, et on les quitte avec chagrin. Si tu as du jugement, regarde de haut ce qui ne fait que passer, afin de n’être pas entraîné dans l’avalanche. Ne fait qu’un avec Celui qui demeure éternellement ; attache-toi à Lui par le lien de l’Amour ; élève ton cœur vers Dieu, afin qu’il ne croupisse pas sur la terre. »", "author": "Saint Robert Bellamin", "rest": ""}, {"label": "La colère, obstacle à la prière", "citation": "« J’ai passé quatorze ans à Scété, priant nui et jour Dieu qu’il m’accorde de vaincre la colère »", "author": "Abbé Ammonas", "rest": ""}], "clausules": {"courte": "Et Jésus, qui porte sa croix.", "longue": ["Et Jésus, dépouillé de ses vêtements, est béni.", "Et Jésus, crucifié entre deux malfaiteurs, est béni.", "Et Jésus, qui crie : « J’ai soif », est béni.", "Et Jésus, qui dit : « Père, pardonne-leur ; ils ne savent pas ce qu’ils font », est béni.", "Et Jésus, qui te demande d’être notre mère, est béni.", "Et Jésus, qui promet le paradis au bon larron, est béni.", "Et Jésus, qui remet son esprit entre les mains de son Père, est béni.", "Et Jésus, qui meurt d’amour pour nous, est béni", "Et Jésus, dont le côté est transpercé, est béni.", "Et Jésus, qui, élevé de terre, attire tout à lui, est béni."]}}]}, {"key": "Glorieux", "name": "Mystères glorieux", "subtitle": "la gloire promise", "mysteres": [{"n": "I", "title": "La résurrection", "fruit": "La foi et la conversion", "parole": {"text": "Le premier jour de la semaine, de grand matin, les femmes se rendirent au sépulcre, portant des aromates qu’elles avaient préparés. Elles trouvèrent la pierre roulée sur le côté du tombeau. Elles entrèrent, mais ne trouvèrent pas le corps du Seigneur Jésus. Elles ne savaient que penser, lorsque deux hommes se présentèrent à elles, avec un vêtement éblouissant. Saisies de crainte, elles baissaient le visage vers le sol. Ils leur dirent : « Pourquoi cherchez-vous le Vivant parmi les morts ? Il n’est pas ici, il est ressucité » (Lc 24, 1-6).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "Le premier jour de la semaine"}, {"t": "p", "x": "« Le premier jour de la semaine, au point du jour » : les femmes ont d’abord respecté le sabbat, durant lequel toute marche et tout travail étaient proscrits, et elles n’agissent qu’à l’aube du lendemain. Ce « premier jour » deviendra le dimanche, le « jour du Seigneur », parce que la Résurrection y inaugure une création nouvelle, comme la lumière au premier jour de la Genèse. Luc ancre ainsi l’événement pascal dans un cadre liturgique précis, que la communauté chrétienne reconnaîtra vite comme le cœur de sa semaine."}, {"t": "s", "x": "Les aromates et la sépulture"}, {"t": "p", "x": "Les femmes apportent les aromates qu’elles avaient préparés (cf. 23, 56) : myrrhe, aloès et onguents servaient à honorer le corps et à en atténuer la corruption, dans une terre où la chaleur hâtait la décomposition. Ce geste, achevé trop tôt interrompu par le sabbat, trahit un amour fidèle mais encore sans espérance : elles viennent pour un mort, non pour un Vivant. Leur sollicitude prolonge celle des grandes figures de l’ensevelissement dans l’Ancien Testament, où soigner les défunts était un devoir sacré de piété."}, {"t": "s", "x": "Le témoignage des femmes"}, {"t": "p", "x": "Ce sont des femmes qui découvrent le tombeau ouvert et reçoivent l’annonce. Or, dans le cadre juridique du temps, leur témoignage comptait pour peu et n’était guère reçu devant un tribunal : détail qui plaide paradoxalement pour l’historicité du récit. Une légende forgée n’aurait pas choisi de tels témoins, jugés peu crédibles ; l’Église, en les nommant – Marie-Madeleine, Jeanne, Marie de Jacques –, honore au contraire ces premières messagères de Pâques que la tradition appellera « apôtres des apôtres »."}], "comm": [{"t": "h", "x": "B – Commentaire :"}, {"t": "s", "x": "Le tombeau vide"}, {"t": "p", "x": "La pierre roulée et le corps absent constituent un premier signe, mais un signe qui, seul, ne prouve rien encore : « elles ne savaient que penser ». Le tombeau vide interroge plus qu’il n’affirme ; il peut se prêter à mille interprétations, y compris celle du vol. Luc le présente comme une question ouverte, un seuil : il faudra la Parole des anges, puis la rencontre du Ressuscité, pour que ce vide se change en annonce et que l’absence devienne présence d’un autre ordre."}, {"t": "s", "x": "« Pourquoi cherchez-vous le Vivant parmi les morts ? »"}, {"t": "p", "x": "Deux hommes en habits éblouissants – figures angéliques, selon le langage biblique des théophanies – surprennent les femmes saisies de crainte et proclament : « Il n’est pas ici, il est ressuscité » (ēgerthē, un passif qui dit l’action de Dieu relevant son Fils). La question « Pourquoi cherchez-vous le Vivant parmi les morts ? » retourne toute la démarche : le Christ n’appartient plus au domaine du tombeau. C’est la première annonce pascale, sobre et bouleversante, qui ouvre l’évangile sur la vie sans fin."}, {"t": "s", "x": "« Rappelez-vous ce qu’il vous a dit en Galilée »"}, {"t": "p", "x": "Les anges renvoient les femmes aux annonces de la Passion faites en Galilée (cf. 9, 22 ; 18, 31-33) : « il faut (dei) que le Fils de l’homme soit livré… et le troisième jour ressuscite ». Ce dei dit la nécessité d’un dessein divin inscrit dans les Écritures. Alors « elles se souvinrent de ses paroles » : la foi pascale ne naît pas du seul tombeau vide, mais du rappel de la Parole, lorsque l’événement et la promesse se rejoignent et s’éclairent l’un l’autre."}, {"t": "s", "x": "L’incrédulité des Onze et Pierre au tombeau"}, {"t": "p", "x": "De retour, les femmes rapportent tout aux Onze ; mais ces propos leur parurent du radotage (lēros, délire de malade) et « ils ne les crurent pas ». Cette incrédulité des apôtres, loin d’être masquée, souligne que la Résurrection ne fut pas un rêve aisément accueilli. Pierre, pourtant, se lève et court au tombeau ; il voit « les linges seuls » – signe d’un corps non dérobé – et s’en retourne « étonné ». La foi chemine ici par étapes, du soupçon à l’émerveillement."}], "saints": [{"text": "« Ô nuit, illumine-toi ! Ombres, disparaissez ! L’éternelle Lumière a paru ! Béni soit le Seigneur ! Alléluia ! La lumière du Christ brille, la nuit s’illumine, la nuit étincelle, le Christ est ressuscité ! Alleluia ! »", "author": "Saint Charles de Foucauld"}], "vertus": [{"label": "Chercher le Vivant", "citation": "« Pourquoi cherchez-vous le Vivant parmi les morts ? » La question nous est aussi adressée. Trop souvent nous cherchons le Christ du côté de ce qui est mort : un passé révolu, nos péchés ressassés, nos désespoirs, nos idoles sans vie. Pâques nous réoriente : le Seigneur est vivant, en avant de nous, et c’est vers le Ressuscité qu’il faut tourner notre quête, non vers les tombeaux que nous gardons dans le cœur.", "author": null, "rest": ""}, {"label": "Se souvenir de sa Parole", "citation": "« souvenez-vous ». De même, notre vie spirituelle se nourrit de la mémoire de la Parole : relire, méditer et garder ce que Jésus a dit éclaire en retour les événements de notre existence. Sans cette mémoire vivante, les signes restent muets ; avec elle, les épreuves elles-mêmes se relisent à la lumière de la promesse déjà donnée et désormais accomplie.", "author": null, "rest": " : La foi des femmes renaît au."}, {"label": "Le témoignage des humbles", "citation": null, "author": null, "rest": " : Dieu confie l’annonce de la Résurrection à des femmes, tenues alors pour des témoins négligeables : il choisit les humbles et les petits pour porter sa plus grande nouvelle. À leur suite, savoir accueillir la vérité d’où qu’elle vienne, et honorer ceux que le monde n’écoute pas, souvent d’abord incompris. L’Évangile se transmet ainsi par des messagers fragiles, dont la seule force est d’avoir vu et d’avoir cru."}, {"label": "De l’étonnement à la foi", "citation": null, "author": null, "rest": " : comme Pierre, nul ne croit d’un coup. Il faut accueillir les signes, se laisser étonner, se mettre en chemin : la foi pascale grandit peu à peu, du trouble à la lumière. Cet itinéraire est le nôtre : à travers nos doutes et nos lenteurs, l’Esprit conduit du soupçon à l’adoration, pourvu qu’on coure, comme l’Apôtre, vérifier de ses yeux ce que la Parole avait annoncé."}, {"label": "Bien parler (la parole bonne rend bons)", "citation": "« Une parole mauvaise rend mauvais même les bons, et la bonne parole rend bons même les mauvais »", "author": "Abbé Macaire", "rest": ""}, {"label": "Mettre sa parole au diapason du cœur", "citation": "« Apprends à ta bouche à dire ce qui est dans ton cœur »", "author": "Poemen", "rest": ""}], "graces": [{"label": "Une rencontre, puis un envoi", "citation": null, "author": null, "rest": " : la Résurrection se rencontre (on n’annonce bien le Ressuscité que pour l’avoir trouvé) et envoie (« allez dire »). Comme les femmes, passer de la peur à la joie, et courir le dire. La foi pascale est missionnaire par nature."}, {"label": "Honorer le Jour du Seigneur", "citation": "« premier jour de la semaine » est devenu le dimanche, jour où l’Église célèbre chaque semaine la Résurrection. Honorer le dimanche – par l’Eucharistie, le repos, la joie – c’est faire mémoire, chaque huitaine, que « le Seigneur est vraiment ressuscité »", "author": "Lc 24, 34", "rest": " : le."}, {"label": "La joie pascale", "citation": "« Demeurons soumis au bon plaisir de Dieu ; soyons contents dans tous les états où il lui plaira de nous mettre, et ne désirons jamais d’en sortir qu’autant que nous connaîtrons lui être agréables »", "author": "Saint Vincent de Paul", "rest": ""}], "peches": [{"label": "Le désespoir devant la mort", "citation": "Le Christ est ressuscité des morts ; par la mort, il a terrassé la mort. « Ô mort, où est ta victoire ? Ô mort, où est ton aiguillon ? »", "author": "1 Co 15, 55", "rest": ""}, {"label": "Aller au-delà du visible", "citation": null, "author": null, "rest": " : en apparence, Jésus est abandonné de son Père, Marie est abandonnée de son Fils. Quand l’épreuve nous accable, regardons Jésus, regardons Marie."}, {"label": "Confesser ses péchés", "citation": "« Ressuscite avec moi après l’Absolution sacramentelle et, d’une façon spéciale, après ta retraite annuelle. Dédie-toi à une vie nouvelle, c’est-à-dire à une vie ressuscitée quant à l’esprit. Cela te deviendra beaucoup plus facile, si tu tends avec joie à une continuelle Présence de Dieu, à une Présence amoureuse, confiante, intéressée parce que nécessiteuse, Te faisant recourir à moi qui Te suis toujours présent. »", "author": "Sœur Benigna Consolata Ferrero", "rest": ""}, {"label": "Juger autrui (s’étonner de la chute du frère)", "citation": "« L’un des vieillards vint chez l’abbé Théodore et lui dit : « Voici que tel frère est retourné dans le monde ». Et le vieillard lui dit : « Cela t’étonne ? Non, étonne-toi plutôt si tu apprends que quelqu’un a pu échapper à la gueule de l’ennemi »", "author": "Abbé Théodore de Phermé", "rest": ""}], "clausules": {"courte": "Et Jésus, mort et ressuscité.", "longue": ["Et Jésus, qui sort glorieux du tombeau, est béni.", "Et Jésus, dont les anges annoncent la résurrection, est béni.", "Et Jésus, dont Pierre et Jean trouvent le tombeau vide, est béni.", "Et Jésus, qui t’apparaît après sa résurrection, est béni.", "Et Jésus, qui apparaît à Marie-Madeleine, est béni.", "Et Jésus, qui chemine avec les disciples d’Emmaüs, est béni.", "Et Jésus, qui apparaît aux apôtres, est béni.", "Et Jésus, qui montre ses plaies à Thomas, est béni.", "Et Jésus, qui confie son Église à Pierre, est béni.", "Et Jésus, qui a vaincu la mort, est béni."]}}, {"n": "II", "title": "L’ascension", "fruit": "L’espérance et le désir du Ciel", "parole": {"text": "Le Seigneur Jésus, après leur avoir parlé, fut enlevé au ciel et s’assit à la droite de Dieu » (Mc 16, 19).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "La « finale longue » et sa réception"}, {"t": "p", "x": "Ces versets, dits « finale longue », sont absents des plus anciens manuscrits grecs (Sinaïticus, Vaticanus) et présentent un style un peu différent ; la critique les tient pour une conclusion ajoutée dès le IIe siècle pour ne pas laisser l’évangile sur le silence du v. 8. L’Église catholique les reçoit néanmoins comme Écriture canonique et inspirée : le concile de Trente a fixé la canonicité des livres « avec toutes leurs parties » telles qu’on les lit dans la Vulgate. On les lit donc en toute confiance, tout en sachant honnêtement leur histoire textuelle."}, {"t": "s", "x": "Un abrégé des apparitions pascales"}, {"t": "p", "x": "La finale longue se présente comme un résumé des apparitions rapportées ailleurs : Marie de Magdala (cf. Jn 20), les deux disciples en chemin (les pèlerins d’Emmaüs, cf. Lc 24), enfin les Onze à table. Elle ramasse en quelques lignes l’expérience pascale de toute l’Église primitive."}, {"t": "s", "x": "Béthanie et le mont des Oliviers"}, {"t": "p", "x": "Jésus emmène les siens « vers Béthanie », village blotti sur le versant oriental du mont des Oliviers, près de Jérusalem (cf. Jn 11, 18). Ce lieu n’est pas neutre : c’est de là que vient le Christ pour son entrée messianique (19, 29), et la tradition prophétique attendait que le Seigneur se tînt sur cette montagne au jour du salut (cf. Za 14, 4). En faisant partir le Ressuscité de ce versant tourné vers la Ville sainte, Luc inscrit l’Ascension dans la géographie même de l’attente d’Israël."}, {"t": "s", "x": "Le geste sacerdotal de la bénédiction"}, {"t": "p", "x": "« Levant les mains, il les bénit » : le geste est celui du prêtre, et plus précisément du grand prêtre descendant de l’autel pour bénir l’assemblée. L’arrière-plan vétérotestamentaire est net : Aaron « éleva les mains vers le peuple et le bénit » (Lv 9, 22), et le Siracide décrit la majesté du grand prêtre Simon bénissant la multitude (Si 50, 20-21). Le Christ s’en va donc en accomplissant le sacerdoce : ses mains, hier percées, se lèvent désormais pour répandre la grâce sur les siens."}, {"t": "s", "x": "Fin de l’évangile, seuil des Actes"}, {"t": "p", "x": "Luc clôt ici son premier livre par un récit volontairement bref, puis il reprendra l’Ascension de façon développée au seuil des Actes (Ac 1, 9-11), après les quarante jours d’apparitions. Cette double narration n’est pas une maladresse, mais une charnière voulue : le même événement scelle le temps de Jésus et ouvre le temps de l’Église. Ce qui s’achève au soir de Pâques chez l’évangéliste devient, chez l’historien des origines, le point de départ de la mission jusqu’aux extrémités de la terre."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "Les apparitions et l’incrédulité persistante"}, {"t": "p", "x": "Un fil traverse le passage : l’incrédulité des disciples. Le témoignage de Marie : ils « ne crurent pas » ; celui des deux marcheurs : « ils ne les crurent pas davantage » ; et Jésus, apparaissant aux Onze, « leur reprocha leur incrédulité et la dureté de leur cœur ». Marc, fidèle à lui-même, ne farde pas la lenteur des disciples à croire – ce qui rend leur conversion en hardis témoins d’autant plus crédible."}, {"t": "s", "x": "L’envoi universel et le baptême"}, {"t": "p", "x": "Vient alors le mandat missionnaire : « Allez dans le monde entier, proclamez l’Évangile à toute la création. Celui qui croira et sera baptisé sera sauvé ; celui qui refusera de croire sera condamné. » L’Évangile, jusqu’ici réservé à Israël et tenu secret (le « secret messianique »), devient universel. Ce verset majeur lie foi et baptême au salut : l’Église y lit le fondement de sa mission et de la nécessité du baptême (cf. CEC 1257)."}, {"t": "s", "x": "Les signes qui accompagnent"}, {"t": "p", "x": "« Voici les signes qui accompagneront ceux qui croiront : en mon nom, ils chasseront les démons, parleront en langues nouvelles, saisiront des serpents, et si… ils ne subiront aucun mal ; ils imposeront les mains aux malades, et ceux-ci seront guéris. » Ces signes – attestés aux Actes (Paul et la vipère, Ac 28) – confirment la prédication apostolique. Ils se lisent avec sobriété : non pas défi présomptueux à Dieu, mais force du Nom de Jésus à l’œuvre dans ses témoins."}, {"t": "s", "x": "L’Ascension et la session à la droite de Dieu"}, {"t": "p", "x": "La conclusion est solennelle : « Le Seigneur Jésus, après leur avoir parlé, fut enlevé au ciel et s’assit à la droite de Dieu » (cf. Ps 110, 1) – son exaltation et sa royauté. Et l’évangile se referme sur l’Église en marche : « Eux partirent prêcher partout ; le Seigneur agissait avec eux et confirmait la Parole par les signes. » De « commencement de l’Évangile » (1, 1) à l’Évangile annoncé jusqu’aux extrémités : la boucle est bouclée, et elle s’ouvre sur nous."}, {"t": "s", "x": "« En les bénissant, il se sépara d’eux »"}, {"t": "p", "x": "Le détail est précieux : l’Ascension survient pendant la bénédiction, non après. Le Christ ne quitte pas les siens d’un geste d’adieu, il part en bénissant, et le verbe à l’imparfait suggère que cette bénédiction demeure, comme suspendue sur l’Église. « Emporté au ciel » dit alors bien plus qu’un déplacement : c’est l’exaltation du Fils, son entrée dans la gloire et sa session à la droite du Père, déjà annoncée au procès (22, 69) et proclamée à la Pentecôte (Ac 2, 33)."}, {"t": "s", "x": "L’adoration du Ressuscité"}, {"t": "p", "x": "« Ils se prosternèrent devant lui » : le verbe grec proskyneō désigne l’hommage qu’on ne rend qu’à Dieu. C’est la première adoration explicite du Christ dans cet évangile, et elle vient au moment précis où il monte vers le Père. Les disciples reconnaissent ainsi la seigneurie divine de Jésus : celui qui marchait avec eux sur les routes de Galilée est confessé Kyrios, Seigneur, digne de l’adoration réservée au seul Dieu d’Israël."}, {"t": "s", "x": "Le paradoxe de la « grande joie »"}, {"t": "p", "x": "On attendrait le chagrin d’une séparation ; Luc note au contraire qu’ils reviennent « en grande joie ». Ce paradoxe est tout l’enseignement de la scène : le départ n’est pas une perte, car le Christ n’est pas absent mais glorifié, et il a promis l’Esprit d’en haut. La joie est d’ailleurs la grande signature du troisième évangile, de l’allégresse de l’enfance (1, 14 ; 2, 10) jusqu’à cette dernière page : elle encadre toute l’œuvre comme un fil d’or."}, {"t": "s", "x": "Au Temple, à bénir Dieu"}, {"t": "p", "x": "L’évangile qui s’était ouvert au Temple, avec le prêtre Zacharie (1, 5 s), s’y achève : les disciples se tiennent « sans cesse dans le Temple, bénissant Dieu ». Cette inclusion souligne la continuité du salut avec Israël et son culte, tout en montrant la jeune communauté en attente priante de la Pentecôte. Le verbe « bénir » encadre d’ailleurs toute la scène : le Christ bénit les siens, et les siens bénissent Dieu – la grâce reçue se fait aussitôt louange."}], "saints": [{"text": "« Voyez, mes enfants, il faut réfléchir que nous avons une âme à sauver et une éternité qui nous attend »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}, {"text": "« Remarquez encore comment Jésus-Christ place sous nos yeux les récompenses qu’il nous a promises. Il nous a promis la résurrection des corps, il ressuscite le premier d’entre les morts, et donne des preuves certaines de sa résurrection en demeurant quarante jours avec ses disciples. Il nous a promis que nous serions emportés dans les airs sur les nuées, et il confirme cette promesse par ses actes : « Et en les bénissant, il se sépara d’eux, et il s’éleva vers le ciel ».", "author": "Saint Jean Chrysostome"}], "vertus": [{"label": null, "citation": "« Le Seigneur agissait avec eux ». Nous n’annonçons jamais seuls : le Christ travaille avec ses témoins et confirme leur parole. Cette assurance libère de la peur des résultats : la fécondité de la mission vient de lui, pas de nos forces.", "author": null, "rest": ""}, {"label": "Croire en Sa présence auprès de nous, chaque jour", "citation": null, "author": null, "rest": " : monté au ciel, mais présent. L’Ascension n’est pas une absence : assis à la droite du Père, le Christ règne et demeure agissant au cœur de son Église. Nous vivons sous ce regard et dans cette présence – jusqu’à ce qu’il revienne."}, {"label": "Prier davantage (l’ange terrestre)", "citation": "« Quatre mois durant, l’Abbé Macaire visita chaque jour un frère, et il ne le trouva pas une seule fois occupé à autre chose qu’à prier. Il disait avec admiration : Voici un ange terrestre »", "author": "Abbé Macaire le Citadin", "rest": ""}, {"label": "Faire le fou (fuir ou se détacher du monde)", "citation": "« Ou bien fuis complètement les hommes, ou bien moque-toi du monde et des hommes en faisant le fou la plupart du temps »", "author": "Abbé Or", "rest": ""}], "graces": [{"label": "Envoyés à toute la création. Pâques débouche sur la mission. L’Évangile n’est pas un trésor à garder pour soi", "citation": "« dans le monde entier ». L’Église est missionnaire par nature.", "author": null, "rest": " : tout baptisé est envoyé, à sa mesure, en porter l’annonce."}, {"label": "Vivre sous la bénédiction", "citation": "« en bénissant », et ce geste interrompu ne s’est jamais refermé. L’Église vit sous une bénédiction permanente, répandue depuis le ciel sur toute son histoire. À nous d’en vivre consciemment, et, à notre tour, de devenir des êtres de bénédiction : bénir Dieu par la louange, bénir le prochain par la bienveillance et le pardon, plutôt que de maudire ou de juger. La main levée du Christ appelle nos mains tendues.", "author": null, "rest": " : le Seigneur s’en va."}, {"label": "Persévérer dans la louange et l’attente", "citation": "« sans cesse dans le Temple », le disciple est invité à persévérer dans la prière et la louange, dans l’intervalle qui sépare l’Ascension du don de l’Esprit. La petite communauté en attente, assidue à bénir Dieu, est le premier modèle de l’Église : une Église qui prie avant d’agir, qui loue avant de partir en mission (cf. Ac 1, 14). De cette attente fervente naîtra la Pentecôte.", "author": null, "rest": " : comme les Onze demeurant."}], "peches": [{"label": "De l’incrédulité à la foi. Les Onze eux-mêmes ont douté ; le Ressuscité a dû les arracher à leur incrédulité. Réconfort pour nos propres lenteurs à croire", "citation": null, "author": null, "rest": " : le Christ ne se lasse pas, il reproche avec tendresse, puis envoie. La foi est un don qu’il fait grandir patiemment."}, {"label": "Le désir de conformité au monde", "citation": "« Un temps vient où les hommes seront fous, et quand ils verront quelqu’un qui n’est pas fou, ils s’insurgeront contre lui, disant : « Tu es fou ! », parce qu’ils n’est pas comme eux »", "author": "Saint Antoine le Grand", "rest": ""}, {"label": "L’intériorité manquante (ibam foras)", "citation": "« Ibam foras : je m’en allais dehors ! ». Or, Dieu n’est pas dehors, mais dedans", "author": "Saint Augustin", "rest": ""}, {"label": "La peur du changement", "citation": "« Nulle créature n’est assez parfaite pour ne plus être sujette au changement »", "author": "Abbé Théodore", "rest": ""}], "clausules": {"courte": "Et Jésus, qui nous attire vers le Ciel, est béni.", "longue": ["Et Jésus, qui monte glorieux au Ciel, est béni.", "Et Jésus, qui règne glorieux à la droite du Père, est béni.", "Et Jésus, qui nous prépare une place auprès de lui, est béni.", "Et Jésus, qui demeure pour toujours avec nous, est béni.", "Et Jésus, qui nous appelle à faire des disciples de toutes les nations, est béni.", "Et Jésus, qui nous parle par les Écritures, est béni.", "Et Jésus, qui vient en nous par l’Eucharistie, est béni.", "Et Jésus, qui est au milieu de nous quand nous sommes réunis en son nom, est béni.", "Et Jésus, qui nous attire vers le Ciel, est béni.", "Et Jésus, qui reviendra dans la Gloire pour juger tous les hommes, est béni."]}}, {"n": "III", "title": "La Pentecôte", "fruit": "La charité et le zèle apostolique", "parole": {"text": "Quand arriva le jour de la Pentecôte, ils se trouvaient réunis tous ensemble. Soudain, il vint du ciel un bruit pareil à celui d’un violent coup de vent : toute la maison où ils se tenaient en fut remplie. Ils virent apparaître comme une sorte de feu qui se partageait en langues et qui se posa sur chacun d’eux. Alors ils furent tous remplis de l’Esprit Saint : ils se mirent à parler en d’autres langues, et chacun s’exprimait selon le don de l’Esprit » (Ac 2, 1-4).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "Quel est le sens de la fête juive de la Pentecôte (Shavuot) ?"}, {"t": "p", "x": ""}, {"t": "p", "x": "Il existait dans l’ancien Israël une fête de la moisson (des blés) qui se célébrait sept semaines après la coupe des premiers épis d’orge (Lév 23, 15-21). C’était essentiellement une fête agricole et populaire où l’on venait remercier Dieu pour les récoltes, la « fête des prémisses ». On faisait l’offrande des prémisses."}, {"t": "p", "x": "Cette fête agricole a été mise en relation par la tradition juive, aux abords de l’ère chrétienne, avec l’évènement de l’histoire du peuple d’Israël le plus important : le don de la Torah. Lafête de la moisson perdit de son caractère agricole pour devenir de plus en plus le complément de la fête de Pâque. Cinquante jour après la Pâque juive qui célèbre la libération de l’esclavage de peuple hébreu en Égypte, la fête de Pentecôte célèbre le don de la loi au peuple Hébreu sur le Sinaï et la conclusion de l’alliance entre Dieu et son peuple."}, {"t": "p", "x": "Son nom juif est « Shavuot » (Chavouoth) c.a.d. « Fête des Semaines » parce qu’elle se situe 7 semaines après Pâques, donc après 49 jours, ce qui fait le 50e jour après Pâques. Le mot « Pentecôte » vient du grec Pentecostê qui veut dire cinquantième."}, {"t": "p", "x": "Quelle est l’origine et l’histoire de la fête chrétienne de la Pentecôte ?"}, {"t": "p", "x": "Les premiers chrétiens ne célébraient pas la fête de la Pentecôte. Ils célébraient Pâques « grand dimanche » pendant 50 jours. Au début du 3e siècle, quand on parle de Pentecôte dans l’Église, c’est pour désigner la durée de ces 50 jours et non la fête du 50e jour."}, {"t": "p", "x": "Ces 50 jours formaient un unique jour de fête."}, {"t": "p", "x": "C’est au 4e siècle qu’on se mit à célébrer le 50e jour… mais on y célébrait l’Ascension. Et ce n’est que vers la fin du 4e siècle que la liturgie a célébrée la Pentecôte comme une fête distincte de l’Ascension."}, {"t": "p", "x": "Le mot Pentecôte vient du grec [pentèkostè] qui signifie cinquantième (jour après Pâques)."}, {"t": "s", "x": "Que s’est-il passé le jour de la Pentecôte ?"}, {"t": "p", "x": "Le Livre des Actes des apôtres (2,1-13) rapporte l’évènement qui s’est passé au Cénacle à Jérusalem, en l’an 30 ou 33 de notre ère, le jour de la fête juive de la Pentecôte, 50 jours après la résurrection du Christ. « Quand le jour de la Pentecôte fut arrivé, ils (les apôtres) se trouvèrent tous ensemble. Tout à coup survint du ciel un bruit comme celui d’un violent coup de vent. La maison où ils se tenaient en fut toute remplie ; alors leur apparurent comme des langues de feu qui se partageaient et il s’en posa sur chacun d’eux. Ils furent tous remplis d’Esprit Saint et se mirent à parler d’autres langues »."}, {"t": "s", "x": "Le récit des Actes des apôtres sur le jour de la Pentecôte"}, {"t": "p", "x": "« Le jour de la Pentecôte étant arrivé, ils se trouvaient tous ensemble dans un même lieu, quand, tout à coup, vint du ciel un bruit tel que celui d’un violent coup de vent, qui remplit toute la maison où ils se tenaient. Ils virent apparaître des langues qu’on eût dites de feu ; elles se partageaient, et il s’en posa une sur chacun d’eux. Tous furent alors remplis de l’Esprit Saint et commencèrent à parler en d’autres langues, selon que l’Esprit leur donnait de s’exprimer. Or il y avait, demeurant à Jérusalem, des hommes dévots de toutes les nations qui sont sous le ciel. Au bruit qui se produisit, la multitude se rassembla et fut confondue : chacun les entendait parler en son propre idiome. Ils étaient stupéfaits, et, tout étonnés, ils disaient : » Ces hommes qui parlent, ne sont-ils pas tous Galiléens ? Comment se fait-il alors que chacun de nous les entende dans son propre idiome maternel ? Parthes, Mèdes et Élamites, habitants de Mésopotamie, de Judée et de Cappadoce, du Pont et d’Asie, de Phrygie et de Pamphylie, d’Égypte et de cette partie de la Libye qui est proche de Cyrène, Romains en résidence, tant Juifs que prosélytes, Crétois et Arabes, nous les entendons publier dans notre langue les merveilles de Dieu ! «"}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "p", "x": ""}, {"t": "s", "x": "Quelle est la signification du récit de la Pentecôte ?"}, {"t": "p", "x": ""}, {"t": "p", "x": "Le récit fait état « d’un grand bruit » venu du ciel, d’un « violent coup de vent » et de « langues de feu » et qui se posent sur chacun des apôtres. Un bruit, comme celui d’un violent coup de vent et le feu symbolisent la présence de Dieu ; ils sont une manifestation de la puissance divine, C’est le renouvellement de la théophanie du Sinaï dont la Pentecôte juive est la commémoration."}, {"t": "p", "x": "Si le feu symbolise la présence divine, les langues de feu qui se divisent au-dessus des têtes des apôtres indiquent la descente sur eux de l’ Esprit de Dieu. Elles symbolisent le don fait à chacun d’eux pour le rendre apte à annoncer, avec une langue de feu, l’Évangile à tous les hommes."}, {"t": "p", "x": "Le récit fait ensuite mention du don des langues que reçoivent les apôtres et les disciples pour leur permettre d’annoncer la Bonne Nouvelle de l’Évangile à tous les hommes, à toutes les nations. On peut y voir une réponse à l’épisode de la Tour de Babel : les peuples divisés se retrouvent ainsi unis lorsque l’Esprit Saint se manifeste."}, {"t": "p", "x": "La Pentecôte est donc la venue de l’Esprit Saint pour l’annonce universelle de la Bonne nouvelle."}, {"t": "p", "x": "Après l’Ascension, le moment est crucial : le Christ a disparu, il n’est plus présent visiblement. Avec Marie et les saintes femmes, note l’historien saint Luc, les apôtres attendent au Cénacle que se réalise la promesse de Jésus. Au bout de dix jours de retraite, le prodige extraordinaire que les apôtres, les disciples et les Juifs eux-mêmes regardent tous comme un miracle évident, se produit. Un vent impétueux emplit le Cénacle. Des langues de feu apparaissent et se déposent sur chacun d’eux. Le Saint-Esprit s’empare de l’Eglise du Christ. Ces hommes ordinaires et craintifs se mettent à parler en langues et cessent d’avoir peur, ils proclament sur les places publiques la divinité de Jésus-Christ."}], "saints": [{"text": "« Le vent souffle où il veut… Ainsi en est-il de l’Esprit. »", "author": "Jn 3, 8"}, {"text": "« L’Esprit Saint est le souffle de Dieu en nous. »", "author": "Saint Augustin"}, {"text": "« Quand l’Esprit parle, le cœur écoute. »", "author": "Proverbe chrétien"}, {"text": "« Le Saint-Esprit nous guide là où nous n’oserions pas aller. »", "author": "Pape François"}, {"text": "« L’Esprit de Dieu ne nous quitte jamais, même dans l’épreuve. »", "author": "Saint Jean-Paul II"}, {"text": "« Là où est l’Esprit, là est la liberté. »", "author": "2 Co 3, 17"}], "vertus": [{"label": "La charité", "citation": null, "author": null, "rest": " : répandre les grâces de l’Esprit Saint autour de nous, habités par le feu de l’Esprit que rien n’arrête, et qui peut tout."}, {"label": "La vigueur spirituelle", "citation": "« L’Esprit que le Christ a répandu sans limites, nous donne de la force. L’esprit est le secret de l’Église d’aujourd’hui comme il l’a été pour l’Église de la première heure. L’esprit saint, lumière qui éclaire les esprits est l’espérance véritable du monde. »", "author": "Saint Jean-Paul II", "rest": ""}, {"label": "L’amour sans borne", "citation": null, "author": null, "rest": ""}, {"label": "Lire et imiter l’Évangile", "citation": "« Il faut tâcher de nous imprégner de l’esprit de Jésus en lisant et relisant, méditant et re-méditant sans cesse ses paroles et ses exemples : qu’ils fassent dans nos âmes comme la goutte d’eau qui tombe et retombe […] à la même place. »", "author": "Saint Charles de Foucauld", "rest": ""}, {"label": "Bien parler en vérité (le silence intérieur)", "citation": "« Il y a un homme qui paraît se taire, et son cœur condamne les autres : un tel homme parle sans cesse. Au contraire, il en est un autre qui parle du matin au soit, et qui pourtant garde le silence, parce qu’il ne dit rien qui n’ait une utilité spirituelle »", "author": "Poemen", "rest": ""}, {"label": "La bonté (mentalité d’étranger)", "citation": "« Aie une mentalité d’étranger dans le lieu où tu habites, pour ne pas chercher à étaler devant toi la parole, et tu seras en repos »", "author": "Poemen", "rest": ""}], "graces": [{"label": "La grâce de trouver refuge auprès du Saint Esprit quand les forces nous manquent", "citation": null, "author": null, "rest": ""}, {"label": "La grâce de dire oui", "citation": "« Le Saint-Esprit est comme un jardinier qui travaille notre âme… Nous n’avons qu’à dire « Oui » et à nous laisser conduire »", "author": "Saint Curé d’Ars", "rest": ""}], "peches": [{"label": "Le refroidissement spirituel", "citation": "« Parce que tu n’es ni froid, ni chaud, que tu es tiède, je te vomirai de ma bouche »", "author": "Ap 3, 15-16, à l'Église de Laodicée", "rest": ""}, {"label": "Le découragement", "citation": "« Un frère dit à l’Abbé Théodore : « Dis-moi une sentence, car je suis perdu. » Avec effort, le vieillard lui dit : « Je suis moi-même en péril, que pourrais-je te dire ? »", "author": "Abbé Théodore", "rest": ""}, {"label": "La rancune qui éteint l’Esprit", "citation": "« Si nous nous souvenons des maux que nous ont faits les hommes, nous supprimons la force du souvenir de Dieu. Mais si nous nous souvenons des maux faits par les démons, nous sommes indemnes »", "author": "Abbé Macaire", "rest": ""}, {"label": "L’éparpillement des volontés", "citation": "« Les chiliades et les myriades de là-haut ont une seule volonté, tandis que les hommes ont des volontés multiples »", "author": "Abbé Arsène", "rest": ""}], "clausules": {"courte": "Et Jésus, qui nous donne l’Esprit de Lumière", "longue": ["Et Jésus, qui envoie le Saint Esprit aux apôtres, est béni.", "Et Jésus, dont l’Esprit descend comme des langues de feu, est béni.", "Et Jésus, dont l’Esprit éclaire les apôtres, est béni.", "Et Jésus, dont l’Esprit soutient le courage des apôtres, est béni.", "Et Jésus, dont l’Esprit comble de joie les apôtres, est béni.", "Et Jésus, qui nous donne l’Esprit de Lumière, est béni.", "Et Jésus, qui nous veut assidus à la prière, est béni.", "Et Jésus, dont l’Esprit anime toute l’Église, est béni.", "Et Jésus, qui nous envoie porter l’Évangile à nos frères, est béni.", "Et Jésus, dont l’Esprit se répandra sur toute chair, est béni."]}}, {"n": "IV", "title": "L’assomption", "fruit": "La bonne et mort et la dévotion à Marie", "parole": {"text": "Il s’est penché sur son humble servante ; désormais tous les âges me diront bienheureuse. Le Puissant fit pour moi des merveilles ; Saint est son nom ! » Lc 1, 48-49", "ref": ""}, "histo": [{"t": "h", "x": "A – Historique :"}, {"t": "p", "x": "L’Assomption est une fête née dans la nuit des temps en Orient, qui s’est rapidement propagée. Sa célébration universelle a une influence décisive sur la définition de l’Assomption comme dogme de la foi par Pie XII (Munificentissimus Deus – 1er novembre 1950)."}, {"t": "s", "x": "En Orient"}, {"t": "p", "x": "La fête de l’Assomption est née à Jérusalem, mais il est difficile de savoir à quelle époque. L’origine précise de la fête du 15 août tient peut-être à la consécration à cette date, par l’évêque Juvénal (422 – 458) d’une église dédiée à Marie à Kathisma (étape supposée de la Vierge entre Nazareth et Bethléem). Elle a plus probablement pour origine la consécration d’une autre église à Gethsémani, à côté de Jérusalem, au VIe siècle, là où certaines traditions affirmaient que la Vierge avait fini sa vie terrestre."}, {"t": "p", "x": "Quoi qu’il en soit, la fête fut étendue à tout l’empire part l’empereur Maurice (582 – 602), sous le nom de Dormition (Koimelis) de la Vierge Marie. Elle a toujours été célébrée le 15 août."}, {"t": "p", "x": "Cette fête, en Orient, a toujours depuis revêtu une importance particulière : l’année liturgique « s’ouvre » quasiment avec le 8 septembre – fête de la naissance de Marie – et « s’achève » le 15 août, fête de son retour à Dieu : toute l’année liturgique est ainsi placée sous le patronage de Marie."}, {"t": "s", "x": "En Occident"}, {"t": "p", "x": "Comme souvent à cette époque, l’Eglise de Rome est en retard sur l’Eglise de Constantinople : on est sûr que la fête de l’Assomption n’y était pas célébrée sous Grégoire le Grand († 604) mais qu’elle l’était en 690. On pense donc qu’elle fut instaurée par la Pape Serge 1er (687 – 701), lui-même d’origine syriaque."}, {"t": "p", "x": "Elle fut longtemps accompagnée d’une procession nocturne qui a été supprimée par le Pape Pie V (en 1566), à cause des nombreux abus qui l’entouraient. Elle a longtemps été précédée d’un jeûne et, en différents diocèses de l’Europe du Sud, elle pouvait être le temps de la bénédiction du fourrage et de l’offrande des premières récoltes."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "p", "x": "La fête de l’Assomption célèbre la mort, la résurrection, l’entrée au ciel et le couronnement de la bienheureuse Vierge Marie."}, {"t": "s", "x": "Une croyance, une fête, un dogme"}, {"t": "p", "x": "Malgré la discrétion des Évangiles, les premiers chrétiens n’ont pas mis longtemps à réfléchir à la place de Marie dans leur foi. Ils ont rapidement voulu célébrer ses derniers moments, comme ils le faisaient pour honorer leurs saints. À cause du caractère unique de sa coopération, une croyance se répand : son « endormissement » – sa Dormition – consiste en réalité en son élévation, corps et âme, au ciel par Dieu."}, {"t": "p", "x": "La fête exprime cette croyance : chaque 15 août, les chrétiens célèbrent à la fois la mort, la résurrection, l’entrée au paradis et le couronnement de la Vierge Marie."}, {"t": "p", "x": "En 1950, le pape Pie XII estime utile de proposer une définition plus précise : « La Vierge immaculée, préservée par Dieu de toute atteinte de la faute originelle, ayant accompli le cours de sa vie terrestre, fut élevée corps et âme à la gloire du ciel, et exaltée par le Seigneur comme la Reine de l’univers, pour être ainsi plus entièrement conforme à son Fils, Seigneur des seigneurs, victorieux du péché et de la mort ». La définition fait partie des dogmes de l’Église."}, {"t": "s", "x": "L’Assomption de Marie dans le sillage de l’Ascension du Christ"}, {"t": "p", "x": "On associe souvent l’Assomption de Marie avec l’Ascension du Christ ; de fait, les mots se ressemblent et il y a dans les deux cas une montée mystérieuse au ciel dans la gloire de Dieu."}, {"t": "p", "x": "Pourtant, « assomption » ne vient pas du verbe latin « ascendere » (monter, s’élever), qui a donné « Ascension », mais d’« assumere » (assumer, enlever). L’étymologie souligne l’initiative divine : Marie ne s’élève pas toute seule vers le ciel, c’est Dieu qui fait le choix de l’« assumer », corps et âme, en la réunissant à son Fils sans attendre la résurrection finale, tant elle a su s’unir, corps et âme, à Lui dès sa vie terrestre."}, {"t": "p", "x": "Dans le sillage de l’Ascension, Marie inaugure le destin ouvert aux hommes par la résurrection de son Fils et anticipe ce qui deviendra la condition des sauvés à la fin des temps."}, {"t": "s", "x": "La fête de l’Assomption entretient l’espérance"}, {"t": "p", "x": "La liturgie de l’Assomption célèbre Marie comme la « transfigurée » : elle est auprès de Lui avec son corps glorieux et pas seulement avec son âme ; en elle, le Christ confirme sa propre victoire sur la mort."}, {"t": "p", "x": "Marie réalise ainsi le but pour lequel Dieu a créé et sauvé les hommes. En la fêtant, les croyants contemplent le gage de leur propre destin, s’ils font le choix de s’unir à leur tour au Christ."}, {"t": "p", "x": "Cette contemplation renforce enfin la confiance dans l’intercession de Marie : la voilà toute disponible pour « guider et soutenir l’espérance de ton peuple qui est encore en chemin » (préface). Ils aiment alors demander à Dieu : « Fais que, nous demeurions attentifs aux choses d’en-haut pour obtenir de partager sa gloire » (collecte)."}], "s
