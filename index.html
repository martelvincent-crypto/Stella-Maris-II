:root{
  /* constantes (les deux thèmes) */
  --marine:#13233f;--marine-deep:#0d1830;--ink:#101a30;
  --cream-2:#fbf7ec;--white:#fffdf8;--black:#171513;
  /* thème JOUR (défaut) : fond beige, lettres noires, rouge bible, bleu marine */
  --bg:#f2ede2;--bg-deep:#e9e0cc;--glow:#faf6ec;
  --text:#1d1a16;--text-strong:#13233f;
  --acc:#9b1c1f;--acc-strong:#7e1517;--on-acc:#f8f2e4;
  --sub:#414f72;--brand:#9b1c1f;
  --overlay-rgb:19,26,47;--bg-rgb:242,237,226;--acc1-rgb:155,28,31;--acc2-rgb:19,35,63;
  --serif:"EB Garamond","Cormorant Garamond",Georgia,"Palatino Linotype",serif;
  --display:"Cormorant Garamond",Georgia,serif;
  --label:"Marcellus","Cormorant Garamond",Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--serif);color:var(--text);background:var(--bg);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}
#app{position:fixed;inset:0}
.stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:5vh 7vw;padding-bottom:calc(5vh + env(safe-area-inset-bottom,0px));
  opacity:0;pointer-events:none;overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:opacity .55s ease, transform .55s ease;transform:translateY(10px)}
.stage::before,.stage::after{content:"";display:block;flex:1 0 0px;min-height:0}
.stage.show{opacity:1;pointer-events:auto;transform:none}
.stage.tap{cursor:pointer}
.dark{background:radial-gradient(120% 90% at 50% 18%, var(--glow) 0%, var(--bg) 42%, var(--bg-deep) 100%);color:var(--text)}
.emblem{width:108px;height:108px;display:block}.emblem.sm{width:60px;height:60px}.emblem.xs{width:34px;height:34px}
@media(prefers-reduced-motion:no-preference){.emblem.spin{animation:spin 90s linear infinite}.twinkle{animation:tw 4.5s ease-in-out infinite}}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes tw{0%,100%{opacity:.55}50%{opacity:1}}
.eyebrow{font-family:var(--label);text-transform:uppercase;letter-spacing:.28em;font-size:.72rem;color:var(--acc);margin-bottom:1.1rem}
.dark .eyebrow{color:var(--acc)}
h1.brand{font-family:var(--display);font-weight:500;font-size:clamp(2.4rem,7vw,3.8rem);line-height:1.04;text-align:center}
.series-name{font-family:var(--display);font-weight:500;font-size:clamp(2rem,6.5vw,3.2rem);text-align:center}
.series-sub{font-style:italic;font-size:1.15rem;color:var(--sub);text-align:center;margin-top:.5rem}
.myst-title{font-family:var(--display);font-weight:500;font-size:clamp(1.9rem,5.6vw,2.7rem);text-align:center;line-height:1.08}
.fruit{font-style:italic;font-size:1.16rem;color:var(--sub);text-align:center;margin-top:.5rem}
.fruit b{font-style:normal;font-family:var(--label);font-size:.7rem;text-transform:uppercase;letter-spacing:.22em;color:var(--acc-strong);display:block;margin-bottom:.25rem}
.parole{max-width:42rem;margin:1.8rem auto 0;background:rgba(var(--overlay-rgb),.05);border:1px solid rgba(var(--acc2-rgb),.30);border-left:3px solid var(--acc-strong);padding:1.4rem 1.6rem;border-radius:2px;box-shadow:0 6px 22px rgba(0,0,0,.18)}
.parole .verse{font-family:var(--display);font-size:1.34rem;line-height:1.5;font-style:italic;color:var(--text)}
.parole .ref{font-family:var(--label);text-transform:uppercase;letter-spacing:.14em;font-size:.74rem;color:var(--acc-strong);margin-top:.7rem}
.lead{max-width:40rem;text-align:center}
.citation{font-family:var(--display);font-size:clamp(1.4rem,3.6vw,1.9rem);line-height:1.42;font-style:italic;color:var(--text);max-width:40rem;text-align:center}
.plain{font-size:clamp(1.25rem,3.2vw,1.6rem);line-height:1.45;color:var(--text);max-width:40rem;text-align:center}
.author{font-family:var(--label);text-transform:uppercase;letter-spacing:.16em;font-size:.82rem;color:var(--acc-strong);margin-top:1.3rem}
.author::before{content:"";display:block;width:34px;height:1px;background:var(--acc-strong);margin:0 auto 1rem;opacity:.7}
.scroll{max-width:42rem;width:100%;max-height:74vh;overflow:auto;padding:0 .4rem;text-align:left}
.scroll::-webkit-scrollbar{width:7px}.scroll::-webkit-scrollbar-thumb{background:rgba(var(--acc2-rgb),.45);border-radius:4px}
.scroll p{font-size:1.08rem;line-height:1.6;margin:.7rem 0;color:var(--text);text-align:justify}
.scroll .ph{font-family:var(--label);text-transform:uppercase;letter-spacing:.14em;color:var(--acc-strong);font-size:.82rem;margin:1.2rem 0 .3rem}
.scroll .sh{font-style:italic;font-weight:600;color:var(--sub);margin:.9rem 0 .2rem;font-size:1.12rem}
.saints{max-width:42rem;width:100%;max-height:74vh;overflow:auto;text-align:left}
.saint{margin:1.05rem 0;padding-left:1rem;border-left:2px solid var(--acc-strong)}
.saint .q{font-style:italic;font-size:1.12rem;line-height:1.5;color:var(--text)}
.saint .a{font-family:var(--label);text-transform:uppercase;letter-spacing:.12em;font-size:.74rem;color:var(--acc-strong);margin-top:.35rem;text-align:right}
.clausules{max-width:40rem;text-align:center}
.clausule-courte{font-family:var(--display);font-style:italic;font-size:clamp(1.5rem,4vw,2rem);color:var(--text);line-height:1.4}
.clausule-list{margin-top:1.3rem;display:flex;flex-direction:column;gap:.5rem}
.clausule-list .c{font-size:1.12rem;color:var(--text);line-height:1.4}
.clausule-list .c::before{content:"✦";color:var(--acc-strong);font-size:.7rem;margin-right:.55rem;vertical-align:.15em}
.beads{position:absolute;bottom:3.2vh;left:50%;transform:translateX(-50%);display:flex;gap:.5rem}
.bead{width:7px;height:7px;border-radius:50%;border:1px solid var(--acc);opacity:.55}
.bead.on{background:var(--acc);opacity:1;box-shadow:0 0 8px rgba(var(--acc2-rgb),.6)}
.dark .bead{border-color:var(--acc)}.dark .bead.on{background:var(--acc)}
.hint{position:absolute;bottom:6.4vh;left:50%;transform:translateX(-50%);font-family:var(--label);text-transform:uppercase;letter-spacing:.22em;font-size:.64rem;color:var(--sub);opacity:0;animation:fadein 1.2s ease 1.2s forwards}
.dark .hint{color:var(--sub)}@keyframes fadein{to{opacity:.7}}
.top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top,0px) + 1.2vh) 4vw 1.2vh;z-index:10;pointer-events:none;background:var(--bg);border-bottom:1px solid rgba(var(--acc2-rgb),.16)}
.top button{pointer-events:auto;background:none;border:none;cursor:pointer;font-family:var(--label);letter-spacing:.14em;text-transform:uppercase;font-size:.7rem;color:var(--sub);padding:.5rem .2rem;transition:color .2s}
.top.on-dark button,.top.on-dark .where{color:var(--sub)}
.top button:hover{color:var(--acc-strong)}
.top .where{font-family:var(--label);letter-spacing:.18em;text-transform:uppercase;font-size:.66rem;color:var(--sub)}
.home-inner{display:flex;flex-direction:column;align-items:center;gap:1.4rem;width:100%;max-width:44rem}
.today{font-style:italic;color:var(--sub);text-align:center;font-size:1.05rem}
.today b{font-style:normal;color:var(--text-strong)}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;width:100%}
@media(max-width:520px){.cards{grid-template-columns:1fr}}
.card{position:relative;cursor:pointer;border:1px solid rgba(var(--acc2-rgb),.35);background:rgba(var(--overlay-rgb),.04);border-radius:4px;padding:1.05rem 1.1rem;transition:all .22s ease}
.card:hover{border-color:var(--acc);background:rgba(var(--acc2-rgb),.08)}
.card.sel{border-color:var(--acc);background:rgba(var(--acc2-rgb),.14);box-shadow:0 0 0 1px var(--acc) inset}
.card .cn{font-family:var(--display);font-size:1.32rem;color:var(--text-strong)}
.card .cs{font-style:italic;color:var(--sub);font-size:.92rem;margin-top:.15rem}
.card .ck{position:absolute;top:.7rem;right:.85rem;color:var(--acc);opacity:0;font-size:1rem}
.card.sel .ck{opacity:1}
.whole{display:flex;align-items:center;gap:.6rem;cursor:pointer;color:var(--sub);font-style:italic;user-select:none}
.whole .box{width:15px;height:15px;border:1px solid var(--acc);border-radius:3px;transition:.2s}
.whole.sel .box{background:var(--acc)}
.modes{display:flex;border:1px solid rgba(var(--acc2-rgb),.4);border-radius:100px;overflow:hidden}
.modes button{background:none;border:none;cursor:pointer;color:var(--sub);font-family:var(--label);letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;padding:.62rem 1.25rem;transition:.2s}
.modes button.on{background:var(--acc);color:var(--on-acc)}
.mode-desc{font-style:italic;color:var(--sub);font-size:.92rem;text-align:center;min-height:1.4em;max-width:34rem}
.begin{font-family:var(--label);letter-spacing:.2em;text-transform:uppercase;font-size:.82rem;color:var(--on-acc);background:var(--acc);border:none;border-radius:100px;padding:.95rem 2.6rem;cursor:pointer;transition:.25s;box-shadow:0 6px 22px rgba(var(--acc2-rgb),.28)}
.begin:hover{background:var(--acc-strong);transform:translateY(-1px)}
.begin:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;transform:none}
.linkrow{display:flex;gap:1.5rem;align-items:center}
.tlink{background:none;border:none;cursor:pointer;font-family:var(--label);letter-spacing:.16em;text-transform:uppercase;font-size:.7rem;color:var(--sub);padding:.3rem;transition:.2s}
.tlink:hover{color:var(--acc)}
.latin{font-family:var(--display);font-style:italic;font-size:1.5rem;line-height:1.45;text-align:center;color:var(--text);max-width:34rem}
.fr{font-style:italic;color:var(--sub);text-align:center;margin-top:1.1rem;max-width:32rem;font-size:1.05rem}
.amen{font-family:var(--label);letter-spacing:.3em;text-transform:uppercase;color:var(--acc);margin-top:1.8rem;font-size:.8rem}
/* ---------- EDITOR ---------- */
.editor{position:absolute;inset:0;background:var(--cream-2);overflow:auto;display:none}
.editor.show{display:block}
.ed-head{position:sticky;top:0;background:rgba(248,242,228,.96);backdrop-filter:blur(6px);border-bottom:1px solid #e2d6ba;padding:1rem 5vw;display:flex;align-items:center;justify-content:space-between;z-index:5;gap:1rem;flex-wrap:wrap}
.ed-head .t{font-family:var(--display);font-size:1.5rem;color:var(--marine)}
.ed-actions{display:flex;gap:.6rem;flex-wrap:wrap}
.btn{font-family:var(--label);letter-spacing:.12em;text-transform:uppercase;font-size:.66rem;border:1px solid var(--acc-strong);color:var(--marine);background:none;border-radius:100px;padding:.5rem 1rem;cursor:pointer;transition:.2s}
.btn:hover{background:var(--acc-strong);color:#fff}
.btn.solid{background:var(--acc);border-color:var(--acc);color:var(--on-acc)}
.btn.solid:hover{background:var(--acc-strong)}
.btn.warn{border-color:#9a4a2c;color:#9a4a2c}.btn.warn:hover{background:#9a4a2c;color:#fff}
.ed-body{max-width:56rem;margin:0 auto;padding:1.5rem 5vw 6rem}
.ed-pick{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{font-family:var(--label);letter-spacing:.1em;text-transform:uppercase;font-size:.64rem;border:1px solid #cdbf9c;color:#6a5c3c;background:#fbf7ec;border-radius:100px;padding:.4rem .8rem;cursor:pointer}
.chip.on{background:var(--marine);color:var(--cream-2);border-color:var(--marine)}
.fieldset{border:1px solid #e2d6ba;border-radius:6px;padding:1.1rem 1.2rem;margin:1.1rem 0;background:var(--cream-2)}
.fieldset>legend{font-family:var(--label);letter-spacing:.16em;text-transform:uppercase;font-size:.72rem;color:var(--acc-strong);padding:0 .5rem}
.flabel{font-family:var(--label);letter-spacing:.08em;text-transform:uppercase;font-size:.62rem;color:#8a7a52;margin:.6rem 0 .2rem;display:block}
input.f,textarea.f,select.f{width:100%;font-family:var(--serif);font-size:1rem;color:var(--ink);background:var(--text-strong);border:1px solid #ddcfae;border-radius:4px;padding:.55rem .7rem;line-height:1.4}
textarea.f{resize:vertical;min-height:3.2rem}
.row{border:1px solid #e8ddc2;border-radius:5px;padding:.7rem .8rem;margin:.6rem 0;background:#fffdf6;position:relative}
.row .del{position:absolute;top:.5rem;right:.5rem;background:none;border:none;color:#b06a4a;cursor:pointer;font-size:1rem;font-family:var(--label)}
.row .mv{position:absolute;top:.5rem;right:2.1rem;display:flex;gap:.2rem}
.row .mv button{background:none;border:none;color:#9c8755;cursor:pointer;font-size:.85rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
.addbtn{font-family:var(--label);letter-spacing:.1em;text-transform:uppercase;font-size:.64rem;color:var(--acc-strong);background:none;border:1px dashed var(--acc-strong);border-radius:5px;padding:.5rem;cursor:pointer;width:100%;margin-top:.4rem}
.addbtn:hover{background:rgba(var(--acc2-rgb),.1)}
.note{font-style:italic;color:#8a7a52;font-size:.9rem;margin:.4rem 0 1rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--marine);color:var(--cream-2);font-family:var(--label);letter-spacing:.1em;text-transform:uppercase;font-size:.7rem;padding:.7rem 1.3rem;border-radius:100px;opacity:0;transition:opacity .3s;z-index:50;pointer-events:none}
.toast.show{opacity:1}
.tag{display:inline-block;font-family:var(--label);letter-spacing:.08em;text-transform:uppercase;font-size:.56rem;color:#fff;background:var(--acc-strong);border-radius:3px;padding:.12rem .4rem;margin-left:.5rem;vertical-align:.12em}

@media (max-height:740px), (max-width:520px){
  .home-inner{gap:.95rem}
  .stage{padding-top:3.5vh}
  .emblem.sm{width:48px;height:48px}
  h1.brand{font-size:clamp(2rem,8vw,2.8rem)}
  .eyebrow{margin-bottom:.5rem}
  .today{font-size:.95rem}
  .card{padding:.8rem .9rem}
  .card .cn{font-size:1.15rem}
  .card .cs{font-size:.84rem}
  .modes button{padding:.5rem .9rem;font-size:.66rem}
  .mode-desc{font-size:.86rem}
  .begin{padding:.8rem 2.1rem}
}

/* --- thème marine intégral --- */
.myst-title{color:var(--text)}
.author{color:var(--acc)}
.author::before{background:var(--acc)}
.parole .ref,.fruit b,.scroll .ph,.saint .a,.clausule-list .c::before{color:var(--acc)}
.saint{border-left-color:var(--acc-strong)}
.scroll::-webkit-scrollbar-thumb{background:#5a6b86}
/* --- sélecteur Custom --- */
.customsel{width:100%;max-width:36rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-top:.1rem}
.cs-title{font-family:var(--label);letter-spacing:.16em;text-transform:uppercase;font-size:.62rem;color:var(--sub)}
.crow{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem}
.crow button{background:none;border:1px solid rgba(var(--acc2-rgb),.4);color:var(--sub);font-family:var(--label);letter-spacing:.08em;text-transform:uppercase;font-size:.62rem;padding:.5rem .85rem;border-radius:100px;cursor:pointer;transition:.2s}
.crow button.on{background:var(--acc);color:var(--on-acc);border-color:var(--acc)}
.crow button:hover{border-color:var(--acc)}
/* clausules courtes — page unique */
.cc-serie{font-family:var(--display);font-size:1.5rem;color:var(--acc);text-align:center;margin:1.4rem 0 .5rem;font-style:italic}
.cc-item{margin:.65rem 0;padding-bottom:.65rem;border-bottom:1px solid rgba(var(--acc2-rgb),.14)}
.cc-myst{font-family:var(--label);letter-spacing:.08em;text-transform:uppercase;font-size:.64rem;color:var(--sub);margin-bottom:.2rem}
.cc-claus{font-family:var(--display);font-style:italic;font-size:1.2rem;color:var(--text);line-height:1.4}
/* vgp + clausule par mystère */
.cvgp{margin:1.15rem 0;text-align:center}
.cvgp-lbl{font-family:var(--label);letter-spacing:.18em;text-transform:uppercase;font-size:.64rem;color:var(--acc);margin-bottom:.4rem}

body.nuit{
  --bg:#13233f;--bg-deep:#0d1830;--glow:#2a3f63;
  --text:#f8f2e4;--text-strong:#fffdf8;
  --acc:#dcb968;--acc-strong:#c39a4d;--on-acc:#0d1830;
  --sub:#e7d4a6;--brand:#d0544a;
  --overlay-rgb:255,253,248;--bg-rgb:19,35,63;--acc1-rgb:195,154,77;--acc2-rgb:220,185,104;
}


/* ================= AJOUTS v2 — coquille, transitions, prières ================= */
body{touch-action:manipulation}
.stage.tap{user-select:none;-webkit-user-select:none}
.myst-title,.series-name,h1.brand{text-wrap:balance}
.scroll p,.pr-fr,.pr-la{hyphens:auto;-webkit-hyphens:auto}

/* transitions directionnelles */
.stage.enter-r:not(.show){transform:translateX(34px)}
.stage.enter-l:not(.show){transform:translateX(-34px)}
.stage.bye-l{opacity:0!important;transform:translateX(-34px)!important}
.stage.bye-r{opacity:0!important;transform:translateX(34px)!important}
@media(prefers-reduced-motion:reduce){.stage{transition:opacity .3s ease;transform:none!important}}

/* barre de progression */
#prog{position:fixed;top:0;left:0;right:0;height:2px;z-index:40;opacity:0;transition:opacity .4s ease;pointer-events:none}
#prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc-strong),var(--acc));transition:width .45s ease;box-shadow:0 0 6px rgba(var(--acc2-rgb),.5)}

/* continuation en romain après l'intitulé en gras */
.plain .restx{font-weight:400;color:var(--text)}

/* barre haute : cibles tactiles élargies */
.top button{padding:.85rem .6rem;min-height:44px}

/* ---------- hub ---------- */
.hub-cards{display:flex;flex-direction:column;gap:.9rem;width:100%;max-width:26rem;margin-top:1.6rem}
.hub-card{position:relative;text-align:left;background:rgba(var(--overlay-rgb),.045);border:1px solid rgba(var(--acc2-rgb),.30);
  border-left:3px solid var(--acc-strong);border-radius:2px;padding:1.15rem 1.3rem;cursor:pointer;color:var(--text);
  font-family:var(--serif);transition:background .25s ease,border-color .25s ease,transform .25s ease;
  box-shadow:0 6px 22px rgba(0,0,0,.18)}
.hub-card:hover,.hub-card:active{background:rgba(var(--overlay-rgb),.09);border-color:rgba(var(--acc2-rgb),.55)}
.hub-card .hc-t{font-family:var(--display);font-weight:500;font-size:1.5rem;line-height:1.1}
.hub-card .hc-s{font-style:italic;color:var(--sub);font-size:1.02rem;margin-top:.3rem}
.hub-card .hc-arrow{position:absolute;right:1.1rem;top:50%;transform:translateY(-50%);color:var(--acc-strong);font-size:1.3rem;opacity:.8}
.hub-soon{margin-top:1.4rem;font-family:var(--label);text-transform:uppercase;letter-spacing:.2em;font-size:.64rem;color:var(--sub);opacity:.55;text-align:center}

/* ---------- trésor des prières ---------- */
.pr-wrap{width:100%;max-width:44rem;display:flex;flex-direction:column;align-items:center}
.pr-search{width:100%;max-width:24rem;margin:.2rem 0 1.2rem;background:rgba(var(--overlay-rgb),.05);
  border:1px solid rgba(var(--acc2-rgb),.35);border-radius:2px;color:var(--text);font-family:var(--serif);
  font-size:1.05rem;padding:.65rem .9rem;text-align:center;outline:none;transition:border-color .25s}
.pr-search::placeholder{color:var(--sub);opacity:.6;font-style:italic}
.pr-search:focus{border-color:var(--acc-strong)}
.pr-index{width:100%;overflow-y:auto;max-height:66vh;-webkit-overflow-scrolling:touch;padding:0 .2rem 1rem;scrollbar-width:thin;scrollbar-color:rgba(var(--acc1-rgb),.5) transparent}
.pr-cat{font-family:var(--label);text-transform:uppercase;letter-spacing:.22em;font-size:.72rem;color:var(--acc);
  margin:1.5rem 0 .55rem;text-align:center}
.pr-cat:first-child{margin-top:.2rem}
.pr-row{display:flex;flex-direction:column;align-items:center;width:100%;background:none;border:none;border-bottom:1px solid rgba(var(--acc2-rgb),.16);
  padding:.8rem .4rem;cursor:pointer;color:var(--text);font-family:var(--serif);transition:background .2s}
.pr-row:hover,.pr-row:active{background:rgba(var(--overlay-rgb),.05)}
.pr-row .t{font-family:var(--display);font-size:1.3rem;font-weight:500;line-height:1.15;text-align:center}
.pr-row .tl{font-style:italic;color:var(--sub);font-size:.98rem;margin-top:.15rem;text-align:center}
.pr-empty{font-style:italic;color:var(--sub);text-align:center;margin-top:2rem}

.pr-modes{display:flex;gap:.5rem;margin:0 0 1.3rem;flex-wrap:wrap;justify-content:center}
.pr-modes button{background:none;border:1px solid rgba(var(--acc2-rgb),.35);border-radius:2px;color:var(--sub);
  font-family:var(--label);text-transform:uppercase;letter-spacing:.16em;font-size:.66rem;padding:.55rem 1rem;cursor:pointer;transition:all .2s;min-height:40px}
.pr-modes button.on{background:rgba(var(--acc1-rgb),.18);border-color:var(--acc-strong);color:var(--acc)}
.pr-scroll{width:100%;overflow-y:auto;max-height:60vh;-webkit-overflow-scrolling:touch;padding:0 .3rem 1.4rem;
  scrollbar-width:thin;scrollbar-color:rgba(var(--acc1-rgb),.5) transparent}
.pr-sec{margin:0 auto 1.35rem;max-width:38rem;text-align:center}
.pr-la{font-style:italic;font-size:clamp(1.06rem,2.8vw,1.2rem);line-height:1.55;color:var(--sub)}
.pr-fr{font-style:normal;font-size:clamp(1.16rem,3.1vw,1.32rem);line-height:1.55;color:var(--text);margin-top:.4rem}
.pr-sec.only .pr-la,.pr-sec.only .pr-fr{margin-top:0}
.pr-vr{font-family:var(--label);font-size:.68rem;letter-spacing:.14em;color:var(--acc-strong);text-transform:uppercase;
  display:block;margin-bottom:.25rem;opacity:.85}
.pr-note{font-style:italic;color:var(--sub);font-size:.92rem;text-align:center;max-width:34rem;margin:1.6rem auto 0;opacity:.85}
.pr-note::before{content:"";display:block;width:34px;height:1px;background:var(--acc-strong);margin:0 auto .8rem;opacity:.7}
.pr-title{font-family:var(--display);font-weight:500;font-size:clamp(1.8rem,5.2vw,2.5rem);text-align:center;line-height:1.1;margin-bottom:.2rem}
.pr-subtitle{font-style:italic;color:var(--sub);font-size:1.08rem;text-align:center;margin-bottom:1.2rem}
.pr-nav{display:flex;justify-content:space-between;width:100%;max-width:38rem;margin-top:.9rem}
.pr-nav button{background:none;border:none;cursor:pointer;font-family:var(--label);letter-spacing:.12em;
  text-transform:uppercase;font-size:.66rem;color:var(--sub);padding:.6rem .4rem;min-height:44px;transition:color .2s}
.pr-nav button:hover{color:var(--acc-strong)}
@media(min-width:880px){
  .pr-sec.duo{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem;text-align:left;max-width:44rem}
  .pr-sec.duo .pr-fr{margin-top:0}
}
@media(max-height:740px),(max-width:520px){
  .pr-index{max-height:70vh}.pr-scroll{max-height:64vh}
}

/* ---------- aujourd'hui & favoris ---------- */
.pr-today{width:100%;max-width:24rem;margin:0 0 1.1rem;text-align:center;
  border:1px solid rgba(var(--acc2-rgb),.28);border-radius:2px;padding:.75rem .9rem .85rem;
  background:rgba(var(--overlay-rgb),.04)}
.pr-today-t{font-family:var(--label);text-transform:uppercase;letter-spacing:.2em;
  font-size:.62rem;color:var(--acc);margin-bottom:.55rem}
.pr-chips{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.pr-chips button{background:rgba(var(--acc1-rgb),.14);border:1px solid rgba(var(--acc2-rgb),.4);
  border-radius:2px;color:var(--text);font-family:var(--display);font-size:1.02rem;
  padding:.45rem .95rem;cursor:pointer;transition:all .2s;min-height:40px}
.pr-chips button:hover{background:rgba(var(--acc1-rgb),.26);border-color:var(--acc-strong)}
.pr-fav{position:absolute;right:0;top:.15rem;background:none;border:none;cursor:pointer;
  font-size:1.35rem;color:var(--sub);opacity:.55;transition:all .2s;padding:.4rem;min-height:44px}
.pr-fav.on{opacity:1;color:var(--acc);text-shadow:0 0 8px rgba(var(--acc2-rgb),.45)}
.pr-titlewrap{position:relative;width:100%;max-width:38rem;padding:0 2.4rem}

/* ---------- bascule jour / nuit ---------- */
.theme-toggle{margin-top:1rem;background:none;border:1px solid rgba(var(--acc2-rgb),.4);border-radius:100px;
  color:var(--sub);font-family:var(--label);letter-spacing:.16em;text-transform:uppercase;font-size:.62rem;
  padding:.55rem 1.2rem;cursor:pointer;transition:all .2s;min-height:40px}
.theme-toggle:hover{border-color:var(--acc-strong);color:var(--acc)}

/* ---------- litanies ---------- */
.pr-sec.lit{text-align:left;max-width:29rem}
.pr-sec.lit .pr-fr{font-size:clamp(1.06rem,2.8vw,1.18rem);line-height:1.8;margin-top:0}
.pr-sec.lit+.pr-sec.lit{margin-top:1.6rem}

body.nuit .logo{background-color:var(--acc)}

.pr-row.fav{flex-direction:row;justify-content:space-between;align-items:center;text-align:left;cursor:pointer}
.pr-row.fav .fv-t{display:flex;flex-direction:column;align-items:flex-start}
.pr-row.fav .fv-t .t,.pr-row.fav .fv-t .tl{text-align:left}
.pr-row.fav .ord{display:flex;gap:.15rem}
.pr-row.fav .ord button{background:none;border:1px solid rgba(var(--acc2-rgb),.3);border-radius:2px;
  color:var(--sub);font-size:.95rem;line-height:1;padding:.5rem .6rem;min-height:40px;cursor:pointer;transition:all .2s}
.pr-row.fav .ord button:hover:not(:disabled){color:var(--acc);border-color:var(--acc-strong)}
.pr-row.fav .ord button:disabled{opacity:.25;cursor:default}

/* vague sous le logo — stella MARIS */
.wave{width:110px;height:12px;margin-top:-.35rem;opacity:.85}
.wave path{fill:none;stroke:var(--sub);stroke-width:1.8;stroke-linecap:round}

/* grains de navigation : pastille de fond, plus de collision avec le texte */
.beads{background:rgba(var(--overlay-rgb),.06);backdrop-filter:blur(3px);padding:.45rem .8rem;border-radius:100px;background-color:var(--bg);border:1px solid rgba(var(--acc2-rgb),.18)}
.scroll,.saints{max-height:66vh}
/* dégager la barre haute désormais opaque */
.stage{padding-top:calc(env(safe-area-inset-top,0px) + 3.2rem)}

/* barre haute : fond opaque dégradé, le texte défile dessous sans collision */
.top{background:linear-gradient(rgba(var(--bg-rgb),.97) 68%,rgba(var(--bg-rgb),0));padding-bottom:1.5rem}
/* le contenu des scènes se tient sous la barre */
.stage{padding-top:max(3.2rem,env(safe-area-inset-top,0px))}
.scroll,.saints{max-height:64vh}
/* perles de navigation : pastille sur fond, jamais noyées dans le texte */
.beads{bottom:calc(env(safe-area-inset-bottom,0px) + 12px);background:rgba(var(--bg-rgb),.92);
  padding:.45rem .7rem;border-radius:100px;border:1px solid rgba(var(--acc2-rgb),.25)}

/* titre d’accueil en rouge */
h1.brand{color:var(--brand)}

const BASE = {"series": [{"key": "Joyeux", "name": "Mystères joyeux", "subtitle": "la joie de l’Incarnation", "mysteres": [{"n": "I", "title": "L’annonciation", "fruit": "L’humilité", "parole": {"text": "Le sixième mois, l’ange Gabriel fut envoyé par Dieu dans une ville de Galilée, appelée Nazareth, à une vierge, accordée en mariage à un homme de la maison de David, appelé Joseph ; et le nom de la Vierge était Marie.", "ref": "Lc 1,26-27"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "Nazareth, bourgade obscure de Galilée"}, {"t": "p", "x": "L’ange est envoyé « dans une ville de Galilée, appelée Nazareth » : un village modeste, jamais nommé dans l’Ancien Testament, à l’écart des grands centres religieux de Jérusalem ou de la Judée. Le contraste est voulu : Dieu choisit l’humble et l’inattendu pour accomplir son dessein. Au chapitre précédent, l’annonce à Zacharie avait pour cadre le Temple et le sanctuaire ; ici, c’est une simple maison de province qui devient le lieu du plus grand mystère. Là où nul n’attendait rien, le salut du monde commence."}, {"t": "s", "x": "Les fiançailles juives"}, {"t": "p", "x": "Marie est « fiancée » (memnēsteumenē) à Joseph, « de la maison de David ». Chez les Juifs, les fiançailles (erusin) n’étaient pas de simples promesses : elles créaient un lien déjà juridique, contracté environ un an avant la cohabitation et que seul un acte de répudiation pouvait rompre. Marie est donc légalement liée à Joseph tout en demeurant vierge, sous le toit de ses parents. Ce statut explique le récit : l’enfant attendu sera, aux yeux de la Loi, fils de Joseph et héritier davidique, sans que Joseph en soit le père selon la chair."}, {"t": "s", "x": "« Comblée de grâce »"}, {"t": "p", "x": "La salutation de Gabriel est unique dans toute l’Écriture : « Réjouis-toi, comblée de grâce (kecharitōmenē), le Seigneur est avec toi. » Le mot remplace le nom propre, comme un nom nouveau donné par Dieu. Le participe parfait dit un état déjà accompli : Marie est, par avance et tout entière, transformée par la grâce. La tradition catholique y a contemplé sa sainteté singulière, sa plénitude de grâce dès l’origine. L’invitation à la joie (chaire) reprend l’appel des prophètes à la fille de Sion (So 3, 14 ; Za 9, 9) : l’heure du salut est venue."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "Deux annonciations en parallèle"}, {"t": "p", "x": "Luc compose ses deux premiers chapitres en diptyque, mettant en regard l’annonce à Zacharie et celle à Marie, pour mieux marquer la supériorité de la seconde. Jean sera « grand devant le Seigneur » ; Jésus, lui, sera « Fils du Très-Haut ». Surtout, les deux réactions diffèrent : Zacharie réclame un signe et reste muet pour son incrédulité, tandis que la question de Marie – « Comment cela se fera-t-il, puisque je ne connais point d’homme ? » – ne demande pas une preuve mais le mode de l’œuvre divine. La tradition y a entendu l’écho de son don virginal à Dieu."}, {"t": "s", "x": "Le trône de David et le Fils du Très-Haut"}, {"t": "p", "x": "Les paroles de l’ange tissent ensemble plusieurs promesses de l’Ancien Testament. « Le Seigneur lui donnera le trône de David son père ; il régnera sur la maison de Jacob, et son règne n’aura pas de fin » : c’est l’accomplissement de l’oracle de Natan à David (2 S 7, 12-16), repris par les prophètes (Is 9 ; Mi 5). L’enfant est donc le Messie royal tant attendu. Mais le titre « Fils du Très-Haut », redoublé par « Fils de Dieu » (v. 35), dépasse infiniment la royauté terrestre : il annonce une filiation divine au sens propre."}, {"t": "s", "x": "« L’Esprit Saint viendra sur toi »"}, {"t": "p", "x": "À la question de Marie, l’ange révèle le comment : « l’Esprit Saint viendra sur toi, et la puissance du Très-Haut te prendra sous son ombre (episkiasei). » Le verbe évoque la nuée lumineuse qui couvrait la Tente de la rencontre et remplissait le Temple de la gloire de Dieu (Ex 40, 35). Marie devient ainsi le nouveau sanctuaire, l’Arche vivante qui porte la Présence. La conception est virginale, œuvre de l’Esprit seul : Jésus est Fils de Dieu non par adoption ni par mérite, mais en vérité, dès le premier instant de son humanité."}, {"t": "s", "x": "Le « fiat » de Marie"}, {"t": "p", "x": "Marie répond : « Je suis la servante du Seigneur ; qu’il me soit fait selon ta parole. » Consentement libre, humble et total, qui n’exige aucune garantie et s’en remet entièrement à Dieu. Les Pères, saint Irénée et saint Justin notamment, la nomment nouvelle Ève : par son obéissance dans la foi, elle dénoue ce que la désobéissance de la première femme avait noué. Le salut du monde passe par ce « oui » d’une jeune fille de Nazareth ; en cet instant, comme le dira saint Jean, « le Verbe s’est fait chair » (Jn 1, 14)."}], "saints": [{"text": "« À son tour, toute l’humanité se trouve comme contenue dans le fiat par lequel Marie correspond avec promptitude à la volonté de Dieu. »", "author": "Saint Jean-Paul II"}, {"text": "« La contemplation du Christ trouve en Marie son modèle indépassable. »", "author": "Saint Jean-Paul II"}, {"text": "« En Marie le Saint-Esprit a tout fait. Il a formé l’humanité de Jésus en la couvrant de son ombre. »", "author": "Jean Lafrance"}, {"text": "« Ô Notre-Dame, nous attendons aussi cette réponse de miséricorde ! Le monde entier à tes genoux attend ton consentement »", "author": "Saint Bernard de Clairvaux"}, {"text": "« Mon enfant, tu ne sais pas ce que l’obéissance est capable de produire : par un oui, par un seul oui, « Qu’il me soit fait selon votre parole !\". Marie devient la Mère du Très-Haut ; ce faisant elle se déclarait sa servante mais gardait intacte sa virginité qui était si chère à Dieu et à ses propres yeux. Par ce oui de Marie, le monde obtient le salut ; l’humanité est rachetée. Alors, tâchons nous aussi de faire la volonté de Dieu et de toujours dire oui au Seigneur. »", "author": "Saint Padre Pio"}, {"text": "« Ô divine Charité qui pense à tout, même aux plus petites choses ! »", "author": "Paula Hoesl"}], "vertus": [{"label": "Ouvrir son cœur à Dieu, avec confiance", "citation": "« Par sa seule volonté, Dieu a aboli la distance entre lui et sa Création. Cette annonciation prélude tout le mystère de l’Incarnation, depuis la Nativité jusqu’à Pâques. Alors que domine la peur de la maladie, de la contagion, voire de la mort, que souffle le vent de la destruction, nous pouvons demander au Seigneur de venir nous rejoindre et de nous dire : « Soyez sans crainte, vous avez trouvé grâce auprès de Dieu. ». »", "author": "auteur inconnu", "rest": ""}, {"label": "Dire oui à l’action de l’Esprit-Saint dans notre vie", "citation": "« Quand nous méditons ce mystère joyeux, nous sommes mis au défi de nous ouvrir à l’action transformante de l’Esprit Créateur qui fait de nous des êtres nouveaux, qui nous fait un avec lui, et nous remplit de sa vie. Et nous sommes invités, avec une exquise courtoisie, à donner notre consentement à sa venue en nous, à accueillir le Verbe de Dieu dans nos cœurs, pour que nous soyons rendus capables de répondre à son amour et de nous ouvrir à l’amour les uns envers les autres. » (Benoît XVI)", "author": null, "rest": ""}, {"label": "Mettre sa pratique en accord avec sa prière", "citation": "« Si la pratique ne s’accorde pas avec la prière, l’homme peine en vain »", "author": "Abbé Moïse", "rest": ""}], "graces": [{"label": "Devenir participants de la nature divine", "citation": null, "author": null, "rest": " : Seigneur, Tu as voulu que ton Verbe prît chair dans le sein de la Vierge Marie ; puisque nous reconnaissons en Lui notre Rédempteur, à la fois homme et Dieu, accorde-nous d’être participants de sa Nature divine."}, {"label": "Accepter de s’en remettre à Dieu humblement, comme Marie", "citation": "« Ce qu’on annonce à Marie, elle ne pouvait pas même l’avoir demandé, tant il y avait de sublimité et d’excellence. Marie, humble, retirée, petite à ses yeux, ne pensait pas seulement qu’un ange la pût saluer, et surtout par de si hautes paroles, et son humilité la jeta dans le trouble. Mais l’ange reprit aussitôt : « Ne craignez point, Marie ». » (Saint Curé d’Ars)", "author": null, "rest": ""}, {"label": "Savoir écouter", "citation": "« Le Père n’a dit qu’une parole : ce fut son Fils. Et dans un silence éternel, Il la dit toujours : l’âme doit l’écouter en silence ».", "author": "Saint Jean de la Croix", "rest": ""}], "peches": [{"label": "L’orgueil", "citation": "« Dieu résiste aux orgueilleux, et il accorde sa grâce aux humbles. Soumettez-vous donc à Dieu ; résistez au diable, et il s’enfuira de vous. » (Jacques 4, 6-12)", "author": null, "rest": ""}, {"label": "La négligence", "citation": "« S’il est vrai qu’au moindre acte de vertu correspond une augmentation de grâces, il doit être vrai, à l’inverse, que le fait de négliger, si peu que ce soit, ces mêmes actes, au moment où le Seigneur m’incite à les accomplir, peut me faire manquer bien des grâces sans lesquelles je ne peux rien faire, absolument rien. Je dois donc veiller avec soin aux plus petites occasions, et faire tout ce que je fais avec une délicatesse extrême. »", "author": "Saint Jean XXIII", "rest": ""}, {"label": "Le renfermement", "citation": "« Nous appelons ‘nuit’ le renoncement à la saveur recherchée en toutes choses. En effet, de même que la nuit n’est rien d’autre que la privation de lumière et, par conséquent, de tout ce qu’on peut voir grâce à elle (ce qui laisse la capacité visuelle à l’obscur et sans rien), ainsi peut-on appeler ‘nuit’ le renoncement à l’attirance pour toutes choses car, privée de la saveur qu’elle recherche, l’âme demeure comme à l’obscur et sans rien. »", "author": "Saint Jean de la Croix", "rest": ""}, {"label": "Le doute", "citation": "« La foi est au-dessus de tout ce que l’âme peut comprendre, goûter, ressentir et imaginer. Si elle ne s’aveugle pas à tout cela, restant dans une obscurité totale, [l’âme] ne parviendra pas à ce qui est meilleur, à savoir ce qu’enseigne la foi. L’aveugle dont la cécité n’est pas totale ne se laisse pas facilement conduire par son guide. Pour si peu qu’il voie, il pense qu’il est mieux d’aller par le chemin qu’il aperçoit car il n’en voit pas de meilleur. Ainsi, imposant sa volonté, peut-il égarer celui qui le guide et qui voit mieux que lui. Il en est ainsi de l’âme en chemin : si elle prend appui sur son propre savoir ou sur ce qu’elle goûte ou connaît de Dieu (de toute façon, même si c’est beaucoup, c’est très peu et très différent de ce que Dieu est), elle s’égarera facilement ou s’arrêtera parce qu’elle ne veut pas rester complètement aveugle, dans la foi qui est son véritable guide. »", "author": "Saint Jean de la Croix", "rest": ""}, {"label": "L’endormissement", "citation": "« O souffle divin de l’Esprit Saint, faites-vous sentir en mon âme ; réveillez-la de l’assoupissement qui l’immerge ; dissipez la langueur où elle est immergée ; enlevez la poussière qui s’attache, en quelque sorte, à tout ce que je fais ; opérez en moi tous les changements que vous savez y être nécessaires. O divin Paraclet, faites descendre sur moi une de ces langues de lumière, de charité et de perfection qui apparurent sur les apôtres afin que je puisse bénir avec eux votre Nom, confesser mes péchés, enseigner avec amour, reprendre avec douceur, me taire quand il le faut et être édifiant en toute chose. Ainsi soit-il. »", "author": "Saint Padre Pio", "rest": ""}], "clausules": {"courte": "Et Jésus, incarné, est béni.", "longue": ["et Jésus, dont Gabriel annonce la venue, est béni.", "et Jésus, qui est le fils bien-aimé de Dieu, est béni.", "et Jésus, qui vient en toi par l’Esprit Saint, est béni.", "et Jésus, dont tu es la Mère toujours Vierge, est béni.", "et Jésus, qui s’incarne pour nous sauver, est béni.", "et Jésus, en qui s’accomplissent toutes les promesses, est béni.", "et Jésus, qui se fait homme pour que nous devenions enfants de Dieu, est béni.", "et Jésus, que tu portes en toi avec amour, est béni.", "et Jésus, qui désire vivre en nous, est béni.", "et Jésus, que nous devons aimer en nos frères, est béni."]}}, {"n": "II", "title": "La visitation", "fruit": "La charité", "parole": {"text": "En ces jours-là, Marie se mit en route et se rendit avec empressement vers la région montagneuse, dans une ville de Judée. Elle entra dans la maison de Zacharie et salua Élisabeth. Or, quand Élisabeth entendit la salutation de Marie, l’enfant tressaillit en elle. Alors, Élisabeth fut remplie d’Esprit Saint, et s’écria d’une voix forte : « Tu es bénie entre toutes les femmes, et le fruit de tes entrailles est béni. D’où m’est-il donné que la mère de mon Seigneur vienne jusqu’à moi ? Car, lorsque tes paroles de salutation sont parvenues à mes oreilles, l’enfant a tressailli d’allégresse en moi. Heureuse celle qui a cru à l’accomplissement des paroles qui lui furent dites de la part du Seigneur. » Marie dit alors : « Mon âme exalte le Seigneur, exulte mon esprit en Dieu, mon Sauveur ! Il s’est penché sur son humble servante ; désormais tous les âges me diront bienheureuse. Le Puissant fit pour moi des merveilles ; Saint est son nom ! Sa miséricorde s’étend d’âge en âge sur ceux qui le craignent. Déployant la force de son bras, il disperse les superbes. Il renverse les puissants de leurs trônes, il élève les humbles. Il comble de biens les affamés, renvoie les riches les mains vides. Il relève Israël son serviteur, il se souvient de son amour, de la promesse faite à nos pères, en faveur d’Abraham et sa descendance à jamais. » Marie resta avec Élisabeth environ trois mois, puis elle s’en retourna chez elle.", "ref": "Luc 1, 36-59"}, "histo": [{"t": "h", "x": "A – Historique :"}, {"t": "s", "x": "Le voyage en montagne de Judée"}, {"t": "p", "x": "Marie part « en hâte » de Nazareth vers une ville de la montagne de Judée : la tradition situe la scène à Aïn Karim, à l’ouest de Jérusalem, soit une centaine de kilomètres de chemins escarpés à travers la Samarie ou la vallée du Jourdain. Pour une jeune femme, c’est un trajet de plusieurs jours, incertain et fatigant, qu’elle entreprend non par nécessité mais par charité envers sa parente. La hâte de Marie n’est pas l’agitation : elle traduit l’empressement de celle que la grâce met en mouvement, aussitôt qu’elle a reçu le don."}, {"t": "s", "x": "La visite et l’hospitalité"}, {"t": "p", "x": "Rendre visite à une proche enceinte, l’assister dans les derniers mois, demeurer auprès d’elle relevait des devoirs familiaux sacrés dans le monde juif, où la solidarité du clan était une loi vivante. Marie reste « environ trois mois », sans doute jusqu’à la naissance de Jean : non une visite de politesse, mais un service discret et prolongé. La jeune fille de Nazareth, déjà mère du Sauveur, se fait servante d’une cousine âgée. Le récit unit ainsi deux maternités improbables, l’une dans la vieillesse stérile, l’autre dans la virginité."}, {"t": "s", "x": "Deux femmes, deux annonces"}, {"t": "p", "x": "Le récit relie volontairement les deux annonciations qui précèdent : celle de Zacharie au Temple (1, 5-25) et celle de Marie à Nazareth (1, 26-38). Élisabeth, parente de Marie, appartient à une famille sacerdotale, « des filles d’Aaron » ; Marie, à la maison de David. Leur rencontre fait converger le sacerdoce et la royauté d’Israël, et avec elles toute l’attente de l’Ancien Testament. Au seuil de l’Évangile, ce sont deux femmes, et non les grands de ce monde, que Dieu choisit pour porter son dessein."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "La Visitation : Marie, Arche de l’Alliance"}, {"t": "p", "x": "À la salutation de Marie, l’enfant tressaille (skirtaō) dans le sein d’Élisabeth – une joie prophétique, comme David dansait devant l’Arche lorsqu’elle montait vers Jérusalem (2 S 6). Le parallèle est voulu jusque dans les mots : « Comment la mère de mon Seigneur vient-elle à moi ? » fait écho à « Comment l’Arche du Seigneur viendrait-elle chez moi ? » (2 S 6, 9), et les trois mois de séjour rappellent les trois mois de l’Arche chez Obed-Édom. Marie est la nouvelle Arche, portant non plus les Tables de la Loi mais la Présence elle-même ; Jean tressaille devant Celui qu’il précédera."}, {"t": "s", "x": "« Bienheureuse celle qui a cru »"}, {"t": "p", "x": "Élisabeth, « remplie de l’Esprit Saint », proclame Marie « bénie entre les femmes » et la déclare bienheureuse pour sa foi – exact contraire de l’incrédulité de Zacharie, frappé de mutisme pour n’avoir pas cru (1, 20). Le titre « mère de mon Seigneur » (Kyrios), ce mot qui traduit le nom divin dans la Bible grecque, est une confession précoce de la seigneurie de Jésus. L’Église y reconnaîtra le germe du dogme proclamé à Éphèse en 431 : Marie vraiment Mère de Dieu, Theotokos, parce que celui qu’elle porte est Dieu fait homme."}, {"t": "s", "x": "Le Magnificat"}, {"t": "p", "x": "Le cantique de Marie (v. 46-55) est tout tissé de l’Écriture, surtout du chant d’Anne (1 S 2) et des Psaumes : Marie parle le langage des croyants qui l’ont précédée. Deux mouvements le structurent. D’abord Dieu a regardé « l’humilité de sa servante » et fait pour elle « de grandes choses ». Puis il opère le grand renversement : il disperse les orgueilleux, renverse les puissants, élève les humbles, comble les affamés et renvoie les riches les mains vides. Sa miséricorde s’étend « d’âge en âge », fidèle à la promesse faite à Abraham."}, {"t": "s", "x": "La spiritualité des anawim"}, {"t": "p", "x": "Ce renversement n’est pas une revanche sociale mais l’expression de la fidélité de Dieu, qui prend toujours le parti des petits. Marie se range parmi les anawim, ces pauvres de Dieu chantés par les prophètes et les psaumes : les humbles qui n’attendent leur salut que de lui. Son chant prolonge l’espérance d’Israël et l’oriente vers son accomplissement dans le Christ. L’Église y entend aussi sa propre voix : tout disciple, devant les merveilles de Dieu, est invité à reprendre ce cantique d’action de grâce et de confiance."}], "saints": [{"text": "« Les bienfaits de l’arrivée de Marie et de la présence du Seigneur se font immédiatement sentir : « Aussitôt qu’Élisabeth eut entendu la voix de Marie qui la saluait, son enfant tressaillit », etc. Remarquez ici la différence et la propriété de chacune des paroles de l’auteur sacré. Elisabeth entendit la voix la première, mais Jean ressentit le premier l’effet de la grâce ; elle entendit d’après l’ordre naturel, mais Jean tressaillit par suite d’une action toute mystérieuse ; l’arrivée de Marie se fait sentir à Élisabeth, la venue du Seigneur à Jean-Baptiste. »", "author": "Saint Ambroise"}, {"text": "« Ô véritable humilité qui a mérité d’enfanter un Dieu à la terre, de rendre la vie aux pauvres mortels, de renouveler les cieux, de purifier le monde, d’ouvrir le paradis, et de rendre à la liberté les âmes des hommes ! L’humilité de Marie est devenue comme une échelle céleste dont Dieu s’est servi pour descendre sur la terre. Car que signifient ces paroles : « Il a regardé », c’est-à-dire : « il a approuvé ? » Il en est beaucoup qui paraissent humbles aux yeux des hommes, mais Dieu ne daigne pas jeter les regards sur leur humilité ; car s’ils étaient sincèrement humbles, leur unique désir serait non pas d’être loués eux-mêmes, mais de voir Dieu loué par tous les hommes, et leur esprit chercherait non dans ce monde, mais en Dieu ses transports et sa joie. »", "author": "Saint Augustin"}], "vertus": [{"label": "Porter le Christ au monde", "citation": "« Ce que va faire, en effet, la Vierge dans sa Visitation, ce n’est pas une visite à sa cousine pour se consoler mutuellement par le récit des merveilles de Dieu en elles. C’est encore moins une visite de charité matérielle pour aider sa cousine dans les derniers mois de sa grossesse et dans ses couches. C’est bien plus que cela. Marie part pour sanctifier saint Jean, pour lui annoncer la Bonne Nouvelle, pour l’évangéliser et le sanctifier, non par ses paroles, mais en portant Jésus en silence, auprès de lui, au milieu de sa demeure. Ainsi font les religieux qui sont voués à la contemplation… »", "author": "Saint Charles de Foucauld", "rest": ""}, {"label": "Une intériorité qui ouvre aux autres", "citation": "« Il me semble que l’attitude de la Vierge, durant les mois qui s’écoulèrent entre l’Annonciation et la Nativité, est le modèle des âmes intérieures, des êtres que Dieu a choisis pour vivre « au-dedans », au fond de l’abîme sans fond. Dans quelle paix, dans quel recueillement, Marie se rendait et se prêtait à toutes choses ! Comme celles qui étaient les plus banales étaient divinisées par elle car à travers tout, la Vierge restait l’adorante du don de Dieu ! Cela ne l’empêchait pas de se dépenser au dehors lorsqu’il s’agissait d’exercer la charité. L’Évangile nous dit que Marie parcourut en toute hâte les montagnes de Judée pour se rendre chez sa cousine Élisabeth (Luc 1,39). » (Sainte Élisabeth de la Trinité)", "author": null, "rest": ""}, {"label": "La confiance et la patience", "citation": "« Petit Jouet de Jésus, Tu vois que j’avais bien raison en pensant que Jésus allait raccommoder sa petite balle ! Je ne me serais jamais attendue qu’il l’eût fait si bien et si promptement. Rappelle-toi, ma chérie, que les heures désespérées sont toujours les heures de Dieu. C’est quand il n’y a plus aucun espoir, quand tout semble perdu que Jésus endormi se réveille et commande en Maître aux vents et à la tempête. (cf Mc 4, 35-41) Oui, petite amie intime du Divin Enfant, oui, tu es bien sa petite balle, abandonne-toi pour toujours entre ses mains. Tu souffriras bien dans ta vie, ton cœur est particulièrement fait pour souffrir, mais quand Jésus est là, quand c’est lui-même qui envoie sa petite balle au milieu des épines, les épines se changent en fleur. Prions, prions… »", "author": "Sœur Agnès de Jésus, sœur de Sainte Thérèse de Lisieux", "rest": ""}], "graces": [{"label": "Exalter le Seigneur", "citation": "« Mon âme magnifie – c’est-à-dire exalte – le Seigneur. Exalter Dieu signifie lui donner une place dans le monde, dans notre propre vie, le laisser entrer dans notre temps et dans notre action : telle est l’essence la plus profonde de la prière véritable. Là où Dieu devient grand, l’homme ne devient pas petit : là, l’homme aussi devient grand et le monde lumineux. Quand la Vierge Marie rend grâce au Seigneur, elle nous prend à témoin. Marie partage, comme par anticipation, avec ses futurs enfants que nous sommes, la joie qui habite son cœur, pour qu’elle devienne la nôtre. Chaque récitation du Magnificat fait de nous des témoins de son sourire. Nous ne devons pas seulement porter le Christ dans notre cœur, mais nous devons le porter au monde, de sorte que nous puissions aussi engendrer le Christ pour notre temps. » (Benoît XVI)", "author": null, "rest": ""}, {"label": "Visite à Jésus au Saint Sacrement", "citation": "« Seigneur Jésus Christ, qui par amour pour les hommes, vous tenez jour et nuit, plein de bonté et d’amour, dans ce sacrement, je crois que vous êtes ici présent, je vous adore et vous remercie de tout ce que vous avez fait pour moi. Je salue aujourd’hui votre cœur si aimable et me propose de vous aimer de toute mon âme. Je regrette d’avoir tant déplu à votre infinie bonté et je promets de ne plus vous offenser à l’avenir. Je me consacre et me donne tout à vous, implorant en retour votre saint amour. Je vous recommande les âmes du purgatoire, les pauvres pécheurs et toute ma famille ; enfin je vous prie de m’aider, de me sauver et de me bénir pour toujours. Venez, ô Jésus, dans mon cœur et ne me quittez plus jamais ! Ainsi soit-il. » (Saint Padre Pio)", "author": null, "rest": ""}, {"label": "Faire selon ses capacités et son temps", "citation": "« Le Seigneur veut que nos limites et nos faiblesses prennent appui en sa force et en sa toute-puissance ; il veut nous voir croire que sa bonté peut suppléer à l’imperfection de nos moyens. Ceux qui se chargent d’affaires nombreuses, même avec une intention droite, doivent se résoudre à faire simplement ce qui est en leur pouvoir, sans s’affliger s’ils ne parviennent pas à tout réaliser comme ils le voudraient. » (Saint Ignace de Loyola)", "author": null, "rest": ""}, {"label": "Se repentir", "citation": "« As-tu péché ? Va à l’Église et lave-toi de ton péché. Chaque fois qu’il t’arrive de tomber, relève-toi à nouveau ; chaque fois que tu pèches, repens-toi de ton péché. Ne désespère pas. Même si tu pèches une deuxième fois, repens-toi une deuxième fois. Ne perds pas espoir dans les biens qui sont préparés pour toi… Car l’Église est l’hospice de la guérison, non un tribunal ; non un lieu où expient les pécheurs, mais un lieu ou le pardon des péchés est donné à l’être humain »", "author": "Saint Jean Chrysostome", "rest": ""}], "peches": [{"label": "L’affaissement", "citation": "« Nul ne donne sa mesure par un autre ; il faut donner par soi avec l’aide de Dieu. Dieu veut de nous de la volonté dans la faiblesse, du renoncement dans le besoin, de l’amour dans nos douleurs, de la patience dans l’adversité. » (Marthe Robin)", "author": null, "rest": ""}, {"label": "L’inquiétude", "citation": "« Il me semble que vous devriez vous résoudre à faire avec calme ce que vous pouvez. Ne soyez pas inquiets de tout, mais abandonnez à la divine Providence ce que vous ne pouvez accomplir par vous-même. Sont agréables à Dieu notre soin et notre sollicitude raisonnables pour mener à bien les affaires dont nous devons nous occuper par devoir. L’anxiété et l’inquiétude de l’esprit ne plaisent point à Dieu. »", "author": "Saint Ignace de Loyola", "rest": ""}, {"label": "Le désespoir", "citation": "« O vous donc, qui avez reçu nos paroles et les avez mises en pratique, persévérez et avancez ! et vous qui n’avez point encore mis la main à l’œuvre, commencez dès maintenant, et qu’à l’avenir vos efforts vous sauvent de l’accusation de négligence ! On peut toujours, si négligent qu’on ait été, on peut, avec de la diligence, réparer le temps perdu. Ecoutez le Psalmiste : Si aujourd’hui vous entendez sa voix, n’endurcissez pas vos cœurs comme au jour de la colère. (Ps. XCIV, 8.) C’est nous avertir et nous conseiller de ne (139) jamais désespérer, mais, tant que nous sommes en ce inonde, de conserver l’espérance que nous arriverons au but et que nous obtiendrons la palme de notre glorieuse vocation. »", "author": "Saint Jean Chrysostome", "rest": ""}, {"label": "Le désespoir", "citation": "« O vous donc, qui avez reçu nos paroles et les avez mises en pratique, persévérez et avancez ! et vous qui n’avez point encore mis la main à l’œuvre, commencez dès maintenant, et qu’à l’avenir vos efforts vous sauvent de l’accusation de négligence ! On peut toujours, si négligent qu’on ait été, on peut, avec de la diligence, réparer le temps perdu. Ecoutez le Psalmiste : Si aujourd’hui vous entendez sa voix, n’endurcissez pas vos cœurs comme au jour de la colère. (Ps. XCIV, 8.) C’est nous avertir et nous conseiller de ne (139) jamais désespérer, mais, tant que nous sommes en ce inonde, de conserver l’espérance que nous arriverons au but et que nous obtiendrons la palme de notre glorieuse vocation. »", "author": "Saint Jean Chrysostome", "rest": ""}, {"label": "L’orgueil", "citation": "« Dieu humilie les cœurs orgueilleux »", "author": "Deut., 6, 12", "rest": ""}, {"label": "L’égoïsme", "citation": "« Si tu fais un peu de bien au bon frère, fais le double pour l’autre, car c’est lui qui est malade »", "author": "Poemen", "rest": ""}, {"label": "La tristesse", "citation": "« Le contraire d’un peuple chrétien, c’est un peuple triste, un peuple de vieux »", "author": "Georges Bernanos", "rest": ""}], "clausules": {"courte": "Et Jésus, que tu portes à Élisabeth, est béni.", "longue": ["et Jésus, que tu portes en hâte vers Élisabeth, est béni.", "et Jésus, qui sanctifie Jean dès le sein de sa mère, est béni.", "et Jésus, dont la venue fait tressaillir l’enfant de joie, est béni.", "et Jésus, qui remplit Élisabeth de l’Esprit Saint, est béni.", "et Jésus, que tu nous fais connaître en visitant les tiens, est béni.", "et Jésus, pour qui tu es proclamée bienheureuse d’avoir cru, est béni.", "et Jésus, qui par ta bouche élève les humbles et renverse les puissants, est béni.", "et Jésus, qui comble de biens les affamés, est béni.", "et Jésus, que tu portes à tous ceux qui l’attendent, est béni.", "et Jésus, que nous devons servir dans le prochain, est béni."]}}, {"n": "III", "title": "La nativité", "fruit": "La simplicité, l’humilité, l’esprit de pauvreté", "parole": {"text": "L’ange leur dit : « Ne craignez pas, car voici que je vous annonce une bonne nouvelle, qui sera une grande joie pour tout le peuple : Aujourd’hui, dans la ville de David, vous est né un Sauveur qui est le Christ, le Seigneur. Et voici le signe qui vous est donné : vous trouverez un nouveau-né emmailloté et couché dans une mangeoire. » Et soudain, il y eut avec l’ange une troupe céleste innombrable, qui louait Dieu en disant : « Gloire à Dieu au plus haut des cieux, et paix sur la terre aux hommes, qu’Il aime.", "ref": "Lc 2, 1-20"}, "histo": [{"t": "h", "x": "A – Historique :"}, {"t": "s", "x": "Le recensement et l’histoire du monde"}, {"t": "p", "x": "Luc inscrit la naissance dans l’histoire universelle : un édit de César Auguste ordonne le recensement « de toute la terre », du temps où Quirinius gouvernait la Syrie. Les recensements romains servaient à lever l’impôt et à mesurer la population des provinces, et requéraient parfois le retour au lieu d’origine de la famille. Cette précision n’est pas un simple décor : en datant la venue du Sauveur par les empereurs et les gouverneurs, Luc affirme que le salut entre dans le temps réel des hommes, sous le règne du prince qui se faisait acclamer comme « sauveur » et porteur de la pax romana. Le vrai Sauveur, lui, naît sans bruit."}, {"t": "s", "x": "La difficulté chronologique"}, {"t": "p", "x": "La mention de Quirinius soulève une difficulté connue : le recensement attesté sous ce légat date de l’an 6 de notre ère, soit après la mort d’Hérode le Grand, sous le règne duquel Luc et Matthieu placent pourtant la nativité. Plusieurs solutions sont proposées sans qu’aucune ne s’impose : un premier dénombrement antérieur, une fonction de Quirinius dès cette époque, ou la traduction « ce recensement eut lieu avant que Quirinius… ». L’Église ne tranche pas une question d’érudition historique ; l’intention de Luc demeure limpide : ancrer l’Évangile dans une chronologie vérifiable."}, {"t": "s", "x": "Bethléem, cité de David"}, {"t": "p", "x": "Joseph, « de la maison et de la lignée de David », monte de Nazareth en Galilée jusqu’à Bethléem de Judée, la « cité de David ». Le déplacement accomplit, à l’insu des acteurs, la prophétie de Michée : « Et toi, Bethléem Éphrata,… de toi sortira pour moi celui qui doit gouverner Israël » (Mi 5, 1). Le nom même de la bourgade signifie en hébreu « maison du pain » (Beth-léhem) : il convient que celui qui se dira « le pain de vie » (Jn 6, 35) et se donnera sous les espèces du pain y voie le jour. La géographie devient ainsi porteuse du mystère."}, {"t": "s", "x": "La crèche et le manque de place"}, {"t": "p", "x": "Faute de place dans la salle – le grec kataluma désigne la pièce d’accueil ou le logement commun, non l'« hôtellerie » de nos traductions courantes –, Marie emmaillote l’enfant et le couche dans une mangeoire, sans doute l’auge d’un abri pour les bêtes attenant à la maison. Le détail, répété trois fois, n’est pas anecdotique : le Roi attendu d’Israël entre dans le monde par la pauvreté, l’inconfort et l’effacement. Dès le seuil de sa vie, l’abaissement de celui qui « n’a pas où reposer la tête » (Lc 9, 58) annonce le mystère de la kénose."}], "comm": [{"t": "h", "x": "B – Théologie :"}, {"t": "s", "x": "« Un Sauveur, le Christ, Seigneur »"}, {"t": "p", "x": "À des bergers veillant la nuit, l’ange annonce « une bonne nouvelle, source d’une grande joie pour tout le peuple ». Trois titres se rejoignent en un seul verset : Sauveur – celui qui délivre, là où Auguste usurpait le mot ; Christ, le Messie consacré ; Seigneur (Kyrios), le nom même que la Bible grecque réserve à Dieu. L'« aujourd’hui » du salut, si cher à Luc (cf. 4, 21 ; 19, 9 ; 23, 43), retentit ici pour la première fois : l’événement de Bethléem n’est pas seulement passé, il atteint chaque génération qui l’accueille dans la foi."}, {"t": "s", "x": "Les bergers, premiers destinataires"}, {"t": "p", "x": "Dieu se révèle d’abord à des bergers – gens rudes, tenus à la marge de la vie religieuse, dont le témoignage passait même pour peu fiable. Comme souvent chez Luc, les premiers évangélisés sont les pauvres et les petits (cf. 1, 52 ; 4, 18). Le signe qui leur est donné déconcerte toute attente de gloire : « un nouveau-né emmailloté, couché dans une mangeoire ». C’est l’humilité même qui sert de preuve, l’abaissement qui devient le lieu où Dieu se laisse trouver. L’arrière-plan évoque David, berger appelé du troupeau, et le Pasteur d’Israël annoncé par Ézéchiel (Ez 34)."}, {"t": "s", "x": "Le Gloria de l’armée céleste"}, {"t": "p", "x": "À l’ange se joint soudain une armée céleste qui chante : « Gloire à Dieu au plus haut des cieux, et paix sur la terre aux hommes qu’il aime ». Deux pôles s’unissent : la gloire rendue à Dieu dans les hauteurs et la paix – le shalom messianique, plénitude de salut – offerte ici-bas. Cette paix ne va pas à tous indistinctement, mais « aux hommes de sa bienveillance », ceux qu’enveloppe le bon vouloir divin. La liturgie a recueilli ce cantique des anges pour en faire le Gloria de la messe, prolongeant jusqu’à nous la louange de la nuit de Noël."}, {"t": "s", "x": "Marie qui méditait dans son cœur"}, {"t": "p", "x": "Tandis que les bergers repartent « glorifiant et louant Dieu », Luc note un contraste intérieur : « Marie retenait tous ces événements et les méditait (symballousa, les « rapprochait ») dans son cœur. » Elle est ici la première figure de la contemplation chrétienne, et sans doute, pour l’évangéliste, la source secrète de ces récits de l’enfance. Puis, le huitième jour, l’enfant est circoncis selon la Loi et reçoit le nom révélé par l’ange avant même sa conception : Jésus, « le Seigneur sauve ». Obéissance à l’Alliance ancienne et révélation du salut se nouent en ce nom."}], "saints": [{"text": "« Une étoile qui ne paraissait qu’aux yeux n’était pas capable d’attirer les mages au Roi nouveau-né ; il fallait que l’étoile de Jacob et « la lumière du Christ » se fût levée dans leur cœur. (…) L’étoile des mages est donc l’inspiration dans les cœurs. Je ne sais quoi luit en dedans : vous êtes dans les ténèbres et dans les amusements ou peut être dans la corruption du monde : tournez-vous vers l’Orient où se lèvent les astres ; tournez vous à Jésus Christ qui est à l’Orient. (…) Quittez le monde de même ; le monde pour lequel la nouvelle étoile, la chaste inspiration qui vous ébranle le cœur, commence à vous insinuer un secret dégoût. Allez à Jérusalem : recevez les lumières de l’Église : vous y trouverez les docteurs qui vous interpréteront les prophéties, qui vous feront entendre les desseins de Dieu ; et vous marcherez sûrement sous cette conduite. (…) Soumettez, sages du monde, toute vos lumières, et celles-là mêmes qui vous sont données d’en haut, à la doctrine de l’Eglise, parce que Dieu qui vous éclaire, vous veut faire humbles encore plus qu’éclairés »", "author": "Bossuet"}, {"text": "« Cieux, répandez d’en haut votre rosée, et que les nues fassent pleuvoir le Juste : que la terre s’ouvre et qu’elle enfante le Sauveur »", "author": "Isaïe"}], "vertus": [{"label": "Rester petit", "citation": "« Auprès de Toi, Marie, j’aime à rester petite. »", "author": "Sainte Thérèse de Lisieux", "rest": ""}, {"label": "Transformer la souffrance en joie", "citation": "« Que Marie transforme en joie toutes les souffrances de ta vie. » (Saint Padre Pio)", "author": null, "rest": ""}, {"label": "Rester humble", "citation": "« L’incarnation a sa source dans la bonté de Dieu… Mais une chose apparaît tout d’abord, si merveilleuse, si étincelante, si étonnante, qu’elle brille comme un signe éblouissant : c’est l’humilité infinie que contient un tel mystère… Toute sa vie Jésus n’a fait que descendre : descendre en s’incarnant, descendre en se faisant petit enfant, descendre en obéissant, descendre en se mettant toujours à la dernière place. »", "author": "Saint Charles de Foucauld", "rest": ""}, {"label": "La simplicité", "citation": "« Mais c’est du sentiment de sa propre impuissance que l’enfant tire humblement le principe même de sa joie »", "author": "Georges Bernanos", "rest": ""}, {"label": "La famille, école du travail et de l’humilité", "citation": "« Jésus entre dans notre histoire, il vient parmi nous, en naissant de Marie par l’œuvre de Dieu, mais à travers la présence de saint Joseph, le père légal qui veille sur lui et lui enseigne également son travail. Jésus naît et vit dans une famille, dans la sainte Famille, en apprenant de saint Joseph le métier de charpentier, dans l’atelier de Nazareth, en partageant avec lui l’application, la fatigue, la satisfaction et également les difficultés de chaque jour. »", "author": "Pape François", "rest": ""}], "graces": [{"label": "La grâce d’attendre d’être sauvé", "citation": "« Oh ! que j’aime Marie ton éloquent silence ! Pour moi c’est un concert doux et mélodieux qui me dit la grandeur et la toute puissance d’une âme qui n’attend son secours que des Cieux. »", "author": "Sainte Thérèse de Lisieux", "rest": ""}, {"label": "Communion spirituelle", "citation": "« Mon Jésus, je crois que vous êtes présent dans le Très Saint Sacrement. Je vous aime de tout mon cœur et vous désire de toute mon âme. Puisque je ne peux pas vous recevoir sacramentellement en ce moment, venez au moins spirituellement dans mon cœur. Je crois que vous y êtes déjà, je vous garde affectueusement en moi et m’unis totalement à vous. Ne permettez pas que je me sépare jamais de vous. Ainsi soit-il. » (Saint Padre Pio)", "author": null, "rest": ""}, {"label": "Accueillir la lumière", "citation": "« Cher frère, chère sœur, si tes mains te semblent vides, si tu vois ton cœur pauvre d’amour, cette nuit est pour toi. La grâce de Dieu est apparue pour resplendir dans ta vie. Accueille-la et la lumière de Noël brillera en toi. »", "author": "Pape François", "rest": ""}, {"label": "L’esprit de pauvreté", "citation": "« Il a reçu ce qui vient d’en bas pour donner ce qui vient d’en haut : Il s’est fait pauvre pour que nous devenions riches dans sa pauvreté ; Il a reçu la forme d’un esclave pour que nous recevions la liberté ; Il est descendu pour que nous soyons élevés ; Il a connu la tentation pour que nous en soyons glorifiés ; Il est mort pour que nous soyons sauvés ; Il s’est élevé pour nous entraîner à sa suite, nous qui étions à terre du fait de la chute dans le péché. »", "author": "Saint Grégoire de Naziance", "rest": ""}, {"label": "La perfection dans les petites choses", "citation": "« L’acte simplement et absolument grand est celui qui consiste dans l’emploi excellent d’un bien supérieur »", "author": "Saint Thomas d’Aquin", "rest": ""}], "peches": [{"label": "Ignorer les pauvres", "citation": "« Ô Jésus, Sauveur du monde, couché sur la pauvre crèche de Bethléem, nous Te rendons grâce pour Ta venue au monde en vue de nous faire enfants de Dieu. Avec Marie et Joseph, les Anges et les bergers, nous T’adorons et T’exaltons. Fais que Ta pauvreté et Ton abaissement ne nous éloignent pas de Toi, mais qu’ils nous rapprochent encore davantage et nous fassent sensibles aux besoins de nos frères pauvres. »", "author": "Sainte Faustine", "rest": " : il faut voir en chaque pauvre un frère du Christ."}, {"label": "L’attachement aux biens de ce monde", "citation": "« Quand on vous dit : « n’aimez point le monde », on ne vous dit pas : « ne mangez pas, ne buvez pas, n’engendrez pas d’enfants ». Non, on ne vous dit pas cela, mais : mettez de la mesure dans ce à quoi vous êtes attachés, de telle sorte que l’attrait des créatures ne fasse point de vous des esclaves, car vous ne les avez reçues que pour vous en servir. »", "author": "Saint Augustin", "rest": ""}], "clausules": {"courte": "Et Jésus, né pour nous à Bethléem, est béni.", "longue": ["Et Jésus, petit bébé dans la crèche, est béni.", "Et Jésus, image du Dieu invisible, est béni.", "Et Jésus, né pour nous à Bethléem, est béni.", "Et Jésus, que tu couches dans la mangeoire, est béni.", "Et Jésus, que tu adores avec Joseph, est béni.", "Et Jésus, dont les anges annoncent la naissance, est béni.", "Et Jésus, que les bergers viennent adorer, est béni.", "Et Jésus, devant qui se prosternent les mages, est béni.", "Et Jésus, qui se fait pauvre pour nous détacher des richesses, est béni.", "Et Jésus, qui se fait tout petit pour nous apprendre l’humilité, est béni."]}}, {"n": "IV", "title": "La présentation au temple", "fruit": "L’obéissance et a pureté du cœur", "parole": {"text": "Quand fut arrivé le huitième jour, celui de la circoncision, l’enfant reçut le nom de Jésus, le nom que l’ange lui avait donné avant sa conception. Quand fut accompli le temps prescrit par la loi de Moïse pour la purification, les parents de Jésus l’amenèrent à Jérusalem pour le présenter au Seigneur, selon ce qui est écrit dans la Loi : Tout premier-né de sexe masculin sera consacré au Seigneur. Ils venaient aussi offrir le sacrifice prescrit par la loi du Seigneur : un couple de tourterelles ou deux petites colombes.", "ref": "Luc 2, 21-24"}, "histo": [{"t": "h", "x": "A – Historique :"}, {"t": "s", "x": "Purification et rachat du premier-né"}, {"t": "p", "x": "La Loi unissait ici deux rites distincts. Quarante jours après la naissance d’un garçon, la mère accomplissait sa purification rituelle (Lv 12), au terme d’une période d’impureté légale liée à l’enfantement. Tout premier-né mâle, par ailleurs, appartenait au Seigneur en mémoire de la Pâque d’Égypte (Ex 13, 2.12) et devait être racheté. Luc condense ces deux exigences dans une même montée au Temple, soulignant combien la Sainte Famille s’inscrit dans l’obéissance fidèle à la Torah, sans privilège ni dispense."}, {"t": "s", "x": "L’offrande des pauvres"}, {"t": "p", "x": "Le rite prévoyait normalement l’offrande d’un agneau ; mais la Loi autorisait les familles modestes à présenter à la place « un couple de tourterelles ou deux jeunes colombes » (Lv 12, 8). C’est précisément cette offrande des pauvres que choisissent Marie et Joseph, indice discret de leur condition humble. Le Sauveur du monde est ainsi présenté dans la pauvreté, par des parents qui n’ont pas de quoi offrir l’agneau – alors qu’ils portent dans leurs bras le véritable Agneau de Dieu."}, {"t": "s", "x": "Le reste fidèle et l’attente d’Israël"}, {"t": "p", "x": "Autour du sanctuaire gravitent ceux qui espèrent « la consolation d’Israël » (Lc 2, 25) et « la délivrance de Jérusalem » (2, 38). Ces expressions, héritées d’Isaïe (Is 40, 1 ; 52, 9), désignent l’attente messianique du reste fidèle : des âmes pieuses, priantes, tendues vers la venue du Messie au cœur d’une époque dominée par Rome. Syméon et Anne en sont les figures : le premier « juste et pieux » sur qui repose l’Esprit Saint ; la seconde, prophétesse très âgée de la tribu d’Aser, veuve, qui « ne quittait pas le Temple, servant Dieu nuit et jour »."}], "comm": [{"t": "h", "x": "B – Commentaire :"}, {"t": "s", "x": "Le Nunc dimittis (« Maintenant, partons »)"}, {"t": "p", "x": "Prenant l’enfant dans ses bras, Syméon bénit Dieu : « Maintenant, Seigneur, tu laisses ton serviteur s’en aller en paix, selon ta parole. Car mes yeux ont vu ton salut, salut que tu as préparé devant tous les peuples, lumière pour éclairer les nations, et gloire d’Israël, ton peuple. ». Le mot grec despotēs (Maître) évoque le propriétaire libérant son serviteur : Syméon, comblé, demande son congé. Sa joie n’est pas de posséder mais d’avoir vu ; il tient dans ses mains la promesse accomplie. Ce cantique, par sa sérénité, fait du vieillard l’icône de tout croyant qui, ayant rencontré le Christ, peut affronter la mort sans crainte."}, {"t": "s", "x": "Lumière des nations, gloire d’Israël"}, {"t": "p", "x": "Syméon proclame aussitôt la portée universelle de ce salut : « lumière pour la révélation aux nations » et « gloire d’Israël ton peuple ». Il reprend les chants du Serviteur souffrant d’Isaïe (Is 42, 6 ; 49, 6), où le Messie devient « lumière des nations ». Le salut, jusque-là confié à Israël, déborde désormais vers tous les peuples : les païens ne reçoivent plus une simple lueur réfléchie, mais la pleine révélation. Luc, dès l’enfance de Jésus, annonce ainsi le grand thème de son œuvre, l’ouverture du salut à l’humanité entière."}, {"t": "s", "x": "La prophétie de l’épée"}, {"t": "p", "x": "À Marie, Syméon adresse une parole grave : cet enfant est là pour la chute et le relèvement de beaucoup en Israël, comme « signe de contradiction » – une pierre qui fait tomber ou relève selon qu’on l’accueille ou la rejette (cf. Is 8, 14). Puis l’avertissement personnel : « toi-même, une épée te transpercera l’âme ». La tradition y a lu l’association de Marie à la Passion de son Fils, la Mater Dolorosa du Calvaire ; certains Pères y voient aussi le glaive du discernement qui éprouvera tout cœur devant le Christ."}, {"t": "s", "x": "Anne la prophétesse, et le retour à Nazareth"}, {"t": "p", "x": "Anne « survient » à la même heure : elle rend grâce et parle de l’enfant à tous ceux qui attendaient la délivrance. Luc, attentif aux femmes et aux humbles, place ainsi côte à côte un vieillard et une veuve comme premiers témoins au Temple, formant le double témoignage que requiert la Loi. Puis, ayant tout accompli « selon la Loi du Seigneur », la Sainte Famille regagne Nazareth. La notice finale – l’enfant « grandissait et se fortifiait, rempli de sagesse » – souligne la réalité de l’Incarnation : le Verbe assume une vraie croissance humaine."}], "saints": [{"text": "« Il lui avait été promis qu’il ne mourrait point avant d’avoir vu le Christ du Seigneur, et il montre l’accomplissement de cette promesse dans les paroles suivantes : « Parce que mes yeux ont vu le Sauveur que vous nous donnez »", "author": "Origène"}, {"text": "Durant toute sa vie au côté du Christ et non seulement au Calvaire, Marie a fait sienne la dimension sacrificielle de l’Eucharistie. Quand elle porta l’enfant Jésus au temple de Jérusalem « pour le présenter au Seigneur » (Lc 2, 22), elle entendit le vieillard Syméon lui annoncer que cet Enfant serait un « signe de division » et qu’une « épée » devait aussi transpercer le cœur de sa mère (cf. Lc 2, 34-35). Le drame de son Fils crucifié était ainsi annoncé à l’avance, et d’une certaine manière était préfiguré le « stabat Mater » de la Vierge au pied de la Croix. Se préparant jour après jour au Calvaire, Marie vit une sorte « d’Eucharistie anticipée », à savoir une « communion spirituelle » de désir et d’offrande, dont l’accomplissement se réalisera par l’union avec son Fils au moment de la passion et qui s’exprimera ensuite, dans le temps après Pâques, par sa participation à la Célébration eucharistique, présidée par les Apôtres, en tant que « mémorial » de la passion. »", "author": "Saint Jean-Paul II"}], "vertus": [{"label": "Le Nunc dimittis, prière du soir", "citation": "« en paix » parce qu’on a « vu le salut ». Reprendre ce cantique apprend à remettre entre les mains de Dieu la journée écoulée, avec ses joies et ses manques, et un jour la vie entière. C’est une école de confiance : qui a contemplé le Christ peut affronter la nuit, et finalement la mort, sans angoisse. Le repos du soir devient ainsi une répétition paisible de l’abandon ultime", "author": null, "rest": " : chaque soir, à l’office des Complies, l’Église fait sienne la prière de Syméon : mourir."}, {"label": "Présenter sa vie à Dieu", "citation": null, "author": null, "rest": " : offrir l’enfant au Temple, c’est le consacrer à Dieu, reconnaître qu’il appartient d’abord à son Créateur. À notre tour, nous sommes invités à présenter au Seigneur notre vie, nos proches, nos projets et nos engagements, comme un bien reçu de lui et destiné à lui revenir. Cette offrande, loin d’appauvrir l’existence, lui donne son vrai poids : tout ce qui est remis à Dieu est sauvé et fécondé. La consécration quotidienne devient alors une manière concrète de vivre sous son regard."}, {"label": "Avoir le sens du sacrifice", "citation": "« Marie, Vierge de l’offrande, Toi qui as apporté Ton enfant dans le Temple et L’as offert à Dieu. Les paroles prophétiques de Syméon ont blessé Ton cœur de mère et T’ont unie encore davantage à l’œuvre salvifique de Ton Fils. Apprends-nous, ô Mère de Miséricorde, à nous sacrifier généreusement à chaque cause grande et importante, avant tout au salut des âmes ! » (Sainte Faustine)", "author": null, "rest": ""}, {"label": "L’obéissance", "citation": "« La discrétion extrême avec laquelle Joseph accomplit le rôle que Dieu lui avait confié met encore davantage en évidence sa foi, qui consista à se placer toujours à l’écoute du Seigneur, en cherchant à comprendre sa volonté, afin d’obéir à celle-ci de tout son cœur et de toutes ses forces. C’est pourquoi l’Évangile le définit comme un homme « juste » (Mt 1, 19). En effet, le juste est une personne qui prie, qui vit de la foi et qui cherche à accomplir le bien en chaque circonstance de la vie. »", "author": "Saint Jean-Paul II", "rest": ""}, {"label": "Le don total, ne rien garder pour soi", "citation": "« Une fois, la Sainte a dit à Jésus, avec satisfaction, d’avoir offert toute sa vie, tout ce qu’elle possédait. Mais la réponse de Jésus l’a bouleversée : « Tu ne m’as pas offert ce qui t’appartient vraiment ». Qu’est-ce que cette sainte religieuse avait gardé pour elle ? Jésus « lui dit avec douceur » : ‘‘Ma fille, donne-moi ta misère’’ »", "author": "Saint Faustine", "rest": ""}], "graces": [{"label": "Reconnaître le Christ comme Syméon et Anne", "citation": null, "author": null, "rest": " : deux anciens, fidèles à la prière et à l’attente, savent reconnaître le Sauveur que les foules ne voient pas. Leur exemple enseigne que la persévérance dans la prière ouvre peu à peu les yeux du cœur et rend capable de discerner la présence de Dieu sous des dehors très humbles. La vieillesse elle-même, loin d’être un déclin stérile, devient ici prophétique et féconde, dès lors qu’elle est offerte au Seigneur. À tout âge, veiller et attendre prépare à la rencontre."}, {"label": "Accepter que toute joie comprend aussi une peine", "citation": "« Les deux derniers mystères, qui conservent toutefois cette note de joie, anticipent les signes du drame. En effet, la présentation au temple, tout en exprimant la joie de la consécration et en plongeant le vieillard Syméon dans l’extase, souligne aussi la prophétie du « signe en butte à la contradiction » que sera l’Enfant pour Israël et de l’épée qui transpercera l’âme de sa Mère (cf. Lc2, 34-35). »", "author": "Saint Jean – Paul II", "rest": ""}, {"label": "La garde du dedans (la pureté du cœur)", "citation": "« De même que les poissons meurent s’ils s’attardent sur la terre sèche, de même les moines qui traînent hors de leur cellule ou qui passent du temps avec les gens du monde se relâchent de la tension de leur recueillement. Il nous faut donc, comme le poisson à la mer, nous hâter à notre cellule, de peur que, traînant dehors, nous oubliions la garde du dedans »", "author": "Saint Antoine le Grand", "rest": ""}], "peches": [{"label": "Craindre la souffrance", "citation": "« Nous ne voulons pas admettre que la souffrance est nécessaire à notre âme ; que la croix doit être notre pain quotidien. La Croix est nécessaire à l’âme comme la nourriture au corps. Jour après jour ; c’est elle qui la purifie et la libère de son attachement aux créatures. Nous avons du mal à comprendre que Dieu ne veut pas, ne peut pas nous sauver sans la Croix ; et plus Il attire une âme à Lui, plus Il la purifie par la Croix. »", "author": "Saint Padre Pio", "rest": ""}, {"label": "La volonté propre", "citation": "« Pourquoi les démons me combattent-ils ? Ils ne combattent pas avec nous aussi longtemps que nous faisons notre volonté à nous. Car nos volontés sont devenues des démons, et ce sont elles qui nous pressent pour que nous les accomplissions. Mais si tu veux savoir avec qui combattent les démons, c’est avec Moïse et ses semblables »", "author": "Poemen", "rest": ""}, {"label": "Les fausses vertus (l’excès contraire)", "citation": "« Le démon nous pousse également aux excès contraires, et l’abstinence exagérée nous est souvent plus nuisible que l’intempérance. On se corrige facilement d’un défaut qui fait rougir, tandis qu’on ne renonce pas à une fausse vertu »", "author": "Abbé Moïse", "rest": ""}, {"label": "L’excessive méticulosité", "citation": "« Son tort, ça n’a pas été de combattre la saleté, mais d’avoir voulu l’anéantir, comme si c’était possible. Une paroisse, c’est sale, forcément. Un chrétien, c’est encore plus sale »", "author": "Georges Bernanos", "rest": ""}], "clausules": {"courte": "Et Jésus, présenté au Temple", "longue": ["Et Jésus, que tu présentes au Temple, est béni.", "Et Jésus, qui s’offre à son Père, est béni.", "Et Jésus, que Siméon poussé par l’Esprit, vient adorer, est béni", "Et Jésus, en qui Siméon reconnaît le Sauveur, est béni.", "Et Jésus, qui est la gloire d’Israël, est béni.", "Et Jésus, qui est la lumière des nations, est béni.", "Et Jésus, qui sera pour toujours un signe de contradiction, est béni.", "Et Jésus, dont Siméon te fait entrevoir la Passion, est béni.", "Et Jésus, en qui la prophétesse Anne voit le libérateur, est béni.", "Et Jésus, que l’Esprit Saint révèle à ceux qui prient, est béni."]}}, {"n": "V", "title": "Le recouvrement de Jésus au temple", "fruit": "La recherche de Dieu en toute chose", "parole": {"text": "Chaque année, les parents de Jésus allaient à Jérusalem pour la fête de la Pâque. Quand il eut douze ans, ils firent le pèleri
