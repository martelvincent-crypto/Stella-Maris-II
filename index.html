nage suivant la coutume. Comme ils s’en retournaient à la fin de la semaine, le jeune Jésus resta à Jérusalem sans que ses parents s’en aperçoivent. Pensant qu’il était avec leurs compagnons de route, ils firent une journée de chemin avant de le chercher parmi leurs parents et connaissance. Ne le trouvant pas, ils revirent à Jérusalem en continuant à le chercher. C’est au bout de trois jours qu’ils le retrouvèrent dans le Temple, assis au milieu des docteurs de la Loi : il les écoutait et leur posait des questions, et tous ceux qui l’entendaient s’extasiaient sur son intelligence et sur ses réponses", "ref": "Lc 2, 41-47"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "Le pèlerinage de la Pâque"}, {"t": "p", "x": "La Loi prescrivait à tout Israélite mâle de « monter » trois fois l’an à Jérusalem, dont la grande fête de la Pâque (Ex 23, 17 ; Dt 16, 16). Depuis la lointaine Galilée, le trajet demandait plusieurs jours et se faisait en caravanes de parents et de voisins, hommes et femmes souvent séparés en cours de route. Luc souligne la piété fidèle de la Sainte Famille, qui « chaque année » accomplissait ce devoir : Jésus naît et grandit au cœur d’un peuple croyant, dans la fidélité aux observances de l’Alliance."}, {"t": "s", "x": "Douze ans, le seuil de la Loi"}, {"t": "p", "x": "À douze ans, le garçon juif approchait de l’âge où il deviendrait pleinement responsable des commandements – ce que formalisera plus tard la bar-mitsva, vers treize ans. On l’associait dès lors progressivement aux obligations cultuelles et à l’étude de la Torah. Que Jésus s’attarde auprès des docteurs correspond exactement à ce moment d’entrée dans la vie religieuse adulte. Luc, qui a déjà montré l’enfant porté au Temple pour la Présentation (2, 22-38), le fait reparaître au seuil de sa maturité, comme pour signer toute son enfance par le Temple."}, {"t": "s", "x": "Les docteurs au Temple"}, {"t": "p", "x": "Dans les vastes portiques qui bordaient l’esplanade, des maîtres de la Loi enseignaient publiquement, selon une méthode de questions et réponses où le disciple écoutait, objectait et était à son tour interrogé. C’est là que Jésus est trouvé, « assis au milieu des docteurs, les écoutant et les interrogeant ». L’évangéliste précise que tous étaient « stupéfaits de son intelligence et de ses réponses » : un enfant tient son rang parmi les savants d’Israël, premier signe public de la sagesse dont il est rempli."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "« Il me faut être chez mon Père »"}, {"t": "p", "x": "Ce sont les premières paroles de Jésus rapportées par Luc, et elles sonnent comme une révélation. À Marie qui dit « ton père et moi te cherchions, angoissés », Jésus répond en nommant un autre Père : « il me faut être chez mon Père » – l’expression grecque pouvant signifier « aux affaires » ou « dans la maison » de mon Père. C’est une affirmation, encore voilée, de sa filiation divine unique. Le « il me faut » (dei), nécessité de la volonté du Père, est un mot-clé de Luc qui annoncera la Passion : « le Fils de l’homme doit souffrir » (9, 22)."}, {"t": "s", "x": "Trois jours, perdu et retrouvé"}, {"t": "p", "x": "Les parents le cherchent « angoissés » et le retrouvent « au bout de trois jours ». Le détail n’est pas neutre : nombre de Pères y ont entendu une annonce voilée de Pâques, l’enfant « perdu » trois jours puis retrouvé au Temple préfigurant le Christ enseveli et ressuscité le troisième jour. La douleur de Marie cherchant son fils rejoint déjà le glaive annoncé par Syméon (2, 35). Ainsi l’épisode, tout simple en apparence, est tendu vers le mystère pascal qui couronnera l’Évangile."}, {"t": "s", "x": "L’incompréhension et le mystère"}, {"t": "p", "x": "« Ils ne comprirent pas la parole qu’il leur disait. » L’aveu est saisissant : même Marie et Joseph sont devancés par le mystère de l’enfant. Cette incompréhension n’est pas un manque de foi, mais l’humilité de qui se sait dépassé par l’œuvre de Dieu. Luc répète alors le refrain qu’il avait déjà noté à Bethléem : « sa mère gardait fidèlement tous ces événements dans son cœur » (cf. 2, 19). Marie apparaît comme la première contemplative, méditant ce qu’elle ne saisit pas encore tout entier."}, {"t": "s", "x": "Soumission et croissance"}, {"t": "p", "x": "L’épisode se clôt par un retournement : celui qui se disait « chez son Père » redescend à Nazareth et « leur était soumis ». C’est l’entrée dans la vie cachée, faite d’obéissance, de travail et de quotidien obscur. Luc résume alors trente années en une phrase reprise du jeune Samuel (1 S 2, 26) : « Jésus croissait en sagesse, en taille et en grâce devant Dieu et devant les hommes. » Cette croissance est réelle : sans rien perdre de sa divinité, le Verbe assume une humanité authentique qui se développe et mûrit véritablement."}], "saints": [{"text": "« Le mystère des trois jours d’absence étant arrivé, Marie parcourt les rues et les places de Jérusalem à la recherche de son Enfant perdu. La recherche dure trois jours en compagnie de l’homme extraordinaire que les saints ont appelé l’ombre du Père éternel. Ils pleurent tous les deux, et, cette fois, leurs larmes sont attestées par elle-même qui parle si rarement. Ils cherchent de tous côtés, ils interrogent les passants, riches on pauvres, vertueux ou criminels, moqueurs ou compatissants. Qu’on se représente cet interrogatoire unique de tous les habitants d’une ville indifférente ou affairée par la Mère des Vivants à la recherche du Verbe de Dieu. Ces trois jours d’absence qui furent le troisième glaive de Marie et que quelques écrivains catholiques regardent comme le plus douloureux de tous, méritent qu’on y pense profondément. Il est bon de remarquer que cette Mère incomparable, dans l’impuissance absolue de découvrir son Fils avant le terme mystérieux et incertain pour elle des trois jours, et connaissant d’ailleurs par la plénitude de son illumination prophétique les détails les plus affreux de la Passion, dut principalement porter ses recherches sur la future Voie douloureuse où elle savait que son Amour serait un jour foulé aux pieds de la plus cruelle et de la plus vile populace. C’est là, sans doute, qu’elle répandit ses larmes les plus amères, préparant ainsi le sol pour d’autres effusions à venir dans un temps où personne ne chercherait plus le Verbe de Dieu dans Jérusalem. L’éternité seule pourra donner à la conscience humaine la vraie mesure de ce fait d’une telle Mère cherchant un tel Fils dans une ville si étrangement prédestinée. »", "author": "Léon Bloy"}], "vertus": [{"label": "Les affaires du Père d’abord", "citation": "« celui qui aime son père ou sa mère plus que moi… » (Mt 10, 37). Apprendre à chercher d’abord le Royaume, c’est ordonner toutes nos affections à l’unique nécessaire", "author": null, "rest": " : dès ses premières paroles, Jésus place la volonté du Père au-dessus même des liens familiaux les plus sacrés. Sans rien renier de son amour pour Marie et Joseph, il fait passer Dieu en premier. C’est là la racine de toute vocation et le sens profond des renoncements de l’Évangile."}, {"label": "La discrétion", "citation": null, "author": null, "rest": " : l’essentiel de la vie de Jésus s’est déroulé dans le silence de Nazareth : trente années de travail, d’obéissance et de gestes ordinaires, contre quelques mois de ministère public. Dieu a voulu sanctifier ainsi l’existence la plus banale, celle de l’artisan, du foyer, de la besogne sans éclat. Pour le chrétien, cela ouvre une voie de sainteté à part entière : il n’est pas besoin d’exploits pour plaire à Dieu, il suffit d’accomplir avec amour le devoir caché de chaque jour, sous son regard."}, {"label": "Grandir en sagesse et en grâce", "citation": "« en sagesse, en taille et en grâce ». Notre vie spirituelle est elle aussi une croissance, jamais achevée ici-bas : on n’est jamais « arrivé », toujours en chemin vers une plus grande conformité au Christ. Progresser « devant Dieu et devant les hommes », c’est unir l’intériorité et le témoignage, la grâce reçue et la maturité humaine. À l’image du jeune Jésus, laissons l’Esprit faire grandir en nous, patiemment, l’homme nouveau", "author": null, "rest": " : Jésus a réellement grandi."}, {"label": "Le recueillement", "citation": "« Ne te fatigue pas pour des choses qui engendrent de l’empressement, des troubles et de l’affliction. Une seule chose est nécessaire : élever l’esprit et aimer Dieu. »", "author": "Saint Padre Pio", "rest": ""}, {"label": "La discrétion, source des vertus", "citation": "« La discrétion est la source et la racine des autres vertus »", "author": "Abbé Germain", "rest": ""}, {"label": "Acquérir la vraie discrétion par l’humilité", "citation": "« La véritable discrétion ne s’acquiert jamais sans une humilité véritable, et la première preuve de cette humilité, c’est de soumettre toutes nos actions et même nos pensées à la sagesse des anciens, de renoncer à notre propre jugement, de suivre entièrement leur conseil et de distinguer le bien et le mal d’après leur doctrine »", "author": "Abbé Moïse", "rest": ""}], "graces": [{"label": "Chercher Jésus avec persévérance", "citation": "« perdu » Jésus, l’exemple de Marie et Joseph nous instruit : ils le cherchent dans la peine et l’angoisse, sans se lasser, jusqu’à le retrouver. Et c’est au Temple qu’ils le retrouvent – c’est-à-dire dans la prière, dans l’Église et dans « la maison du Père ». La sécheresse spirituelle ou le sentiment d’absence ne doivent jamais nous décourager : Dieu se laisse trouver par qui le cherche avec persévérance, souvent là même où nous avions cessé de le chercher", "author": null, "rest": " : quand il nous semble avoir."}, {"label": "La confiance", "citation": "« Ne rechercher en rien ce que la vie a de meilleur, mais toujours ce qu’elle a de plus parfait. N’avoir qu’une volonté par amour du Christ Rédempteur : celle d’entrer toujours plus avant dans le dépouillement, le dénuement et la pauvreté de tout ce qui n’est pas Dieu. C’est en accomplissant toutes ses actions avec amour, avec grande humilité de cœur, qu’on parvient très vite à la pleine jouissance des joies divines. Que ne fait pas le divin Maître dans une âme confiante et parfaitement abandonnée à sa merveilleuse et souveraine volonté ! » (Marthe Robin)", "author": null, "rest": ""}, {"label": "Dieu est devant nous", "citation": "« Si nous revenons à notre propre cœur, nous trouvons Dieu au fond. » (Saint Augustin)", "author": null, "rest": ""}, {"label": "Laisser le Christ faire sa demeure en nous", "citation": "« Celui qui demeure en moi et en qui je demeure porte beaucoup de fruit, car sans moi vous ne pouvez rien faire. »", "author": "Jésus Christ, Jean", "rest": ""}, {"label": "Revenir à l’essentiel", "citation": "« Il y a trois choses capitales qui sont utiles : craindre le Seigneur, prier et faire du bien au prochain »", "author": "Poemen", "rest": ""}, {"label": "Se recentrer sur ce qui compte", "citation": "« Ô Marie et saint Joseph, c’est avec sincère tristesse que vous avez recherché votre Fils pendant trois jours. Vous L’avez retrouvé, à votre grande joie, dans le Temple. Apprenez-nous à rechercher avec persévérance et à retrouver Jésus dans notre vie. Ô Jésus, apprends-nous à préférer les affaires de Dieu aux biens temporels. »", "author": "Sainte Faustine", "rest": ""}], "peches": [{"label": "Le désespoir", "citation": "« Si le pécheur doit être condamné, ce ne sera pas pour avoir péché, mais pour n’avoir pas cru en ma miséricorde, dit le Seigneur. Ne pas vouloir et mépriser ma miséricorde, voilà le péché qui ne se pardonne ni ici-bas, ni dans l’au-delà, péché plus grave à mes yeux que tous ceux que ce pécheur a pu commettre. C’est pourquoi le désespoir de Judas m’a plus offensé et a été plus pénible à mon Fils que sa trahison même. » (Sainte Catherine de Sienne)", "author": null, "rest": ""}, {"label": "La distraction", "citation": "« Le début du mal, c’est la distraction »", "author": "Poemen", "rest": ""}], "clausules": {"courte": "Et Jésus, perdu et retrouvé, est béni.", "longue": ["Et Jésus, qui vient prier au temple avec toi et Joseph, est béni.", "Et Jésus, qui reste au temple à votre insu, est béni.", "Et Jésus, qui s’occupe des affaires de son Père, est béni.", "Et Jésus, qui nous apprend à chercher d’abord le Royaume des Cieux, est béni.", "Et Jésus, dont la sagesse étonne les docteurs de la Loi, est béni.", "Et Jésus, que Joseph et toi cherchiez avec angoisse, est béni.", "Et Jésus, qui, à douze ans, éprouve votre foi, est béni.", "Et Jésus, qui se soumet à toi et à Joseph, est béni.", "Et Jésus, avec qui tu as vécu cachée à Nazareth, est béni.", "Et Jésus, dont tu médites les paroles en ton cœur, est béni."]}}]}, {"key": "Lumineux", "name": "Mystères lumineux", "subtitle": "la lumière du Royaume", "mysteres": [{"n": "I", "title": "Le baptême du Christ", "fruit": "L’état de grâce baptismale", "parole": {"text": "Dès que Jésus fut baptisé, il sortit de l’eau ; voici que les cieux s’ouvrirent, et il vit l’Esprit de Dieu descendre comme une colombe et venir sur lui. Et des cieux, une voix disait : « Celui-ci est mon Fils bien-aimé ; en lui j’ai mis tout mon amour ».", "ref": "Mt 3,16-17"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "p", "x": "Au baptême de Jésus, le ciel se déchire. Cela signifie que le lien entre Dieu et les hommes est rétabli. La preuve : l’Esprit descend sur Jésus."}, {"t": "p", "x": "Le baptême est, d’abord, présence de la Sainte Trinité. Au moment d’inaugurer sa prédication, Jésus est désigné par le Père comme son fils bien aimé, en qui il a mis toutes ses complaisances. La présence du Saint-Esprit vient comme attester solennellement cette révélation sur la personne de Jésus."}, {"t": "p", "x": "Il est, ensuite, chemin d’humilité et d’amour. Le fils est aussi désigné par Jean-Baptiste comme l’agneau de Dieu qui porte et enlève le péché du monde. Le fils de Dieu est aussi le fils de l’homme. Il prend notre condition et il offre sa vie en sacrifice pour le salut de ses frères."}, {"t": "p", "x": "Nous sommes invités à reconnaître en Jésus le fils de Dieu et l’agneau qui nous sauve de nos péchés. Il nous appelle à sa suite pour coopérer par notre vie donnée, au salut de nos frères. Ne perdons pas de temps à regarder le mal présent dans le monde : il est déjà assumé par Jésus qui a reçu le baptême de pénitence, lui qui est saint et immaculé."}, {"t": "p", "x": "Regardons l’agneau, suivons-le partout où il va. Peu importent les lieux et les temps qu’il nous assigne. L’essentiel est d’être avec lui, de marcher en sa présence, de vivre de sa compagnie."}, {"t": "p", "x": "Notre horizon n’est plus la mort, mais la vie éternelle."}], "comm": [{"t": "h", "x": "B – Interprétation :"}, {"t": "s", "x": "1. « Il convient que nous accomplissions toute justice » (v. 15)"}, {"t": "p", "x": "À l’objection de Jean, Jésus répond par une parole propre à Matthieu : « Laisse faire pour l’instant, car il convient que nous accomplissions ainsi toute justice » (pasan dikaiosynên). La « justice » désigne ici l’accomplissement du dessein de Dieu. Jésus se fait baptiser non pour ses propres péchés (il n’en a pas), mais pour :"}, {"t": "s", "x": "— (a) s’unir aux pécheurs dans un geste de solidarité ;"}, {"t": "s", "x": "— (b) accomplir la volonté du Père ;"}, {"t": "s", "x": "— (c) inaugurer sa mission ;"}, {"t": "s", "x": "— (d) selon la lecture patristique, sanctifier les eaux."}, {"t": "s", "x": "2. La première manifestation explicite de la Trinité"}, {"t": "p", "x": "Le baptême est, dans les évangiles, la première manifestation trinitaire claire : le Père dans la voix, le Fils dans les eaux, l’Esprit sous la forme de la colombe. Trois Personnes distinctes, un seul Dieu : la scène est un sommet de la révélation, et l’Orient en a fait l’une de ses plus grandes fêtes, la Théophanie (« manifestation de Dieu »)."}, {"t": "s", "x": "3. « Les cieux s’ouvrirent »"}, {"t": "p", "x": "L’expression (v. 16) a une portée théologique : les cieux, fermés depuis le péché, se rouvrent. C’est l’exaucement du cri d’Isaïe : « Ah ! si tu déchirais les cieux et si tu descendais ! » (Is 63, 19). La communication entre Dieu et les hommes est rétablie en Jésus."}, {"t": "s", "x": "4. La voix du Père : Roi-Messie et Serviteur souffrant"}, {"t": "p", "x": "La parole du Père – « Celui-ci est mon Fils bien-aimé, en qui je trouve ma joie » – tisse ensemble deux textes majeurs : le Psaume 2, 7 (« Tu es mon Fils », l’intronisation du Roi-Messie) et Isaïe 42, 1 (« Voici mon serviteur que je soutiens, mon élu en qui mon âme se complaît ; j’ai mis sur lui mon Esprit »). Jésus est ainsi révélé à la fois comme le Messie royal et comme le Serviteur souffrant qui portera le péché. L’expression « Fils bien-aimé » (huios agapêtos) réapparaîtra, identique, à la Transfiguration (Mt 17, 5)."}, {"t": "s", "x": "5. La portée pour la mission de Jésus"}, {"t": "p", "x": "Le baptême inaugure le ministère public, révèle l’identité de Jésus (Fils) et oriente sa mission (le Serviteur sur qui repose l’Esprit). En se plongeant dans le Jourdain parmi les pécheurs, Jésus anticipe déjà le « baptême » de sa mort (cf. Mc 10, 38 ; Lc 12, 50) : la descente dans l’eau préfigure la descente dans la mort, et la remontée, la résurrection."}], "saints": [{"text": "« Ayez entre vous les dispositions que l’on doit avoir dans le Christ Jésus »", "author": "Ph 2, 5"}, {"text": "Dieu a voulu nous sauver en allant lui-même jusqu’au fond de l’abîme, afin que l’homme tombé très bas, puisse s’agripper à la main de Dieu pour remonter des ténèbres et revoir la lumière pour laquelle il a été fait. Benoit XVI", "author": null}, {"text": "Selon les paroles de l’Apôtre, il faut « se revêtir du Seigneur Jésus Christ »", "author": "cf. Rm 13, 14 ; Ga 3, 27"}, {"text": "En ce lieu, alors que le Christ descend dans les eaux du fleuve comme l’innocent qui se fait « péché » pour nous (cf. 2 Co 5, 21), les cieux s’ouvrent, la voix du Père le proclame son Fils bien-aimé (cf. Mt 3, 17 par), tandis que l’Esprit descend sur Lui pour l’investir de la mission qui l’attend.", "author": null}, {"text": "« Le Christ est illuminé, resplendissons avec Lui. Le Christ est baptisé, descendons avec Lui pour pouvoir avec Lui remonter nous aussi. »", "author": "Saint Grégoire de Nazianze"}, {"text": "« Jésus remonte de l’eau entraînant et élevant le monde avec Lui et il voit les cieux ouverts, ces cieux qu’autrefois Adam avait fermés pour lui et pour les siens, et ce paradis qui était comme scellé par un glaive de feu. Et l’Esprit témoigne de sa divinité ; il accourt vers son semblable, et une voix descend du ciel, car c’est du ciel que vient Celui à qui on rend témoignage. »", "author": "Saint Grégoire de Nazianze"}, {"text": "« Le Christ, créateur de toutes choses, est descendu comme une pluie, s’est fait connaître comme une source, s’est répandu comme un fleuve, et le voici baptisé dans le Jourdain. »", "author": "Saint Hippolyte de Rome"}], "vertus": [{"label": "L’humilité", "citation": null, "author": null, "rest": " : au Jourdain, le Christ prend volontairement rang parmi les pécheurs. Contempler cette humilité guérit la nôtre et nous apprend à descendre, nous aussi, vers nos frères."}, {"label": "Croire en cette parole du Père", "citation": "« Tu es mon fils bien-aimé »", "author": null, "rest": ""}, {"label": "Renouveler souvent la conscience de cette présence", "citation": null, "author": null, "rest": " : le Père qui nous engendre, le Fils en qui nous sommes fils, l’Esprit qui repose sur nous – est la source de toute prière chrétienne."}, {"label": "S’abandonner au Christ", "citation": "« Ah ! si toutes les âmes faibles et imparfaites sentaient ce que sent la plus petite de toutes les âmes, l’âme de votre petite Thérèse, pas une seule ne désespérerait d’arriver au sommet de la montagne de l’Amour, puisque Jésus ne demande pas de grandes actions, mais seulement l’abandon et la reconnaissance. »", "author": "Sainte Thérèse de Lisieux", "rest": ""}, {"label": "Se reconnaître et vivre en enfant de Dieu, en frère ou sœur de Jésus", "citation": null, "author": null, "rest": ""}, {"label": "Retrouver l’humilité du petit enfant", "citation": "« L’ascenseur qui doit m’élever jusqu’au Ciel, ce sont vos bras, ô Jésus ! Pour cela, je n’ai pas besoin de grandir ; au contraire, il faut que je reste petite »", "author": "Sainte Thérèse de Lisieux", "rest": ""}], "graces": [{"label": "Renaître en un homme nouveau", "citation": "« On ne peut progresser qu’en imitant le Christ qui est le chemin, la vérité et la vie, et personne ne va au Père que par lui, selon ce qu’il dit lui-même en saint Jean (14, 6) ; et ailleurs il dit : Je suis la porte ; celui qui entrera par moi sera sauvé (10, 9). De sorte que tout esprit qui chercherait douceurs et facilité et refuserait d’imiter le Christ, je ne le tiendrais pas pour bon. Si j’ai dit que le Christ est le chemin, et que ce chemin c’est mourir à notre nature, tant sensible que spirituelle, c’est pour faire comprendre que ce sera à l’exemple du Christ, parce qu’il est notre exemple et notre lumière. »", "author": "Saint Jean de la Croix", "rest": ""}, {"label": "Penser que le Christ est présent en nous", "citation": "« Le règne de Dieu est au dedans de vous »", "author": "Luc, 17, 21", "rest": ""}, {"label": "Penser à se confesser pour renouveler son baptême", "citation": "« Les Sacrements sont des canaux par lesquels Dieu descend en nous »", "author": "Saint François de Sales", "rest": ""}, {"label": "Se laisser guider par l’Esprit-Saint", "citation": "« Tous ceux qui se laissent conduire par l’Esprit de Dieu, ceux-là sont fils de Dieu »", "author": "Rm, 8, 14", "rest": ""}, {"label": "Le désir perpétuel et inassouvi d’être près de Dieu", "citation": "« Comme le cerf soupire après les sources des eaux, ainsi mon âme soupire auprès de toi, ô Dieu (Ps. 41-2). En effet, les cerfs dans le désert avalent beaucoup de reptiles, et quand le venin les brûle, ils aspirent à venir aux eaux, car, en buvant, ils apaisent la brûlure du venin des reptiles ; de même, aussi, les moines qui restent dans le désert, ils sont brûlés par le venin des mauvais démons, et ils aspirent au samedi et au dimanche pour venir aux sources de l’eau, c’est-à-dire au corps et au sang du Seigneur, afin d’être purifiés de l’amertume du Mauvais »", "author": "Abbé Poemen", "rest": ""}, {"label": "Présenter à Dieu sa misère en l’oraison", "citation": "« Vous ne faites rien, me dites-vous, en l’oraison. Mais qu’est ce que vous voudriez faire, sinon ce que vous y faites, qui est de présenter et représenter à Dieu votre néant et votre misère ? »", "author": "Saint François de Sales", "rest": ""}, {"label": "Prier pour écouter, comprendre, vivre", "citation": "« Priez pour écouter, priez pour comprendre et priez pour vivre votre foi, la pratiquer et en témoigner. Priez pour vous transformer en lumière. Écoutez en priant, comprenez la vérité dans la prière, et vivez en prière. »", "author": "Saint Charbel", "rest": ""}], "peches": [{"label": "Le rejet de Satan et de ce qui conduit au mal", "citation": "« Ne te tracasse pas, mon enfant, mais chaque fois que cette pensée vient, dis-toi : Moi je n’ai rien à voir. Que ton blasphème soit sur toi, Satan ! Cette chose-là, mon âme n’en veut pas. Or, toute chose dont l’âme ne veut pas est de courte durée »", "author": "Abbé Poemen", "rest": ""}, {"label": "La tiédeur", "citation": "« Tant que la marmite est sur le feu, une mouche n’y peut toucher, pas plus qu’une autre bestiole. Mais quand la marmite est froide, alors elles s’y posent. Ainsi en est-il du moine : tant qu’il persévère dans les pratiques spirituelles, l’Ennemi ne trouve pas le moyen de le faire tomber »", "author": "Abbé Poemen", "rest": ""}, {"label": "Craindre les tentations", "citation": "« Supprime les tentations, et pas un n’est sauvé »", "author": "Evagre le Pontique", "rest": ""}, {"label": "L’auto-suffisance", "citation": "« Je suis riche, je suis dans l’abondance, je ne manque de rien » ; mais Dieu peut lui répondre : « Tu es misérable et digne de pitié, tu es pauvre, aveugle et nu »", "author": "Apoc, 3, 17", "rest": ""}], "clausules": {"courte": "Et Jésus, baptisé dans le Jourdain, le fruit de vos entrailles.", "longue": ["Et Jésus, qui reçoit le baptême de Jean dans le Jourdain, est béni.", "Et Jésus, qui a voulu s’assimiler à l’humanité pécheresse, est béni.", "Et Jésus, qui a pris sur lui tous les péchés du monde, est béni.", "Et Jésus, à qui le Ciel ouvert vient rendre témoignage, est béni.", "Et Jésus, sur qui vient reposer l’Esprit, est béni.", "Et Jésus, qui entend la voix du Père, est béni.", "Et Jésus, reconnu par le Père comme son Fils bien-aimé, est béni.", "Et Jésus, qui a toute la faveur du Père, est béni.", "Et Jésus, en qui le Père met tout son amour, est béni.", "Et Jésus, qui nous ouvre à la vie nouvelle d’enfants de Dieu, est béni."]}}, {"n": "II", "title": "Les noces de Cana", "fruit": "La confiance", "parole": {"text": "Trois jours plus tard, il y avait un mariage à Cana en Galilée. La mère de Jésus était là. Jésus aussi avait été invité au repas de noces avec ses disciples. Or, on manqua de vin ; la mère de Jésus lui dit : « Ils n’ont plus de vin ». Jésus répondit : « Femme, que me veux-tu ? Mon heure n’est pas encore venue ». Sa mère dit aux serviteurs : « Faites tout ce qu’il vous dira ».", "ref": "Jn 2, 1-5"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "Les noces juives et le poids du vin"}, {"t": "p", "x": "En Galilée, une noce se prolongeait sur plusieurs jours, parfois une semaine entière de festin où parents et voisins venaient honorer les époux. Le vin y tenait une place centrale : signe de joie, de fécondité et de bénédiction, il annonçait dans l’Écriture le grand festin messianique où Dieu réunirait son peuple (Is 25, 6 ; Am 9, 13 ; Jl 4, 18). Venir à en manquer n’était pas un simple incident : c’était une honte sociale grave pour les hôtes, un manquement à l’hospitalité dont la mémoire pouvait ternir longtemps l’honneur d’une famille."}, {"t": "s", "x": "Les six jarres de pierre"}, {"t": "p", "x": "Le récit précise que se trouvaient là six jarres de pierre, destinées aux purifications rituelles des Juifs, contenant chacune deux ou trois mesures. La pierre, contrairement à la terre cuite, ne contractait pas d’impureté légale : ces vases servaient donc à l’eau dont on s’aspergeait avant le repas et pour les ablutions prescrites par la tradition. Leur capacité considérable – au total quelque six cents litres – n’est pas un détail anodin : elle prépare la mesure surabondante du don à venir et inscrit le signe au cœur même des institutions de l’ancienne alliance."}, {"t": "s", "x": "Cana et « le troisième jour »"}, {"t": "p", "x": "Cana de Galilée, village proche de Nazareth, n’apparaît que chez Jean ; c’est de là que sera originaire Nathanaël (Jn 21, 2). La mention « le troisième jour » clôt la première semaine johannique ouverte par les appels du chapitre 1, composant comme une nouvelle semaine de création qui culmine dans la manifestation de la gloire. Pour un lecteur chrétien, l’expression fait aussi discrètement signe vers la résurrection au troisième jour : dès l’ouverture de sa vie publique, l’évangéliste oriente le regard vers l’Heure pascale."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "« La mère de Jésus » et « Femme »"}, {"t": "p", "x": "Marie n’est jamais nommée dans le quatrième évangile : elle y est seulement « la mère de Jésus », présente à Cana et au pied de la Croix (Jn 19, 25-27), comme deux bornes encadrant l’œuvre du Fils. Jésus l’appelle « Femme » (gunē) – adresse inhabituelle envers une mère, mais nullement irrespectueuse : c’est un titre solennel qui relie Cana au Calvaire et évoque la « femme » de Gn 3, 15, dont la descendance écrase le serpent (cf. Ap 12, 1). Les Pères y ont lu Marie comme nouvelle Ève, associée au combat et à la victoire du nouvel Adam."}, {"t": "s", "x": "« Mon heure n’est pas encore venue »"}, {"t": "p", "x": "La réplique « Que me veux-tu, Femme ? » traduit un sémitisme (ti emoi kai soi) qui marque une distance, non un reproche, et réoriente la scène vers l'« Heure » – chez Jean, le moment unique de la Passion et de la glorification (cf. 7, 30 ; 12, 23 ; 17, 1). Jésus signifie que tout dépend du dessein du Père et non d’une urgence humaine. Et pourtant, par sa foi confiante qui ne se rebute pas, Marie obtient comme une anticipation : le premier signe devance l’Heure sans la forcer."}, {"t": "s", "x": "« Faites tout ce qu’il vous dira »"}, {"t": "p", "x": "Adressées aux serviteurs, ces paroles sont les dernières de Marie rapportées par les évangiles, et elles forment comme son testament spirituel : un pur renvoi au Fils. Elles font écho au mot du Pharaon envoyant les Égyptiens vers Joseph : « Allez à Joseph ; faites ce qu’il vous dira » (Gn 41, 55). Marie ne retient rien pour elle-même ; elle conduit à l’obéissance de la foi. La tradition catholique y reconnaît le modèle de l’intercession mariale : Marie remarque le manque, le présente, puis efface sa propre demande devant la volonté du Christ."}, {"t": "s", "x": "Le signe : l’eau de la Loi changée en vin"}, {"t": "p", "x": "Jésus fait remplir d’eau les jarres des purifications, puis cette eau, puisée, se révèle vin. La portée est théologique : l’eau de la Loi et des rites de l’ancienne alliance devient le vin nouveau et surabondant de l’alliance accomplie en lui. La mesure – près de six cents litres – dit la plénitude des temps messianiques et la générosité de la grâce. La remarque du maître du repas, « tu as gardé le bon vin jusqu’à maintenant », souligne le renversement : le meilleur ne précède pas, il vient avec le Christ."}, {"t": "s", "x": "« Commencement des signes… il manifesta sa gloire »"}, {"t": "p", "x": "Jean ne parle pas de « miracles » mais de signes (sēmeia) : Cana est le premier d’une série qui jalonne l’évangile et révèle l’identité du Fils. Le mot oriente au-delà du prodige vers ce qu’il dévoile. Ici Jésus « manifesta sa gloire », accomplissant la promesse du Prologue : « nous avons vu sa gloire » (1, 14). La conséquence est immédiate : « ses disciples crurent en lui ». Signe et foi sont ainsi liés dès l’origine : le signe appelle la foi, et la foi seule en perçoit le sens véritable."}], "saints": [{"text": "« Le début des signes à Cana est un mystère de lumière, au moment où le Christ, changeant l’eau en vin, ouvre le cœur des disciples à la foi grâce à l’intervention de Marie, la première des croyantes. »", "author": "Saint Jean-Paul II"}, {"text": "« Le Dieu des chrétiens est le Dieu de la métamorphose. Offrez-lui vos peines, et vous en retirerez de la paix. Abandonnez-lui vos désespoirs, il vous donnera l’espérance. »", "author": "Saint Padre Pio"}], "vertus": [{"label": "Que survienne la joie surabondante de l’alliance nouvelle", "citation": "« Je vous ai dit cela pour que ma joie soit en vous, et que votre joie soit parfaite. » (Jn 15, 11). Le bon vin de Cana, c’est cette joie-là.", "author": null, "rest": ""}, {"label": "Consentir à la transformation intérieure que la grâce opère", "citation": null, "author": null, "rest": ", et goûter dès ici-bas un avant-goût du festin promis."}, {"label": "Donne-nous, Sainte Marie, l’obéissance en Dieu, fais-en nous un cœur humble", "citation": null, "author": null, "rest": ""}, {"label": "Sainte Marie, aplanis le chemin qui conduit à ton fils", "citation": null, "author": null, "rest": ", nous qui sommes faibles et pécheurs."}, {"label": "Donne-nous, Sainte Marie, la confiance en Dieu", "citation": null, "author": null, "rest": ", qui nous permette de remettre en lui toute notre âme, nos vies, et nos doutes."}, {"label": "Faire en tout la volonté de Dieu (« Faites tout ce qu’il vous dira »)", "citation": "« Se conformer en tout à la volonté de Dieu, et y prendre tout son plaisir, c’est vivre sur la terre d’une vie tout angélique, et même c’est vivre de la vie de Jésus-Christ »", "author": "Saint Vincent de Paul", "rest": ""}, {"label": "Écouter dans le silence du cœur", "citation": "« Je commence toujours à prier par le silence : c’est dans le silence du cœur que Dieu parle. Dieu est l’ami du silence et nous devons l’écouter, parce que ce ne sont pas nos paroles qui comptent, mais ce que Lui nous dit, et ce qu’il dit à travers nous »", "author": "Sainte Teresa de Calcutta", "rest": ""}], "graces": [{"label": "Que notre mariage soit transporté", "citation": "« Tous deux ne feront plus qu’un. Ce mystère est grand : je le dis en référence au Christ et à l’Église. » (Ep 5, 31-32). L’eau changée en vin, c’est le mariage qui transforme l’union.", "author": null, "rest": ", par la grâce du Christ, au-delà de nos propres forces."}, {"label": "Que notre union soit bénie", "citation": "« Ce que Dieu a uni, que l’homme ne le sépare pas »", "author": "Mt 19, 6", "rest": ""}, {"label": "Présenter à Jésus, par Marie, nos manques, nos joies taries et nos détresses, c’est ouvrir la porte à sa surabondance", "citation": null, "author": null, "rest": " : il transforme ce que nous lui remettons et donne au-delà de toute mesure. Seigneur Jésus, offre-nous ce que nous te demandons, par la glorieuse intercession de la Sainte Vierge Marie."}], "peches": [{"label": "Que la volonté du Seigneur soit faite, et non la nôtre", "citation": "« Non pas ma volonté, mais la tienne. »", "author": "Lc 22, 42", "rest": ""}, {"label": "S’abaisser pour être plus proches de Dieu", "citation": null, "author": null, "rest": ""}, {"label": "Croire au-delà de nos propres limites et illusions", "citation": "« Je crois ! Viens au secours de mon manque de foi ! »", "author": "Mc 9, 24", "rest": ""}, {"label": "L’inquiétude (le manque de confiance)", "citation": "« Prie, espère, et ne t’inquiète pas »", "author": "Padre Pio", "rest": ""}, {"label": "La démesure", "citation": "« Ainsi va-t-il dans l’œuvre de Dieu ; si nous tendons les frères outre mesure, ils se briseront vite. Il faut donc, de temps en temps, condescendre aux frères »", "author": "Saint Antoine le Grand", "rest": ""}], "clausules": {"courte": "Et Jésus, qui exauce Marie à Cana", "longue": ["Et Jésus, qui est invité au repas de noce, est béni.", "Et Jésus, à qui sa mère dit : « ils n’ont plus de vin », est béni.", "Et Jésus, qui dit à Marie « femme, qu’y a-t-il entre toi et moi ? », est béni.", "Et Jésus, dont l’heure n’est pas encore venue, est béni.", "Et Jésus, que Marie nous invite à suivre en disant : « faites tout ce qu’il vous dira », est béni.", "Et Jésus, qui fit remplir les urnes avec de l’eau, est béni.", "Et Jésus, qui a changé l’eau en vin, est béni.", "Et Jésus, qui manifeste sa Gloire par ce premier miracle, est béni.", "Et Jésus, qui vient sceller par son sang une alliance nouvelle, est béni.", "Et Jésus, qui nous prépare au repas des noces de l’Agneau, est béni."]}}, {"n": "III", "title": "L’annonce du royaume", "fruit": "La conversion", "parole": {"text": "Les temps sont accomplis : le règne de Dieu est tout proche. Convertissez-vous et croyez à la Bonne Nouvelle", "ref": "Mc 1, 15"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "La Galilée, terre de Jésus"}, {"t": "p", "x": "Jésus n’inaugure pas son ministère à Jérusalem, au cœur religieux du judaïsme, mais en Galilée, province du Nord réputée mêlée et un peu méprisée des gens de Judée – « la Galilée des nations » (Is 8, 23). C’est une région fertile et peuplée, vivant de la pêche autour du lac et de l’agriculture, traversée de routes commerciales. Elle relève alors du tétrarque Hérode Antipas, fils d’Hérode le Grand. Que la Bonne Nouvelle commence là, loin du Temple, dit déjà quelque chose de Dieu : il rejoint d’abord les périphéries."}, {"t": "s", "x": "« Après que Jean eut été livré »"}, {"t": "p", "x": "Marc date le commencement par un événement sombre : l’arrestation de Jean-Baptiste par Antipas. L’historien Flavius Josèphe confirme l’exécution de Jean dans la forteresse de Machéronte ; les évangiles en donnent le motif (la dénonciation du mariage d’Antipas avec Hérodiade). Le précurseur disparaît au moment même où paraît Celui qu’il annonçait : Jean décroît, Jésus grandit. Le verbe « livré » (paradidōmi) sonne comme un présage : il reviendra pour dire la trahison de Judas et la livraison de Jésus à la Passion."}, {"t": "p", "x": "Qu’évoquait le « Royaume de Dieu » ?"}, {"t": "p", "x": "Pour un Juif du Ier siècle, le « Royaume » (ou « règne ») de Dieu n’était pas un lieu, mais l’idée que Dieu règne : qu’il intervienne enfin pour briser l’oppression, juger le mal et rétablir son peuple. Beaucoup en attendaient une délivrance politique, la fin de la domination romaine. L’espérance était nourrie par les Psaumes du Règne (« le Seigneur est roi ! »), par Daniel (le règne qui ne finira pas), par des écrits comme les Psaumes de Salomon. En annonçant le Royaume « tout proche », Jésus touche donc une corde brûlante – qu’il va purifier de ses ambiguïtés."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "« L’Évangile de Dieu »"}, {"t": "p", "x": "Marc reprend le mot-programme de son livre (euangelion, cf. 1, 1). « L’Évangile de Dieu » : la bonne nouvelle dont Dieu est la source et le contenu. Jésus ne se contente pas de l’annoncer ; en sa personne, il l’inaugure. Le messager est le message."}, {"t": "s", "x": "Une proclamation en quatre temps (v. 15)"}, {"t": "p", "x": "Le résumé de Marc est d’une densité parfaite, articulé en deux affirmations et deux appels :"}, {"t": "p", "x": "— « Le temps est accompli » (peplērōtai ho kairos) : non le temps qui s’écoule (chronos), mais le moment décisif, l’heure fixée par Dieu, désormais arrivée."}, {"t": "p", "x": "— « Le Royaume de Dieu est tout proche » (ēngiken) : il s’est approché au point de toucher ; il fait irruption dans l’histoire avec Jésus."}, {"t": "p", "x": "— « Convertissez-vous » (metanoeite) : changez de cœur et de direction, retournez-vous vers Dieu."}, {"t": "p", "x": "— « Croyez à l’Évangile » : accueillez cette nouvelle dans la foi."}, {"t": "p", "x": "L’ordre est capital : d’abord ce que Dieu fait (le temps accompli, le Royaume qui vient), puis la réponse de l’homme (conversion, foi). La grâce précède l’effort ; on ne se convertit pas pour que Dieu vienne, on se convertit **parce qu’**il vient."}, {"t": "s", "x": "Un Royaume déjà là et encore à venir"}, {"t": "p", "x": "Tout l’évangile déploiera cette tension : le Royaume est déjà présent et agissant en Jésus (ses exorcismes, ses guérisons, ses paraboles) et pourtant encore attendu dans sa plénitude (la venue du Fils de l’homme). Le chrétien vit dans cet « entre-deux » : le Règne a commencé, il s’accomplira."}, {"t": "s", "x": "Parmi les synoptiques"}, {"t": "p", "x": "Matthieu condense de même (« Convertissez-vous, car le Royaume des Cieux est tout proche », Mt 4, 17), tandis que Luc place en ouverture le programme de Nazareth (Lc 4, 16-21). Marc, fidèle à sa concision, offre le sommaire le plus ramassé de la prédication de Jésus – un véritable titre pour toute la suite."}], "saints": [{"text": "« Voulez-vous que je vous indique les chemins de la conversion ? Ils sont nombreux, variés et différents, mais tous conduisent au ciel. »", "author": "Saint Jean Chrysostome, Homélie sur le diable tentateur"}, {"text": "« Tu m’as appelé et ton cri a forcé ma surdité ; tu as brillé et ton éclat a chassé ma cécité. »", "author": "Saint Augustin, Confessions, X, 27, 38"}], "vertus": [{"label": "La conversion des cœurs", "citation": null, "author": null, "rest": " : désirer avancer de plus en plus dans la sainteté. La conversion est un réajustement permanent du cœur vers Dieu. Le Catéchisme rappelle que la conversion est l’œuvre de toute une vie, sans cesse reprise (cf. CEC 1427-1429). Croire à l’Évangile, c’est laisser cette Bonne Nouvelle déplacer peu à peu nos priorités, nos peurs, nos refus."}, {"label": "L’espérance chrétienne", "citation": null, "author": null, "rest": " consiste à guetter les signes de ce Royaume – un pardon, une réconciliation, une pauvreté secourue – et à y coopérer, en attendant qu’il s’accomplisse. Dieu est présent."}, {"label": "Désirer la sainteté", "citation": "« Il n’y a qu’une tristesse, c’est de n’être pas des saints »", "author": "Léon Bloy", "rest": ""}, {"label": "Faire peu, mais bien (la voie royale)", "citation": "« Ils nous ont transmis la voie royale (Nb, 20, 17), car elle est légère »", "author": "Abbé Poemen", "rest": ""}, {"label": "Le discernement (la hache et l’artisan)", "citation": "« Un homme peut porter une hache toute sa vie sans réussir à abattre l’arbre ; mais un autre, qui a l’expérience de la coupe, abat l’arbre en peu de coups. Et il disait que la hache, c’est le discernement »", "author": "Abbé Poemen", "rest": ""}], "graces": [{"label": "L’annonce du Royaume", "citation": null, "author": null, "rest": " : savoir témoigner de la présence de Dieu, de sa miséricorde et de son amour autour de moi."}, {"label": "Vivre l’aujourd’hui du Salut", "citation": null, "author": null, "rest": " : la foi chrétienne n’est pas tournée vers un passé révolu ni vers un futur indéfini : elle se joue maintenant. Chaque jour est une heure offerte. La prière du matin, l’examen du soir aident à ne pas laisser passer cet aujourd’hui où Dieu se rend proche."}], "peches": [{"label": "Le désespoir", "citation": "« Les bontés du Seigneur ne sont pas épuisées ; elles se renouvellent chaque matin »", "author": "Lm 3, 22-23", "rest": ""}, {"label": "La présomption de soi", "citation": "« Il convient de savoir que l’âme qui restera dans l’obscurité, fermant les yeux à toutes ses lumières personnelles et naturelles, verra surnaturellement, et celle qui aura voulu s’appuyer sur quelqu’une de ses lumières s’aveuglera d’autant plus et s’arrêtera sur le chemin de l’union. »", "author": "Saint Jean de la Croix", "rest": ""}, {"label": "Se dénigrer", "citation": "« Je me plais dans les infirmités, les affronts, les nécessités, les persécutions et les angoisses que je souffre pour le Christ ; et lorsque je suis faible, je deviens fort, parce que la vertu se perfectionne dans l’affliction »", "author": "Cor, 12, 9", "rest": ""}, {"label": "Reporter à demain", "citation": "« Je suis responsable de ce que je n’ai pas été »", "author": "Georges Bernanos", "rest": ""}, {"label": "Vouloir changer le monde", "citation": "« Ne va pas te mettre en tête d’empêcher un bouc de sentir le bouc »", "author": "Georges Bernanos", "rest": ""}], "clausules": {"courte": "Et Jésus qui nous invite à la conversion, est béni.", "longue": ["Et Jésus, qui vient nous annoncer la Bonne Nouvelle, est béni.", "Et Jésus, qui nous appelle au repentir et à la foi, est béni.", "Et Jésus, qui est venu pardonner nos péchés, est béni.", "Et Jésus, qui nous enseigne la voie des béatitudes, est béni.", "Et Jésus, qui est venu pour nous guérir, est béni.", "Et Jésus, qui a ouvert les yeux des aveugles, est béni.", "Et Jésus, qui a fait marcher les paralytiques, est béni.", "Et Jésus, qui a purifié les lépreux, est béni.", "Et Jésus, qui chasse les démons, est béni.", "Et Jésus, qui nous enseigne la loi du pardon, est béni."]}}, {"n": "IV", "title": "La transfiguration", "fruit": "La grâce d’une vie intérieure", "parole": {"text": "Six jours après, Jésus prend avec lui Pierre, Jacques et Jean son frère, et il les emmène à l’écart, sur une haute montagne. Il fut transfiguré devant eux ; son visage devint brillant comme le soleil, et ses vêtements, blancs comme la lumière » (Mt 17, 1-2).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "1. Le « cercle des trois » et la montagne"}, {"t": "p", "x": "Jésus n’emmène que trois disciples – Pierre, Jacques et Jean. Un maître pouvait avoir un cercle plus intime ; ces trois-là forment, dans les évangiles, le groupe restreint admis aux moments décisifs (le réveil de la fille de Jaïre, ici la Transfiguration, et l’agonie de Gethsémani). Gravir « une haute montagne, à l’écart » avait par ailleurs, pour un Juif, une résonance immédiate : la montagne est le lieu par excellence de la rencontre avec Dieu et des théophanies – le Sinaï de Moïse, l’Horeb d’Élie. (La tradition situe la scène au mont Thabor, en Galilée ; certains proposent l’Hermon.)"}, {"t": "s", "x": "2. La fête des Tentes et les « trois tentes » de Pierre"}, {"t": "p", "x": "La proposition de Pierre – « dressons trois tentes » – ne se comprend que par une coutume précise : la fête des Tentes (Soukkot), l’une des trois grandes fêtes de pèlerinage juives. Une semaine durant, on construisait et l’on habitait des huttes de branchages (souccot), en mémoire du séjour d’Israël sous la tente au désert. Cette fête avait pris une forte coloration messianique : on y espérait le « monde à venir ». En voyant la gloire, Pierre veut spontanément « faire les Tentes » sur place – comme si les temps messianiques étaient arrivés et qu’il fallût s’y installer."}, {"t": "s", "x": "3. Vêtements blancs, visage rayonnant, nuée"}, {"t": "p", "x": "Le blanc éclatant des vêtements et le visage rayonnant appartiennent au langage des manifestations célestes de la tradition juive : on décrivait ainsi la gloire de Dieu et les êtres du ciel (le visage de Moïse rayonnant en descendant du Sinaï, Ex 34, 29 ; le vêtement « blanc comme la neige » de Dn 7, 9). La nuée lumineuse est, dans tout l’Ancien Testament, le signe sensible de la Présence divine (la Shekinah) qui guidait Israël au désert et remplissait la Tente de la Rencontre, puis le Temple (Ex 40 ; 1 R 8)."}, {"t": "p", "x": "4. Pourquoi Moïse et Élie ?"}, {"t": "p", "x": "Leur apparition n’a rien d’anodin pour des auditeurs juifs : ni l’un ni l’autre n’eurent une mort ordinaire. Moïse reçut une sépulture mystérieuse dont « nul n’a connu le lieu » (Dt 34, 6), et Élie fut enlevé au ciel sur un char de feu (2 R 2). Tous deux étaient attendus pour les derniers temps – le prophète « semblable à Moïse » (Dt 18, 15) et le retour d’Élie avant le Jour du Seigneur (Ml 3, 23). Ils incarnent en outre les deux grands ensembles de l’Écriture : la Loi (Moïse) et les Prophètes (Élie)."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "1. Un avant-goût de la gloire, pour fortifier avant la Passion"}, {"t": "p", "x": "La Transfiguration dévoile un instant la gloire – la divinité – du Christ, voilée d’ordinaire sous son humanité. Sa place est capitale : venant après la première annonce de la Passion, elle est donnée pour fortifier les trois témoins privilégiés (qui seront aussi ceux de l’agonie à Gethsémani) : un éclair de Pâques pour tenir au Vendredi saint."}, {"t": "s", "x": "2. La Loi et les Prophètes rendent témoignage"}, {"t": "p", "x": "Moïse et Élie s’entretenant avec Jésus signifient que toute l’Écriture – la Loi et les Prophètes – rend témoignage au Christ et trouve en lui son accomplissement. Et qu’ils parlent de son « exode » (sa Passion) montre que les Écritures conduisent à la Croix."}, {"t": "s", "x": "3. « Écoutez-le » : Jésus, Parole définitive"}, {"t": "p", "x": "La voix du Père tisse le Psaume 2, 7 et Isaïe 42, 1 (« mon Fils bien-aimé »), et y ajoute l’ordre du Deutéronome (18, 15, le prophète « comme Moïse » qu’il faudra écouter) : « Écoutez-le. » Moïse et Élie disparaissent ; il ne reste que Jésus seul : le Fils est désormais l’unique Maître à écouter, qui accomplit et dépasse la Loi et les Prophètes."}, {"t": "s", "x": "4. La lumière incréée et l’espérance de notre transfiguration"}, {"t": "p", "x": "La tradition orientale, avec saint Grégoire Palamas, a vu dans la lumière du Thabor la clarté incréée de la divinité, rayonnant à travers l’humanité du Christ. Et la Transfiguration est gage d’espérance : le chrétien est appelé à être un jour « configuré à son corps de gloire » (Ph 3, 21), « nous lui serons semblables, car nous le verrons tel qu’il est » (1 Jn 3, 2)."}], "saints": [{"text": "« Ceux devant lesquels Jésus se transfigure, deviennent les enfants de Dieu ; il se découvre à leurs yeux comme le soleil de justice, et ses vêtements deviennent brillants comme la lumière. Ces vêtements sont les discours et les récits de l’Évangile, dont Jésus est comme revêtu, et que les Apôtres nous ont conservés dans leurs écrits. »", "author": "Origène"}, {"text": "« Quand le Seigneur menace, il fait apparaître une nuée ténébreuse, comme sur le mont Sinaï ; mais ici il fait briller une nuée lumineuse, parce qu’il veut, non pas épouvanter, mais instruire. »", "author": "Saint Jean Chrysostome"}, {"text": "« Ce n’est ni Moïse ni Élie qui prennent la parole, mais c’est le Père, qui est au-dessus d’eux tous, qui fait entendre sa voix du sein de la nuée, afin que les disciples ne puissent douter que cette voix vient de Dieu, car Dieu apparaît ordinairement dans une nuée, comme il est écrit dans le livre des Psaumes (Ps 97). »", "author": "Saint Jean Chrysostome"}, {"text": "« Par cette transfiguration il voulait avant tout prémunir ses disciples contre le scandale de la croix et, en leur révélant toute la splendeur de sa dignité cachée, empêcher que les abaissements de sa Passion volontaire ne bouleversent leur foi.", "author": null}, {"text": "Mais, il ne prévoyait pas moins de fonder l’espérance de l’Église, en faisant découvrir à tout le Corps du Christ quelle transformation lui serait accordée ; ses membres se promettraient de partager l’honneur qui avait resplendi dans leur chef. »", "author": "Saint Léon le Grand"}, {"text": "« Nous serons glorifiés dans la mesure où nous aurons été conformes à l’image de son divin Fils. »", "author": "Sainte Élisabeth de la Trinité"}], "vertus": [{"label": null, "citation": "« Écoutez-le » : Toute la vie spirituelle est là – se mettre à l’écoute du Fils, lui donner le dernier mot sur nos vies. Et la prière (Luc note que Jésus fut transfiguré « en priant ») est la montagne où, peu à peu, nous sommes nous-mêmes transformés à son image", "author": null, "rest": ""}, {"label": "Se réjouir et rendre grâce à Dieu", "citation": "« Ma deuxième résolution est de devenir apôtre de la Joie – pour consoler le Sacré-Cœur de Jésus par la joie. »", "author": "Sainte Mère Théresa", "rest": ""}, {"label": "S’incarner, dans le corps du Christ, auprès de ses frères, dans une grande charité", "citation": "« Dieu s’est fait homme afin que l’homme devienne Dieu »", "author": "Saint Athanase d’Alexandrie", "rest": ""}, {"label": "Être tout œil (la contemplation)", "citation": "« Le moine doit être comme les Chérubins et les Séraphins, tout œil »", "author": "Abbé Bessarion", "rest": ""}], "graces": [{"label": "Garder la mémoire des grâces reçues pour les jours sombres", "citation": null, "author": null, "rest": " : la Transfiguration prépare la Croix."}, {"label": "La grâce de prier souvent pour s’approcher du Seigneur", "citation": "« Priez sans cesse. »", "author": "Thessaloniciens 5 :17-19", "rest": ""}, {"label": "La vision de Dieu, vie de l’homme", "citation": "« La gloire de Dieu, c’est l’homme vivant et la vie de l’homme c’est la vision de Dieu »", "author": "Saint Irénée de Lyon", "rest": ""}, {"label": "Le silence", "citation": "« Les frères, qui s’étaient rassemblés, dire à l’abbé Pampo : « Dis une parole au pape, pour qu’il soit édifié ». Le vieillard leur dit : « S’il n’est pas édifié par mon silence, il ne sera pas édifié non plus de ma parole »", "author": "Théophile l’Archevêque", "rest": ""}], "peches": [{"label": "S’installer au sommet de la montagne", "citation": null, "author": null, "rest": " : on ne demeure pas au sommet ; il faut redescendre vers la plaine, vers les malades, et vers la Croix. Les consolations spirituelles ne sont pas une fin : elles fortifient pour la mission et l’épreuve."}, {"label": "S’élever soi-même", "citation": null, "author": null, "rest": " : on doit s’élever en Dieu, vers Dieu, pour Dieu, par Dieu."}, {"label": "S’attrister", "citation": "« Ma fille, donne-moi ta misère »", "author": "Jésus à Sainte Faustine", "rest": ""}, {"label": "Le doute", "citation": null, "author": null, "rest": " : Seigneur, ne nous laisse jamais douter que Tu seras vainqueur de nos péchés, entraîne-nous dans l’admiration et la jubilation qui ont transporté tes Apôtres."}, {"label": "Se laisser agiter par ses pensées", "citation": "« La demeure terrestre appesantit l’âme qu’agitent beaucoup de pensées »", "author": "Sag., 9, 15", "rest": ""}, {"label": "La dispersion spirituelle (la hache et la faux)", "citation": "« Celui qui va battre le fer réfléchit d’abord sur ce qu’il doit fabriquer : faux, épée ou hache. De même, nous aussi nous devons examiner quelle vertu nous voulons acquérir, pour ne pas peiner en vain »", "author": "Saint Antoine le Grand", "rest": ""}], "clausules": {"courte": "Et Jésus, transfiguré, est béni.", "longue": ["Et Jésus, qui invite Pierre, Jacques et Jean sur la montage, est béni.", "Et Jésus, qui est transfiguré durant sa prière, est béni.", "Et Jésus, qui devient d’une blancheur fulgurante, est béni.", "Et Jésus, que les apôtres contemplent dans sa gloire, est béni.", "Et Jésus, qui est entouré de Moïse et d’Elie, est béni.", "Et Jésus, qui entend la bénédiction du Père, est béni.", "Et Jésus, de qui le Père dit : « Celui-ci est mon fils bien-aimé, écoutez-le », est béni.", "Et Jésus, qui fortifie la foi des apôtres en vue de sa Passion, est béni.", "Et Jésus, qui nous prépare à la révélation de sa gloire, est béni.", "Et Jésus, qui partagera sa gloire éternelle avec nous, est béni."]}}, {"n": "V", "title": "L’institution de l’Eucharistie", "fruit": "La foi en la présence réelle. « Eucharistie » signifie action de grâces, action de grâces au Père qui nous a donné son Fils par pur amour. Le Christ par le mystère de sa passion, de sa mort et de sa résurrection, s’est fait nourriture. En recevant son Corps et son Sang, nous pouvons trouver le véritable aliment dont notre âme a besoin pour refaire ses forces, l’eau vive pour étancher sa soif. Se faisant pain rompu pour nous, c’est toute la miséricorde et l’amour de Jésus qui se déversent pour raviver notre cœur", "parole": {"text": "Pendant le repas, Jésus prit du pain, prononça la bénédiction, le rompit et le donna à ses disciples, en disant : « Prenez, mangez : ceci est mon corps » (Mt 26, 26).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "1. La Pâque juive et le repas pascal"}, {"t": "p", "x": "« Le premier jour des Azymes » (les pains sans levain), les disciples préparent la Pâque. Le repas pascal (le seder) avait un déroulement rituel précis : l’agneau (immolé au Temple), les pains sans levain (matzah), les herbes amères (mémoire de l’amertume de l’esclavage), plusieurs coupes de vin, le récit de la sortie d’Égypte (la Haggada) et le chant du Hallel. On le prenait couché (à demi étendu), signe des hommes libres."}, {"t": "s", "x": "2. La salle et la table"}, {"t": "p", "x": "Le repas se tient dans une salle haute (le Cénacle), à Jérusalem. On est étendu autour de la table, selon l’usage du banquet – d’où le disciple « couché contre la poitrine de Jésus » dans le récit de Jean, et le geste de tremper le pain « dans le même plat »."}, {"t": "s", "x": "3. Le traître à la table"}, {"t": "p", "x": "« L’un de vous va me livrer. » Le partage du même plat par le traître souligne l’intimité rompue : trahir celui dont on partage la table était, dans cette culture de l’hospitalité, le comble de la perfidie (cf. Ps 41, 10)."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "1. La Pâque accomplie"}, {"t": "p", "x": "Jésus donne à la Pâque juive son accomplissement. Le mémorial de la première libération (la sortie d’Égypte) devient le mémorial de la libération définitive : sa mort et résurrection, nouvel Exode. Lui-même est le véritable Agneau, dont le sang sauve."}, {"t": "s", "x": "2. « Ceci est mon corps… ceci est mon sang »"}, {"t": "p", "x": "Au cœur du repas, Jésus institue l’Eucharistie. Prenant le pain, il rend grâce, le rompt et le donne : « Prenez, mangez : ceci est mon corps. » Puis la coupe : « Buvez-en tous : ceci est mon sang, le sang de l’Alliance, versé pour la multitude en rémission des péchés. »"}, {"t": "p", "x": "Les paroles sont denses :"}, {"t": "p", "x": "— « le sang de l’Alliance » reprend l’aspersion du sang au Sinaï (Ex 24, 8), qui scellait l’Alliance – ici, c’est la nouvelle Alliance (cf. Jr 31, 31) ;"}, {"t": "p", "x": "— « versé pour la multitude » renvoie au Serviteur d’Isaïe 53 (qui porte le péché « des multitudes ») – « la multitude » signifiant, au sens sémitique, tous ;"}, {"t": "p", "x": "— « en rémission des péchés » donne le sens rédempteur de sa mort."}, {"t": "s", "x": "3. L’orientation eschatologique"}, {"t": "p", "x": "« Je ne boirai plus désormais de ce fruit de la vigne jusqu’au jour où je le boirai, nouveau, avec vous dans le Royaume de mon Père. » L’Eucharistie est tournée vers le banquet des noces éternelles ; elle est un avant-goût du Royaume."}], "saints": [{"text": "Jésus invite les pécheurs à la table du Royaume : \" Je ne suis pas venu appeler les justes, mais les pécheurs \" (Mc 2, 17 ; cf. 1 Tm 1, 15). Il les invite à la conversion sans laquelle on ne peut entrer dans le Royaume, mais il leur montre en parole et en acte la miséricorde sans bornes de son Père pour eux (cf. Lc 15, 11-32) et l’immense \" joie dans le ciel pour un seul pécheur qui se repent \" (Lc 15, 7). La preuve suprême de cet amour sera le sacrifice de sa propre vie \" en rémission des péchés \"", "author": "Mt 26, 28"}, {"text": "La mort du Christ est à la fois le sacrifice Pascal qui accomplit la rédemption définitive des hommes (cf. 1 Co 5, 7 ; Jn 8, 34-36) par l’Agneau qui porte le péché du monde (cf. Jn 1, 29 ; 1 P 1, 19) et le sacrifice de la Nouvelle Alliance (cf. 1 Co 11, 25) qui remet l’homme en communion avec Dieu (cf. Ex 24, 8) en le réconciliant avec Lui par le sang répandu pour la multitude en rémission des péchés", "author": "cf. Mt 26, 28 ; Lv 16, 15-16"}, {"text": "Parce qu’elle est mémorial de la Pâque du Christ, l’Eucharistie est aussi un sacrifice. Le caractère sacrificiel de l’Eucharistie est manifesté dans les paroles mêmes de l’institution : \" Ceci est mon Corps qui va être donné pour vous \" et \" Cette coupe est la nouvelle Alliance en mon Sang, qui va être versé pour vous \" (Lc 22, 19-20). Dans l’Eucharistie le Christ donne ce corps même qu’il a livré pour nous sur la croix, le sang même qu’il a \" répandu pour une multitude en rémission des péchés \"", "author": "Mt 26, 28"}, {"text": "Dans une confiance audacieuse, nous avons commencé à prier notre Père. En le suppliant que son Nom soit sanctifié, nous lui avons demandé d’être toujours plus sanctifiés. Mais, bien que revêtus de la robe baptismale, nous ne cessons de pécher, de nous détourner de Dieu. Maintenant, dans cette nouvelle demande, nous revenons à lui, comme l’enfant prodigue (cf. Lc 15, 11-32), et nous nous reconnaissons pécheurs, devant lui, comme le publicain (cf. Lc 18, 13). Notre demande commence par une \" confession \" où nous confessons en même temps notre misère et sa Miséricorde. Notre espérance est ferme, puisque, dans son Fils, ‘’nous avons la rédemption, la rémission de nos péchés’’ (Col 1, 14 ; Ep 1, 7). Le signe efficace et indubitable de son pardon, nous le trouvons dans les sacrements de son Église", "author": "cf. Mt 26, 28 ; Jn 20, 23"}], "vertus": [{"label": "S’approcher de l’Eucharistie avec foi et action de grâce (eucharistia)", "citation": null, "author": null, "rest": ", y puiser la force du don de soi, et en faire le centre de sa vie."}, {"label": "Voir dans l’Eucharistie le corps et le sang du Christ", "citation": null, "author": null, "rest": " pour, en la recevant, devenir pleinement corps et sang du Christ."}, {"label": "S’examiner avant de communier. Le traître est à la table", "citation": "« indignement » (1 Co 11, 27-29). La sainte Communion engage à la fidélité, non à la trahison.", "author": null, "rest": " : avertissement à recevoir l’Eucharistie avec un cœur droit. Saint Paul en tirera l’appel à s’examiner avant de communier, pour ne pas manger le pain."}, {"label": "Toujours recommencer, toujours débuter", "citation": "« L’abbé Poemen disait de l’abbé Pior que, chaque jour, il débutait »", "author": "Abbé Poemen", "rest": ""}, {"label": "La grâce de Dieu suffit", "citation": "« Ma grâce te suffit. Ma puissance donne toute sa mesure dans la faiblesse »", "author": "Saint Paul", "rest": ""}], "graces": [{"label": "Savoir recevoir", "citation": null, "author": null, "rest": " : l’Eucharistie n’est pas d’abord une chose à comprendre, mais un don à accueillir : le Christ qui se livre pour nous."}, {"label": "Devenir ce que l’on a reçu", "citation": "« Soyez ce que vous voyez, et recevez ce que vous êtes. »", "author": "Saint Augustin, Sermon 272, aux nouveaux baptisés, sur l'Eucharistie", "rest": ""}, {"label": "Avoir l’humilité du Christ qui s’offre à ses disciples", "citation": "« Les démons dirent : « Rien ne triomphe de nous, sinon l’humilité »", "author": "Théodora", "rest": ""}], "peches": [{"label": "La négligence de l’examen de conscience", "citation": "« Aucune occupation, aucun prétexte ne doit nous faire négliger l’examen de conscience ; pour chaque faute nous devons faire acte de réparation. « Cette résolution a l’avantage de raffermir notre volonté de ne plus pécher. »", "author": "Marthe Robin", "rest": ""}], "clausules": {"courte": "Et Jésus, doux et humble de cœur.", "longue": ["Et Jésus, qui célèbre la Pâque avec ses disciples, est béni.", "Et Jésus, qui bénit le pain et la coupe en rendant grâce, est béni.", "Et Jésus, qui dit « Ceci est mon corps livré pour vous », est béni.", "Et Jésus, qui dit « Ceci est mon sang versé pour vous », est béni.", "Et Jésus, qui célèbre la nouvelle Alliance en son sang, est béni.", "Et Jésus, qui nous dit « Faites ceci en mémoire de moi », est béni.", "Et Jésus, qui se fait nourriture pour les hommes, est béni.", "Et Jésus, qui est le véritable agneau pascal, est béni.", "Et Jésus, qui nous invite au banquet du Royaume, est béni.", "Et Jésus, qui demeure pour toujours visible en son eucharistie, est béni."]}}]}, {"key": "Douloureux", "name": "Mystères douloureux", "subtitle": "le prix de la Rédemption", "mysteres": [{"n": "I", "title": "L’agonie de Jésus à Gethsémani.", "fruit": "La contrition", "parole": {"text": "Alors Jésus parvient avec eux à un domaine appelé Gethsémani et leur dit : « Restez ici, pendant que je m’en vais là-bas pour prier ». Il emmena Pierre, ainsi que Jacques et Jean, les deux fils de Zébédée, et il commença à ressentir tristesse et angoisse. Il leur dit alors : « Mon âme est triste à en mourir. Demeurez ici et veillez avec moi ». Il s’écarta un peu et tomba la face contre terre, en faisant cette prière : « Mon Père, s’il est possible, que cette coupe passe loin de moi ! Cependant, non pas comme je veux, mais comme tu veux ». Puis il revient vers ses disciples et les trouve endormis ; il dit à Pierre : « Ainsi, vous n’avez pas eu la force de veiller seulement une heure avec moi ? Veillez et priez, pour ne pas entrer en tentation ; l’esprit est ardent, mais la chair est faible. » (Mt 26, 36-39).", "ref": ""}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "1. Le chant du Hallel et la sortie vers le mont des Oliviers"}, {"t": "p", "x": "« Après avoir chanté les psaumes » : à la fin du repas pascal, on chantait le Hallel (Psaumes 113 à 118), louange de la délivrance. Puis Jésus et les siens sortent vers le mont des Oliviers – dans la nuit de la pleine lune pascale."}, {"t": "s", "x": "2. Gethsémani, le « pressoir à huile »"}, {"t": "p", "x": "Gethsémani (de l’araméen Gat-Shemanim, « pressoir à huile ») est un domaine planté d’oliviers sur le versant du mont des Oliviers, où se trouvaient les pressoirs à huile. Le nom est chargé d’une résonance : c’est là que Jésus sera pressé par l’angoisse, comme l’olive sous la meule."}, {"t": "s", "x": "3. Le cercle des trois et l’agonie"}, {"t": "p", "x": "Jésus prend avec lui Pierre, Jacques et Jean (les témoins du Thabor, désormais témoins de l’angoisse). Il est saisi de « tristesse et d’angoisse » – « mon âme est triste à en mourir ». Il prie, prosterné face contre terre, à trois reprises, et trouve chaque fois les disciples endormis."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "1. La vraie angoisse du Christ"}, {"t": "p", "x": "Gethsémani manifeste la pleine humanité de Jésus : il connaît l’angoisse réelle devant la mort, la peur, la répugnance devant la « coupe ». Ce n’est pas une feinte : le Fils de Dieu a véritablement tremblé devant la souffrance et la mort – ce qui réconforte tout homme qui les redoute."}, {"t": "s", "x": "2. « Non pas comme je veux, mais comme tu veux »"}, {"t": "p", "x": "La prière de Jésus – « que cette coupe (la Passion) passe loin de moi ; cependant, non pas comme je veux, mais comme tu veux » – est le modèle parfait de l’obéissance filiale. Sa volonté humaine, qui répugne légitimement à la mort, se remet librement à la volonté du Père : c’est l’exact contraire du « non » d’Adam. (La tradition y verra l’union des deux volontés du Christ, humaine et divine, dans un seul « oui ».)"}, {"t": "s", "x": "3. « Veillez et priez »"}, {"t": "p", "x": "Aux disciples endormis : « Vous n’avez pas pu veiller une heure avec moi ? Veillez et priez, pour ne pas entrer en tentation : l’esprit est ardent, mais la chair est faible. »"}, {"t": "p", "x": "La veille et la prière sont les armes du combat spirituel ; sans elles, même les meilleurs (Pierre l’a juré !) succombent."}], "saints": [{"text": "« Mais pourquoi était-il attristé ? Les interprétations des saints varient.", "author": null}, {"text": "Hilaire et plusieurs autres ont dit qu’il n’était pas triste à cause de lui-même, ni à cause de sa mort, mais à cause du scandale de ses disciples. Et il veut démontrer cela par le fait qu’il les prit avec lui.", "author": null}, {"text": "Jean Damascène dit qu’il s’attristait sur lui-même. Et pourquoi ? Parce que la tristesse nous habite lorsque nous fait défaut ce que nous aimons naturellement. L’âme veut naturellement être unie au corps, et cela habitait l’âme du Christ, car il a mangé, bu et a eu faim. La séparation de son âme allait donc contre le désir naturel. La séparation lui causait donc de la tristesse.", "author": null}, {"text": "Toutefois, nous pouvons comprendre qu’une chose existe dans l’âme selon ce qu’est cette chose, et une chose existe dans l’âme selon qu’on la compare à autre chose. Ainsi, une potion amère, considérée en elle-même, est douloureuse, mais, mise en rapport avec la fin qu’est notre santé, elle est cause de joie, comme quelque chose appartient à la raison en tant que nature, et quelque chose [appartient] à la raison en tant qu’elle est raison. Ainsi, cette mort du Christ était un sujet de tristesse selon qu’elle était considérée en elle-même ; mais, selon qu’elle était mise en rapport avec sa cause, en la mettant en rapport avec sa fin, le Christ s’en réjouissait. Les paroles d’Hilaire et de Jérôme se comprennent donc par rapport à la fin de la mort. »", "author": "Saint Thomas d’Aquin"}, {"text": "« Toutes nos passions naturelles ont donc existé en Jésus-Christ, naturellement, et d’une manière supérieure à la nature ; naturellement, parce qu’il laissait la chair souffrir ce qui était inhérent à sa condition ; d’une manière supérieure à la nature, parce que les mouvements de la nature ne précédaient pas en lui la volonté. En effet, rien en Jésus-Christ n’était soumis à la coaction ; mais tout était volontaire ; ainsi, c’est par un effet de sa volonté qu’il éprouva le besoin de la faim, les sentiments de crainte et de tristesse, sentiments qu’il exprime par ces paroles : « Mon âme est triste jusqu’à la mort ». »", "author": "Saint Augustin"}, {"text": "« Lorsqu’il s’est soumis aux souffrances, c’était pour en triompher et nous obtenir d’en triompher nous-mêmes ainsi, lorsqu’il prie, c’est pour nous ouvrir la voie par laquelle nous pouvons nous élever jusqu’à Dieu ; c’est encore afin d’accomplir pour nous toute justice, de nous réconcilier avec son Père, de l’honorer comme le principe de toutes choses et de nous montrer qu’il n’est point lui-même contraire à Dieu. – Remi, En priant sur la montagne, Notre-Seigneur nous enseigne à demander à Dieu dans la prière les choses du ciel, et en priant dans cet endroit appelé Gethsémani, il nous apprend à pratiquer toujours avec soin l’humilité dans la prière. »", "author": "Saint Jean Chrysostome"}, {"text": "« Un Chrétien doit être toujours prêt au combat. C’est dans le combat que nous prouvons à Dieu notre amour et dans l’acceptation des peines qu’Il nous envoie »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}], "vertus": [{"label": "Prier l’angoisse plutôt que la fuir", "citation": "« Gethsémani » – les heures d’angoisse, de peur, d’épreuve –, Jésus apprend à prier la détresse plutôt qu’à la fuir, et à remettre sa volonté : « que ta volonté soit faite » (la demande du Notre Père, ici poussée à son sommet). La prière ne supprime pas toujours la « coupe », mais elle donne la force de la boire", "author": null, "rest": " : dans nos propres."}, {"label": "Veiller et prier. L’avertissement demeure pour chacun", "citation": "« veillez et priez pour ne pas entrer en tentation, car la chair est faible ». La présomption (« moi, jamais ! ») et le sommeil de l’âme nous exposent ; la vigilance et la prière nous tiennent debout à l’heure de l’épreuve", "author": null, "rest": ""}, {"label": "Tenir compagnie au Christ", "citation": "« Vous n’avez pas pu veiller une heure avec moi ? » Cette plainte invite à tenir compagnie au Christ en agonie – par l’adoration, l’oraison, la présence aux souffrants. Ne pas le laisser seul au jardin : c’est le sens de bien des veilles de prière de la tradition (l’heure sainte, l’adoration nocturne)", "author": null, "rest": ""}, {"label": "La Charité", "citation": null, "author": null, "rest": " : prier avec Jésus à l’heure de sa plus grande épreuve, c’est la première charité que nous pouvons avoir vis-à-vis de Lui."}, {"label": "Sauve-toi toi-même (mémoire du jugement)", "citation": "« Assis dans ta cellule, rassemble tes pensées. Rappelle-toi le jour de la mort. Souviens-toi aussi de la condition présente en enfer. Mais souviens-toi aussi du jour de la résurrection et de la comparution devant Dieu. Imagine ce jour effrayant et redoutable. Évoque ce qui est réservé aux pécheurs : la honte en présence de Dieu, des anges et des archanges, et de tous les hommes, c’est-à-dire les supplices, le feu éternel, le ver qui ne meurt pas, le tartare, les ténèbres, le grincement des dents, les épouvantes, et les tourments. Évoque aussi les biens qui sont réservés aux justes : l’assurance vis-à-vis de Dieu le Père et son Fils, des anges et des archanges, et de le peuple des saints, le royaume des cieux et ses dons, la joie et sa jouissance. De ces deux perspectives, garde en toi la mémoire : pleure sur le jugement des pécheurs, sois en deuil, craignant de faire partie toi-même de leur nombre. Mais des biens réservés aux justes, réjouis-toi et sois dans l’allégresse. De ceux-ci, efforce-toi d’obtenir la jouissance, et de ceux-là tâche d’être éloigné. Veille à ne jamais oublier, que tu sois à l’intérieur de ta cellule ou hors d’elle, le souvenir de ces vérités de telle sorte qu’au moins grâce à elles tu fuies les pensées malpropres et nuisibles »", "author": "Evagre le Pontique", "rest": ""}], "graces": [{"label": "La grâce d’être toujours présent au Christ, pour qu’il reste toujours avec nous", "citation": null, "author": null, "rest": ""}, {"label": "L’éveil spirituel", "citation": "« Où que tu ailles, aie toujours Dieu devant les yeux ; quoi que tu fasses, aie le témoignage des saintes Écritures ; et en quelque lieu que tu te tiennes, n’en bouge pas facilement. Garde ces trois choses, et tu es sauvé »", "author": "Saint Antoine le Grand", "rest": ""}, {"label": "La vigilance", "citation": "« Le grand exploit de l’homme, c’est de prendre sur lui sa faute devant le Seigneur, et de s’attendre à la tentation jusqu’au dernier souffle »", "author": "Abbé Poemen", "rest": ""}, {"label": "L’obéissance au Père", "citation": "« Le mot “saint” exprime la nature particulière de Dieu. Lui seul est le Saint. L’homme devient saint dans la mesure où il commence à être avec Dieu. Être avec Dieu, c’est écarter ce qui est seulement le moi et devenir un avec le tout de la volonté de Dieu. Cependant, cette libération du moi peut se révéler douloureuse, et n’est jamais accomplie une fois pour toutes »", "author": "Benoît XVI", "rest": ""}, {"label": "Savoir que l’on n’est pas seul à souffrir", "citation": "« Aussi longtemps qu’un être humain ne se rencontre pas lui-même dans le regard et dans le cœur de ses semblables, il est en train de fuir. Aussi longtemps qu’il n’admet pas que ses semblables prennent part à sa vie la plus profonde, il n’y a pas de sécurité affective. Aussi longtemps qu’il craint d’être pénétré par le regard des autres, il ne peut pas se reconnaître, ni reconnaître ses semblables… il restera donc seul. Car tout est relié à tout. »", "author": "Saint Hildegarde de Bingen", "rest": " : s’ouvrir aux autres."}, {"label": "Secourir ceux qui en ont besoin, qui doutent et qui sont seuls", "citation": "« S’il faut quitter l’oraison pour aller à ce malade, faites-le et ainsi vous quitterez Dieu à l’oraison et vous le trouverez chez ce malade. » Et encore : « C’est quitter Dieu pour Dieu »", "author": "Saint Vincent de Paul", "rest": ""}], "peches": [{"label": "Minimiser nos péchés", "citation": "« Pleurez (Jc, 4, 9), car il n’y a pas d’autre voie que celle-là »", "author": "Poemen", "rest": ""}, {"label": "Se repentir de nos faiblesses", "citation": "« Tant qu’un home ne tient pas dans son cœur qu’il est pécheur, Dieu ne l’écoute pas. Si quelqu’un porte ses propres péchés, il ne voit pas ceux de son prochain »", "author": "Abbé Moïse", "rest": " et de notre manque de fidélité au Christ et à son message."}, {"label": "Le désespoir", "citation": "« L’abbé Jean Colobos a dit : « Je suis comme un homme assis sous un grand arbre et qui voit venir à lui beaucoup de bêtes sauvages et de serpents. Chaque fois qu’il ne peut leur résister, il court monter dans l’arbre et il est sauvé. C’est ce que je fais, moi aussi : je suis assis dans ma cellule et j’observe les mauvaises pensées qui m’assaillent, et quand je suis devant elles, je me réfugie en Dieu par la prière, et je suis sauvé de l’Ennemi »", "author": "Saint Jean Colobos", "rest": ""}, {"label": "Se cacher (la nuit appartient au diable)", "citation": "« La nuit appartient au diable »", "author": "Georges Bernanos", "rest": ""}, {"label": "Être le jouet des circonstances", "citation": "« L’insensé varie comme la lune »", "author": "Eccl., 27, 12", "rest": ""}], "clausules": {"courte": "Et Jésus, qui n’a pas trouvé de consolateur.", "longue": ["Et Jésus, qui prend sur lui tous nos péchés, est béni.", "Et Jésus, dont l’âme est triste à en mourir, est béni.", "Et Jésus, qui prie dans l’angoisse, est béni.", "Et Jésus, qui nous invite à veiller et à prier avec lui, est béni.", "Et Jésus, qui dit \" Père, non pas ma volonté mais ta volonté », est béni.", "Et Jésus, dont la sueur devint comme des gouttes de sang, est béni.", "Et Jésus, qu’un ange vient réconforter, est béni.", "Et Jésus, qui se laisse arrêter comme un agneau, est béni.", "Et Jésus, que Judas trahit par un baiser, est béni.", "Et Jésus, qui demande à Pierre de ne pas prendre l’épée, est béni."]}}, {"n": "II", "title": "La flagellation", "fruit": "La maîtrise des sens", "parole": {"text": "« Pilate leur relâcha Barabbas ; et, après avoir fait battre de verges Jésus, il le livra pour être crucifié. »", "ref": "Mt 27, 26"}, "histo": [{"t": "h", "x": "A – Contexte :"}, {"t": "s", "x": "1. Le prétoire et la cohorte"}, {"t": "p", "x": "Les soldats emmènent Jésus dans le prétoire (la résidence du gouverneur) et rassemblent autour de lui « toute la cohorte ». La brutalité des soldats envers un condamné était un phénomène connu : le supplicié devenait l’objet de leurs moqueries."}, {"t": "s", "x": "2. La parodie des insignes royaux"}, {"t": "p", "x": "Tout est une parodie des honneurs royaux et impériaux : on revêt Jésus d’un manteau rouge (le manteau militaire, imitant la pourpre royale) ; on lui pose une couronne d’épines (à la place du diadème) ; on lui met un roseau dans la main (en guise de sceptre). Puis on s’agenouille en criant « Salut (Ave !), roi des Juifs ! » – comme on acclamait un empereur –, avant de cracher sur lui et de le frapper avec le roseau. C’est un couronnement de dérision."}, {"t": "s", "x": "3. La flagellation romaine"}, {"t": "p", "x": "La flagellation était un supplice redoutable du droit romain, infligé d’ordinaire avant la crucifixion ou comme châtiment autonome. Le condamné, dénudé et lié à un poteau, était frappé d’un fouet (flagrum) dont les lanières portaient parfois des osselets ou des plombs qui déchiraient les chairs. Ici, Pilate paraît y recourir comme à un expédient : en faisant châtier Jésus, il espère apaiser l’accusation et obtenir sa libération (cf. Lc 23, 16). Le supplice, déjà cruel, n’est encore qu’un préambule."}], "comm": [{"t": "h", "x": "B – Commentaires :"}, {"t": "s", "x": "1. L’ironie sacrée"}, {"t": "p", "x": "Par dérision, les soldats proclament une vérité : Jésus est Roi. La couronne d’épines, le manteau de pourpre, le sceptre de roseau composent – à leur insu – l’image du vrai Roi, qui règne non par la force mais par l’humiliation et l’amour. La moquerie devient confession."}, {"t": "s", "x": "2. Le Serviteur outragé"}, {"t": "p", "x": "La scène accomplit le Serviteur souffrant : « J’ai présenté mon dos à ceux qui me frappaient… je n’ai pas dérobé ma face aux outrages et aux crachats » (Is 50, 6). Jésus subit sans se révolter ce que l’homme lui inflige."}], "saints": [{"text": "« Le Bon Dieu ne demande pas de nous le martyre du corps, Il nous demande seulement le martyre du cœur et de la volonté »", "author": "Saint Jean-Marie Vianney, curé d’Ars"}, {"text": "« Le Seigneur a emporté avec lui ses blessures dans l’éternité. C’est un Dieu blessé ; il s’est laissé blesser par amour pour nous. Les blessures sont pour nous le signe qu’il nous comprend et qu’il se laisse blesser par amour pour nous. Comme nous pouvons nous aussi toucher ses blessures dans l’histoire de notre temps ! En effet, il se laisse toujours blesser à nouveau pour nous. Quelle preuve de sa miséricorde et quel réconfort celles-ci signifient pour nous ! Et combien elles constituent pour nous un devoir de nous laisser blesser à notre tour pour lui ! »", "author": "Benoît XVI"}, {"text": "« Pour redonner à l’homme la vie en plénitude, le Fils de Dieu s’est anéanti de la manière la plus humiliante […] c’est un témoignage d’amour exceptionnel qui est allé jusqu’à l’extrême don de soi. »", "author": "Saint Jean-Paul II"}], "vertus": [{"label": "La maîtrise des sens.", "citation": null, "author": null, "rest": " Nous sommes invités à comprendre et à maîtriser ce qui peut nous pousser au péché. Faisons attention à ce que nous voyons, ce que nous écoutons, ce vers quoi nous poussent parfois nos désirs humains."}, {"label": "La confiance en Dieu en toute chose", "citation": "« Nul ne parvient au Salut sans traverser une mer de tempêtes, sous la perpétuelle menace d’un naufrage. Le Calvaire est la montagne des Saints. C’est de là que l’on accède au Thabor. »", "author": "Saint Padre Pio", "rest": ""}, {"label": "La prière et l’amour", "citation": "« Au soir de ta vie, tu seras examiné sur l’Amour »", "author": "Saint Jean de la Croix", "rest": ""}, {"label": "La charité envers autrui", "citation": "« Dans le cœur de l’Église, ma Mère, je serai l’Amour »", "author": "Sainte Thérèse de Lisieux", "rest": ""}, {"label": "Fuir tout ce qui est semence de volupté", "citation": "« Tout ce qui peut-être semence de volupté, fuyez-le comme du poison. J’aime mieux une nourriture modérée, qui v
