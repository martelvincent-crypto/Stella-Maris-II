PRIERES.push(

/* ---------- À LA VIERGE MARIE ---------- */
{id:"regina_caeli",cat:"À la Vierge Marie",t:"Regina cæli",tl:"Regina cæli",lang:"la",
 secs:[
 {o:"Regina cæli, lætare, alleluia,\nquia quem meruisti portare, alleluia,\nresurrexit, sicut dixit, alleluia ;\nora pro nobis Deum, alleluia.",
  fr:"Reine du ciel, réjouis-toi, alléluia,\ncar celui qu’il te fut donné de porter, alléluia,\nest ressuscité comme il l’avait dit, alléluia ;\nprie Dieu pour nous, alléluia."},
 {o:"℣. Gaude et lætare, Virgo Maria, alleluia.\n℟. Quia surrexit Dominus vere, alleluia.",
  fr:"℣. Sois heureuse et réjouis-toi, Vierge Marie, alléluia.\n℟. Car le Seigneur est vraiment ressuscité, alléluia."},
 {o:"Oremus. Deus, qui per resurrectionem Filii tui Domini nostri Iesu Christi mundum lætificare dignatus es : præsta, quæsumus, ut per eius Genetricem Virginem Mariam perpetuæ capiamus gaudia vitæ. Per eundem Christum Dominum nostrum. Amen.",
  fr:"Prions. Dieu qui as donné la joie au monde en ressuscitant Jésus, ton Fils, accorde-nous, par sa Mère, la Vierge Marie, de parvenir au bonheur de la vie éternelle. Par Jésus, le Christ, notre Seigneur. Amen."}],
 note:"L’antienne pascale à la Vierge : du dimanche de Pâques à la Pentecôte, elle remplace l’Angélus et se dit debout, en signe de résurrection. La tradition la fait remonter au chant des anges entendu par saint Grégoire le Grand au-dessus du môle d’Hadrien."},

{id:"alma",cat:"À la Vierge Marie",t:"Alma Redemptoris Mater",tl:"Alma Redemptoris Mater",lang:"la",
 secs:[
 {o:"Alma Redemptoris Mater,\nquæ pervia cæli porta manes,\net stella maris,\nsuccurre cadenti,\nsurgere qui curat, populo :",
  fr:"Sainte Mère de notre Rédempteur,\nporte du ciel, toujours ouverte,\nétoile de la mer,\nviens au secours du peuple qui tombe\net qui cherche à se relever."},
 {o:"tu quæ genuisti,\nnatura mirante,\ntuum sanctum Genitorem,\nVirgo prius ac posterius,",
  fr:"Tu as enfanté, ô merveille !\ncelui qui t’a créée,\net tu demeures toujours vierge."},
 {o:"Gabrielis ab ore\nsumens illud Ave,\npeccatorum miserere.",
  fr:"Accueille le salut\nde l’ange Gabriel\net prends pitié de nous, pécheurs."}],
 note:"Antienne mariale du temps de l’Avent et de Noël, attribuée à Hermann le Contrefait comme le Salve Regina. Dante la met sur les lèvres des âmes du Purgatoire, et Chaucer sur celles de l’écolier des Contes de Cantorbéry."},

{id:"ave_regina",cat:"À la Vierge Marie",t:"Ave Regina cælorum",tl:"Ave Regina cælorum",lang:"la",
 secs:[
 {o:"Ave, Regina cælorum,\nave, Domina angelorum,\nsalve, radix, salve, porta,\nex qua mundo lux est orta.",
  fr:"Salut, Reine des cieux !\nSalut, Reine des Anges !\nSalut, tige féconde !\nSalut, porte du Ciel !\nPar toi la lumière s’est levée sur le monde."},
 {o:"Gaude, Virgo gloriosa,\nsuper omnes speciosa ;\nvale, o valde decora,\net pro nobis Christum exora.",
  fr:"Réjouis-toi, Vierge glorieuse,\nbelle entre toutes les femmes !\nSalut, splendeur radieuse,\nimplore le Christ pour nous."}],
 note:"Antienne mariale chantée de la Présentation du Seigneur au Mercredi saint, aux complies : le salut du soir à celle par qui la lumière s’est levée."},

{id:"ave_maris_stella",cat:"À la Vierge Marie",t:"Ave maris stella",tl:"Ave maris stella",lang:"la",
 secs:[
 {o:"Ave, maris stella,\nDei mater alma,\natque semper virgo,\nfelix cæli porta.",
  fr:"Salut, étoile de la mer,\nMère nourricière de Dieu,\net toujours Vierge,\nheureuse porte du ciel."},
 {o:"Sumens illud Ave\nGabrielis ore,\nfunda nos in pace,\nmutans Hevæ nomen.",
  fr:"Recevant cet Ave\nde la bouche de Gabriel,\naffermissez-nous dans la paix,\npar ce changement du nom d’Ève."},
 {o:"Solve vincla reis,\nprofer lumen cæcis,\nmala nostra pelle,\nbona cuncta posce.",
  fr:"Rompez les liens des pécheurs,\nrendez la lumière aux aveugles,\néloignez de nous les maux,\nobtenez-nous tous les biens."},
 {o:"Monstra te esse matrem,\nsumat per te preces\nqui pro nobis natus\ntulit esse tuus.",
  fr:"Montrez-vous notre Mère :\nqu’il accueille par vous nos prières,\ncelui qui, pour nous,\nvoulut être votre fils."},
 {o:"Virgo singularis,\ninter omnes mitis,\nnos culpis solutos\nmites fac et castos.",
  fr:"Vierge sans égale,\ndouce entre toutes,\ndélivrés de nos fautes,\nrendez-nous doux et chastes."},
 {o:"Vitam præsta puram,\niter para tutum,\nut videntes Iesum\nsemper collætemur.",
  fr:"Accordez-nous une vie innocente,\nrendez nos voies sûres,\nafin que, voyant Jésus,\nnous goûtions avec vous les joies éternelles."},
 {o:"Sit laus Deo Patri,\nsummo Christo decus,\nSpiritui Sancto,\ntribus honor unus. Amen.",
  fr:"Louange à Dieu le Père,\ngloire au Christ Roi,\net à l’Esprit-Saint :\nhonneur égal aux Trois. Amen !"}],
 note:"Hymne du VIIIᵉ ou IXᵉ siècle, chantée aux vêpres des fêtes de la Vierge, dont la deuxième strophe renferme le célèbre jeu de mots des Pères : l’Ave de Gabriel retourne le nom d’Eva. C’est l’hymne qui a donné son nom à cette application."},

/* ---------- À NOTRE-SEIGNEUR JÉSUS-CHRIST : PRIÈRES EUCHARISTIQUES ---------- */
{id:"anima_christi",cat:"À Notre-Seigneur Jésus-Christ",t:"Âme du Christ",tl:"Anima Christi",lang:"la",
 secs:[
 {o:"Anima Christi, sanctifica me.\nCorpus Christi, salva me.\nSanguis Christi, inebria me.\nAqua lateris Christi, lava me.",
  fr:"Âme du Christ, sanctifie-moi.\nCorps du Christ, sauve-moi.\nSang du Christ, enivre-moi.\nEau du côté du Christ, lave-moi."},
 {o:"Passio Christi, conforta me.\nO bone Iesu, exaudi me.\nIntra tua vulnera absconde me.\nNe permittas me separari a te.",
  fr:"Passion du Christ, fortifie-moi.\nÔ bon Jésus, exauce-moi.\nDans tes blessures, cache-moi.\nNe permets pas que je sois séparé de toi."},
 {o:"Ab hoste maligno defende me.\nIn hora mortis meæ voca me.\nEt iube me venire ad te,\nut cum Sanctis tuis laudem te\nin sæcula sæculorum. Amen.",
  fr:"De l’ennemi perfide, défends-moi.\nÀ l’heure de ma mort, appelle-moi.\nOrdonne-moi de venir à toi,\npour qu’avec tes saints je te loue,\ntoi, dans les siècles des siècles. Amen."}],
 note:"Prière d’action de grâces après la communion, du XIVᵉ siècle, antérieure à saint Ignace de Loyola qui l’aimait au point de la placer en tête des Exercices spirituels — ce qui la lui fit longtemps attribuer."},

{id:"adoro_te",cat:"À Notre-Seigneur Jésus-Christ",t:"Adoro te devote",tl:"Adoro te devote",lang:"la",
 secs:[
 {o:"Adoro te devote, latens Deitas,\nquæ sub his figuris vere latitas :\ntibi se cor meum totum subiicit,\nquia te contemplans totum deficit.",
  fr:"Je t’adore dévotement, Dieu caché,\nqui sous ces apparences vraiment prends corps.\nÀ toi, mon cœur tout entier se soumet,\nparce qu’à te contempler, tout entier il s’abandonne."},
 {o:"Visus, tactus, gustus in te fallitur,\nsed auditu solo tuto creditur :\ncredo quidquid dixit Dei Filius :\nnil hoc verbo veritatis verius.",
  fr:"La vue, le goût, le toucher, en toi font ici défaut,\nmais t’écouter seulement fonde la certitude de foi.\nJe crois tout ce qu’a dit le Fils de Dieu :\nil n’est rien de plus vrai que cette Parole de vérité."},
 {o:"In cruce latebat sola Deitas,\nat hic latet simul et humanitas :\nambo tamen credens atque confitens,\npeto quod petivit latro pœnitens.",
  fr:"Sur la Croix se cachait ta seule divinité,\nmais ici, en même temps, se cache aussi ton humanité.\nToutes les deux, cependant, je les crois et les confesse,\nje demande ce qu’a demandé le larron pénitent."},
 {o:"Plagas, sicut Thomas, non intueor :\nDeum tamen meum te confiteor :\nfac me tibi semper magis credere,\nin te spem habere, te diligere.",
  fr:"Tes plaies, tel Thomas, moi je ne les vois pas,\nmon Dieu, cependant, tu l’es, je le confesse.\nFais que, toujours davantage, en toi je croie,\nje place mon espérance, je t’aime."},
 {o:"O memoriale mortis Domini,\npanis vivus, vitam præstans homini,\npræsta meæ menti de te vivere,\net te illi semper dulce sapere.",
  fr:"Ô mémorial de la mort du Seigneur,\npain vivant qui procure la vie à l’homme,\nprocure à mon esprit de vivre de toi\net de toujours savourer ta douceur."},
 {o:"Pie pellicane, Iesu Domine,\nme immundum munda tuo sanguine :\ncuius una stilla salvum facere\ntotum mundum quit ab omni scelere.",
  fr:"Pieux pélican, Jésus mon Seigneur,\nmoi qui suis impur, purifie-moi par ton sang,\ndont une seule goutte aurait suffi à sauver\nle monde entier de toute faute."},
 {o:"Iesu, quem velatum nunc aspicio,\noro fiat illud quod tam sitio :\nut te revelata cernens facie,\nvisu sim beatus tuæ gloriæ. Amen.",
  fr:"Jésus, que sous un voile, à présent, je regarde,\nje t’en prie, que se réalise ce dont j’ai tant soif :\nte contempler, la face dévoilée,\nque je sois bienheureux, à la vue de ta Gloire. Amen."}],
 note:"Hymne eucharistique attribuée à saint Thomas d’Aquin, prière d’adoration devant le Dieu caché. La strophe du pélican reprend le vieux symbole du Christ nourrissant les siens de son propre sang."},

{id:"pange_lingua",cat:"À Notre-Seigneur Jésus-Christ",t:"Pange lingua",tl:"Pange lingua gloriosi",lang:"la",
 secs:[
 {o:"Pange, lingua, gloriosi\ncorporis mysterium,\nsanguinisque pretiosi,\nquem in mundi pretium\nfructus ventris generosi\nRex effudit gentium.",
  fr:"Chante, ô ma langue, le mystère\nde ce corps très glorieux\net de ce sang si précieux\nque le Roi des nations,\nissu d’une noble lignée,\nversa pour le prix de ce monde."},
 {o:"Nobis datus, nobis natus\nex intacta Virgine,\net in mundo conversatus,\nsparso verbi semine,\nsui moras incolatus\nmiro clausit ordine.",
  fr:"Fils d’une mère toujours vierge,\nné pour nous, à nous donné,\net dans ce monde ayant vécu,\nverbe en semence semé,\nil conclut son temps d’ici-bas\npar une action incomparable :"},
 {o:"In supremæ nocte cœnæ\nrecumbens cum fratribus,\nobservata lege plene\ncibis in legalibus,\ncibum turbæ duodenæ\nse dat suis manibus.",
  fr:"La nuit de la dernière Cène,\nà table avec ses amis,\nayant pleinement observé\nla Pâque selon la loi,\nde ses propres mains il s’offrit\nen nourriture aux douze Apôtres."},
 {o:"Verbum caro panem verum\nverbo carnem efficit,\nfitque sanguis Christi merum ;\net, si sensus deficit,\nad firmandum cor sincerum\nsola fides sufficit.",
  fr:"Le Verbe fait chair, par son verbe,\nfait de sa chair le vrai pain ;\nle sang du Christ devient boisson ;\nnos sens étant limités,\nc’est la foi seule qui suffit\npour affermir les cœurs sincères."},
 {o:"Tantum ergo sacramentum\nveneremur cernui,\net antiquum documentum\nnovo cedat ritui ;\npræstet fides supplementum\nsensuum defectui.",
  fr:"Il est si grand, ce sacrement !\nAdorons-le, prosternés.\nQue s’effacent les anciens rites\ndevant le culte nouveau !\nQue la foi vienne suppléer\naux faiblesses de nos sens !"},
 {o:"Genitori Genitoque\nlaus et iubilatio,\nsalus, honor, virtus quoque\nsit et benedictio ;\nprocedenti ab utroque\ncompar sit laudatio. Amen.",
  fr:"Au Père et au Fils qu’il engendre,\nlouange et joie débordante,\nsalut, honneur, toute-puissance\net toujours bénédiction !\nÀ l’Esprit qui des deux procède\nsoit rendue même louange. Amen."}],
 note:"Hymne composée par saint Thomas d’Aquin pour la Fête-Dieu (1264), chantée aux vêpres du Saint-Sacrement et à la procession du Jeudi saint. Ses deux dernières strophes forment le Tantum ergo du salut eucharistique."},

{id:"tantum_ergo",cat:"À Notre-Seigneur Jésus-Christ",t:"Tantum ergo",tl:"Tantum ergo sacramentum",lang:"la",
 secs:[
 {o:"Tantum ergo sacramentum\nveneremur cernui,\net antiquum documentum\nnovo cedat ritui ;\npræstet fides supplementum\nsensuum defectui.",
  fr:"Adorons donc, prosternés,\nun si grand sacrement ;\nque l’ancien rite\ncède la place à ce nouveau mystère :\nque la foi supplée\nà la faiblesse de nos sens."},
 {o:"Genitori Genitoque\nlaus et iubilatio,\nsalus, honor, virtus quoque\nsit et benedictio ;\nprocedenti ab utroque\ncompar sit laudatio. Amen.",
  fr:"Qu’au Père et au Fils\nsoient honneur et louange, salut,\ngloire, puissance et bénédiction :\nmême hommage à Celui\nqui procède de l’un et de l’autre. Amen."}],
 note:"Les deux dernières strophes du Pange lingua, chantées au salut du Saint-Sacrement au moment de la bénédiction. La traduction donnée ici, plus littérale, diffère de celle du Pange lingua complet : les deux circulent dans les livres."}
);

{id:"lit_lorette",cat:"Litanies",t:"Litanies de Lorette",tl:"Litaniæ Lauretanæ",lang:null,lit:true,
 secs:[
 {fr:"Seigneur, prends pitié.\nÔ Christ, prends pitié.\nSeigneur, prends pitié.\nChrist, écoute-nous.\nChrist, écoute-nous."},
 {fr:"Père du Ciel, toi qui es Dieu,\naie pitié de nous.\nFils, Rédempteur du monde, toi qui es Dieu,\nEsprit Saint, toi qui es Dieu,\nTrinité sainte, toi qui es un seul Dieu,"},
 {fr:"Sainte Marie,\nprie pour nous.\nSainte Mère de Dieu,\nSainte Vierge des vierges,\nMère du Christ,\nMère de l’Église,\nMère de Miséricorde,\nMère de la grâce divine,\nMère de l’Espérance,\nMère très pure,\nMère très chaste,\nMère toujours vierge,\nMère sans tache,\nMère très aimable,\nMère admirable,\nMère du bon conseil,\nMère du Créateur,\nMère du Sauveur,\nMère très prudente,\nMère digne d’honneur,\nMère digne de louange,"},
 {fr:"Vierge puissante,\nVierge clémente,\nVierge fidèle,\nMiroir de la sainteté divine,\nSiège de la Sagesse,\nCause de notre joie,\nTemple de l’Esprit Saint,\nTabernacle de la gloire éternelle,\nDemeure toute consacrée à Dieu,\nRose mystique,\nTour de David,\nTour d’ivoire,\nMaison d’or,\nArche d’alliance,\nPorte du ciel,\nÉtoile du matin,\nSalut des malades,\nRefuge des pécheurs,\nRéconfort des Migrants,\nConsolatrice des affligés,\nSecours des chrétiens,"},
 {fr:"Reine des Anges,\nReine des Patriarches,\nReine des Prophètes,\nReine des Apôtres,\nReine des Martyrs,\nReine des Confesseurs,\nReine des Vierges,\nReine de tous les Saints,\nReine conçue sans le péché originel,\nReine élevée au ciel,\nReine du Saint Rosaire,\nReine de la famille,\nReine de la paix."},
 {fr:"Agneau de Dieu, qui enlèves le péché du monde,\npardonne-nous, Seigneur.\nAgneau de Dieu, qui enlèves le péché du monde,\nécoute-nous, Seigneur.\nAgneau de Dieu, qui enlèves le péché du monde,\naie pitié de nous, Seigneur."},
 {fr:"℣. Prie pour nous, Sainte Mère de Dieu,\n℟. afin que nous devenions dignes des promesses du Christ."},
 {fr:"Prions. Accorde à tes fidèles, Seigneur notre Dieu, de bénéficier de la santé de l’âme et du corps ; par la glorieuse intercession de la bienheureuse Marie toujours vierge, délivre-nous des tristesses du temps présent et conduis-nous au bonheur éternel. Par Jésus, le Christ, notre Seigneur. Amen."}],
 note:"Nées au sanctuaire de Lorette et approuvées par Sixte Quint en 1587, ce sont les litanies mariales de l’Église latine, chantées aux saluts et processions. Le texte inclut les trois invocations ajoutées en 2020 — Mère de Miséricorde, Mère de l’Espérance, Réconfort des Migrants — chacune à la place fixée par la Congrégation pour le culte divin."},

{id:"lit_saints",cat:"Litanies",t:"Litanie des Saints",tl:"Litaniæ Sanctorum",lang:null,lit:true,
 secs:[
 {fr:"Seigneur, prends pitié. Seigneur, prends pitié.\nÔ Christ, prends pitié. Ô Christ, prends pitié.\nSeigneur, prends pitié. Seigneur, prends pitié."},
 {fr:"Sainte Marie,\npriez pour nous.\nSainte Mère de Dieu,\nSainte Vierge des vierges,"},
 {fr:"Saints Michel, Gabriel et Raphaël,\npriez pour nous.\nVous tous, saints anges de Dieu,"},
 {fr:"Saint Abraham,\npriez pour nous.\nSaint Isaac et saint Jacob,\nSaint Joseph,\nSaint Moïse,\nSaint David,\nSaint Job,\nSaint Isaïe et saint Jérémie,\nSaint Élie et saint Élisée,\nSaint Jean-Baptiste,\nSaint Joseph, époux de Marie,\nVous tous, saints patriarches et saints prophètes,"},
 {fr:"Saint Pierre et saint Paul,\npriez pour nous.\nSaint André,\nSaint Jean et saint Jacques,\nSaint Thomas,\nSaint Matthieu,\nVous tous, saints apôtres,\nSaint Luc et saint Marc,\nSaint Barnabé,\nSainte Marie-Madeleine,\nVous tous, saints disciples du Seigneur,"},
 {fr:"Saint Étienne,\npriez pour nous.\nSaint Ignace d’Antioche,\nSaint Polycarpe de Smyrne,\nSaint Justin,\nSaint Pothin et sainte Blandine,\nSaint Irénée de Lyon,\nSainte Perpétue et sainte Félicité,\nSaint Laurent,\nSaint Cyprien de Carthage,\nSainte Agnès,\nSaint Thomas Becket,\nSaint Thomas More,\nSainte Maria Goretti,\nSaint Maximilien Kolbe,\nVous tous, saints martyrs,"},
 {fr:"Saint Léon le Grand,\npriez pour nous.\nSaint Grégoire le Grand,\nSaint Ambroise de Milan,\nSaint Jérôme,\nSaint Augustin,\nSaint Athanase d’Alexandrie,\nSaint Basile le Grand,\nSaint Grégoire de Nazianze,\nSaint Jean Chrysostome,\nSaint Hilaire de Poitiers,\nSaint Martin de Tours,\nSaint François de Sales,\nSaint Pie X,\nVous tous, saints évêques et saints docteurs,"},
 {fr:"Saint Antoine d’Égypte,\npriez pour nous.\nSaint Benoît,\nSaint Bernard,\nSaint François d’Assise,\nSaint Antoine de Padoue,\nSaint Dominique,\nSaint Thomas d’Aquin,\nSainte Catherine de Sienne,\nSaint Ignace de Loyola,\nSaint François Xavier,\nSainte Thérèse d’Avila,\nSaint Jean de la Croix,\nSainte Rose de Lima,\nSaint Vincent de Paul,\nSaint Jean-Marie Vianney,\nSainte Bernadette Soubirous,\nSaint Jean Bosco,\nSainte Thérèse de l’Enfant-Jésus,\nVous tous, saints prêtres, religieux ou religieuses,"},
 {fr:"Sainte Anne, mère de Marie,\npriez pour nous.\nSainte Monique,\nSaint Louis de France,\nSaint Nicolas de Flüe,\nSainte Élisabeth de Hongrie,\nSainte Jeanne d’Arc,\nVous tous, saints et saintes de Dieu,"},
 {fr:"Agneau de Dieu, qui enlèves les péchés du monde,\npardonne-nous, Seigneur.\nAgneau de Dieu, qui enlèves les péchés du monde,\nexauce-nous, Seigneur.\nAgneau de Dieu, qui enlèves les péchés du monde,\naie pitié de nous, Seigneur."},
 {fr:"Prions. Père très Saint, tu le sais : sans ton aide, nous sommes tous de pauvres pécheurs. Cependant, pleins de confiance dans les mérites de ton Fils et de ses saints, nous te prions de nous rendre dignes dès aujourd’hui du royaume céleste que tu nous as préparé depuis la fondation du monde. Amen."}],
 note:"La plus ancienne litanie de l’Église, attestée dès les processions romaines du VIIᵉ siècle : l’Église de la terre appelle celle du ciel, rang par rang. La forme liturgique complète se chante à la Vigile pascale, aux ordinations et aux consécrations ; celle donnée ici est une forme commune d’usage."},

{id:"lit_joseph2",cat:"Litanies",t:"Litanies de saint Joseph",tl:null,lang:null,lit:true,
 secs:[
 {fr:"Seigneur, ayez pitié de nous.\nJésus-Christ, ayez pitié de nous.\nSeigneur, ayez pitié de nous.\nJésus-Christ, écoutez-nous.\nJésus-Christ, exaucez-nous."},
 {fr:"Père céleste qui êtes Dieu,\nayez pitié de nous.\nFils rédempteur du monde qui êtes Dieu,\nEsprit-Saint qui êtes Dieu,\nTrinité sainte qui êtes un seul Dieu,"},
 {fr:"Sainte Marie, Reine de tout le monde,\npriez pour nous.\nSaint Joseph, époux de la Vierge Marie,\nSaint Joseph qui avez été justifié avant votre naissance,\nSaint Joseph qui avez été exempt du péché mortel,\nSaint Joseph qui avez été affermi en grâce,\nSaint Joseph, le sommet des Patriarches,\nSaint Joseph qui avez été choisi entre tous pour être l’époux de la sainte Vierge,\nSaint Joseph qui avez été comblé de bénédictions ineffables,\nSaint Joseph que la Reine du ciel a servi,\nSaint Joseph qui avez été appelé père de Jésus-Christ,\nSaint Joseph, tuteur zélé de Jésus-Christ,\nSaint Joseph, nourricier très fidèle de Jésus-Christ,\nSaint Joseph qui le premier après la sainte Vierge avez adoré Jésus-Christ,\nSaint Joseph qui avez garanti Jésus-Christ de la cruauté d’Hérode,\nSaint Joseph qui n’avez point voulu déshonorer la sainte Vierge,\nSaint Joseph qui avez été très cher à Jésus-Christ et à sa Mère,\nSaint Joseph qui avez été rempli en abondance des dons du Saint-Esprit,"},
 {fr:"Saint Joseph, homme angélique,\npriez pour nous.\nSaint Joseph qui, selon l’avis de l’Ange, avez pris soin de conserver Jésus-Christ,\nSaint Joseph qui avez porté comme un Ange les ordres de Dieu,\nSaint Joseph qui, comme une des Principautés célestes, avez conduit Jésus-Christ, l’Ange du grand conseil,\nSaint Joseph qui, comme les Vertus célestes, avez servi Jésus-Christ,\nSaint Joseph, plus grand que les Dominations, qui avez été servi par le Roi et par la Reine du ciel,\nSaint Joseph, entre les bras et sur le sein duquel Jésus-Christ s’est reposé comme sur un trône,\nSaint Joseph qui, comme un Chérubin du paradis, avez eu la garde de la sainte Vierge,\nSaint Joseph, homme séraphique,\nSaint Joseph, très sublime contemplatif,\nSaint Joseph qui avez expiré entre les bras de Jésus-Christ,\nSaint Joseph qui avez entendu les concerts des Anges,\nSaint Joseph qui avez été le précurseur de Jésus-Christ aux limbes,\nSaint Joseph qui êtes ressuscité avec Jésus-Christ comme les autres patriarches,\nSaint Joseph jouissant d’une manière toute particulière de la gloire du ciel,\nSaint Joseph, notre cher protecteur et défenseur,"},
 {fr:"Par la Passion de votre cher Fils,\nSeigneur, exaucez votre peuple.\nPar la virginité de la bien-aimée Mère de votre Fils,\nSeigneur, sauvez votre peuple.\nPar la fidélité de saint Joseph,\nSeigneur, protégez votre peuple."},
 {fr:"Agneau de Dieu, qui effacez les péchés du monde,\npardonnez-nous, Seigneur.\nAgneau de Dieu, qui effacez les péchés du monde,\nexaucez-nous, Seigneur.\nAgneau de Dieu, qui effacez les péchés du monde,\nayez pitié de nous.\nSeigneur, ayez pitié de nous.\nJésus-Christ, ayez pitié de nous.\nSeigneur, ayez pitié de nous."},
 {fr:"℣. Priez pour nous, bienheureux saint Joseph,\n℟. afin que nous devenions dignes des promesses de Jésus-Christ."},
 {fr:"Prions. Dieu tout-puissant et miséricordieux, qui avez choisi Joseph, fils de David, pour être l’époux de la bienheureuse Vierge Marie votre Mère, et votre nourricier, faites, s’il vous plaît, que, par ses prières et par son intercession, votre Église jouisse d’une profonde paix, et parvienne à la joie de votre Présence éternelle. Ô Dieu qui vivez et régnez dans tous les siècles des siècles. Ainsi soit-il."}],
 note:"Litanies anciennes de dévotion à saint Joseph, d’un lyrisme qui le compare rang après rang aux neuf chœurs des anges. Elles sont distinctes des litanies approuvées pour la liturgie en 1909, enrichies de sept invocations par le Saint-Siège en 2021, qui pourront rejoindre ce trésor."}
);

/* --- Miserere : apparier le latin fourni aux dix strophes françaises --- */
(function(){
  const p=PRIERES.find(x=>x.id==="miserere");if(!p)return;
  const LA=[
  "Miserere mei, Deus : secundum magnam misericordiam tuam.\nEt secundum multitudinem miserationum tuarum,\ndele iniquitatem meam.\nAmplius lava me ab iniquitate mea :\net a peccato meo munda me.",
  "Quoniam iniquitatem meam ego cognosco :\net peccatum meum contra me est semper.\nTibi soli peccavi, et malum coram te feci :",
  "ut justificeris in sermonibus tuis,\net vincas cum judicaris.\nEcce enim in iniquitatibus conceptus sum :\net in peccatis concepit me mater mea.",
  "Ecce enim veritatem dilexisti :\nincerta et occulta sapientiæ tuæ manifestasti mihi.\nAsperges me hyssopo, et mundabor :\nlavabis me, et super nivem dealbabor.",
  "Auditui meo dabis gaudium et lætitiam :\net exsultabunt ossa humiliata.\nAverte faciem tuam a peccatis meis :\net omnes iniquitates meas dele.",
  "Cor mundum crea in me, Deus :\net spiritum rectum innova in visceribus meis.\nNe proiicias me a facie tua :\net spiritum sanctum tuum ne auferas a me.",
  "Redde mihi lætitiam salutaris tui :\net spiritu principali confirma me.\nDocebo iniquos vias tuas :\net impii ad te convertentur.",
  "Libera me de sanguinibus, Deus, Deus salutis meæ :\net exsultabit lingua mea justitiam tuam.\nDomine, labia mea aperies :\net os meum annuntiabit laudem tuam.",
  "Quoniam si voluisses sacrificium, dedissem utique :\nholocaustis non delectaberis.\nSacrificium Deo spiritus contribulatus :\ncor contritum, et humiliatum, Deus, non despicies.",
  "Benigne fac, Domine, in bona voluntate tua Sion :\nut ædificentur muri Ierusalem.\nTunc acceptabis sacrificium justitiæ,\noblationes, et holocausta :\ntunc imponent super altare tuum vitulos."];
  LA.forEach((o,i)=>{if(p.secs[i])p.secs[i].o=o;});
  p.lang="la";
  p.note="Le grand psaume pénitentiel, prière de David après sa faute, que l’Église redit chaque vendredi aux laudes. Latin de la Vulgate clémentine (psautier gallican) ; français du psautier liturgique. Un verset est réparti sur deux strophes à sa césure, pour suivre l’appariement du français.";
})();

    nunc_dimittis:["Nunc dimittis","Cantique de Syméon"],
    angele_dei:["Angele Dei","Ange de Dieu"],
    totus_tuus:["Totus tuus",null]
  };
  PRIERES.forEach(p=>{const m=T[p.id];if(m){p.t=m[0];p.tl=m[1];}});
})();

/* =================== TRÉSOR DES PRIÈRES — interface =================== */
const P_store={get k(){try{return localStorage.getItem("sm_pr_mode")}catch(e){return null}},
  set k(v){try{localStorage.setItem("sm_pr_mode",v)}catch(e){}}};
const P_state={mode:(P_store.k==="la"?"duo":P_store.k)||"duo",id:null,filter:""};
const P_favs={
  get(){try{return JSON.parse(localStorage.getItem("sm_pr_favs")||"[]")}catch(e){return[]}},
  set(a){try{localStorage.setItem("sm_pr_favs",JSON.stringify(a))}catch(e){}},
  has(id){return this.get().includes(id)},
  toggle(id){const a=this.get(),i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);this.set(a);return i<0;},
  move(id,d){const a=this.get(),i=a.indexOf(id),j=i+d;
    if(i<0||j<0||j>=a.length)return;a.splice(i,1);a.splice(j,0,id);this.set(a);}
};

function prOrdered(){
  const out=[];
  PR_CATS.forEach(c=>PRIERES.forEach(p=>{if(p.cat===c)out.push(p);}));
  PRIERES.forEach(p=>{if(!PR_CATS.includes(p.cat))out.push(p);});
  return out;
}
function prMatch(p,q){
  if(!q)return true;
  const n=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  q=n(q);
  return n(p.t).includes(q)||n(p.tl).includes(q)||n(p.cat).includes(q);
}

function prIndex(){
  APP.swipe=null;APP.lock(false);
  if(typeof state!=="undefined")state.flow=[];
  const stagesEl=document.getElementById("stages"),topEl=document.getElementById("top");
  document.getElementById("editor").classList.remove("show");
  updateProg();
  topEl.innerHTML="";topEl.classList.add("on-dark");
  const hb=el(`<button>‹ Accueil</button>`);hb.onclick=e=>{e.stopPropagation();showHub();};topEl.appendChild(hb);
  stagesEl.innerHTML="";
  const stage=el(`<div class="stage dark show" style="justify-content:flex-start;padding-top:calc(env(safe-area-inset-top,0px) + 4.2rem)">
    <div class="pr-wrap">
      <div class="eyebrow">Prières</div>
      <input class="pr-search" type="search" placeholder="Chercher une prière…" value="${esc(P_state.filter)}">
      <div class="pr-index"></div>
    </div></div>`);
  const list=stage.querySelector(".pr-index");
  const input=stage.querySelector(".pr-search");
  const inf=LIT.infos();
  const today=el(`<div class="pr-today"><div class="pr-today-t">Aujourd’hui — ${esc(inf.temps)}</div><div class="pr-chips"></div></div>`);
  const chips=today.querySelector(".pr-chips");
  const chip=(id,lbl)=>{const p=PRIERES.find(x=>x.id===id);if(!p)return;
    const b=el(`<button>${esc(lbl||p.t)}</button>`);b.onclick=e=>{e.stopPropagation();prDetail(id);};chips.appendChild(b);};
  if(inf.antienne)chip(inf.antienne);
  chip(inf.midi,inf.midi==="angelus"?"Angélus":null);
  if(!inf.antienne)today.querySelector(".pr-today-t").textContent+=" — l’Église se tait avec son Seigneur";
  stage.querySelector(".pr-wrap").insertBefore(today,stage.querySelector(".pr-search"));
  const build=()=>{
    list.innerHTML="";let shown=0;
    const favs=P_favs.get().filter(id=>PRIERES.some(p=>p.id===id&&prMatch(p,P_state.filter)));
    if(favs.length){
      list.appendChild(el(`<div class="pr-cat">Mes prières</div>`));
      favs.forEach((id,k)=>{const p=PRIERES.find(x=>x.id===id);
        const row=el(`<div class="pr-row fav"><span class="fv-t"><span class="t">${esc(p.t)}</span>${p.tl?`<span class="tl">${esc(p.tl)}</span>`:""}</span><span class="ord"></span></div>`);
        row.onclick=e=>{e.stopPropagation();prDetail(p.id);};
        const ord=row.querySelector(".ord");
        const mk=(sym,d,off)=>{const b=el(`<button title="Déplacer">${sym}</button>`);
          if(off)b.disabled=true;
          b.onclick=e=>{e.stopPropagation();P_favs.move(id,d);build();};ord.appendChild(b);};
        mk("▴",-1,k===0);mk("▾",1,k===favs.length-1);
        list.appendChild(row);shown++;});
    }
    PR_CATS.forEach(cat=>{
      const items=PRIERES.filter(p=>p.cat===cat&&prMatch(p,P_state.filter));
      if(!items.length)return;
      list.appendChild(el(`<div class="pr-cat">${esc(cat)}</div>`));
      items.forEach(p=>{
        const row=el(`<button class="pr-row"><span class="t">${esc(p.t)}</span>${p.tl?`<span class="tl">${esc(p.tl)}</span>`:""}</button>`);
        row.onclick=e=>{e.stopPropagation();prDetail(p.id);};
        list.appendChild(row);shown++;
      });
    });
    if(!shown)list.appendChild(el(`<div class="pr-empty">Aucune prière ne répond à cette recherche.</div>`));
  };
  input.addEventListener("input",()=>{P_state.filter=input.value;build();});
  build();
  stagesEl.appendChild(stage);
}

function prSecHTML(p,s){
  let dm=P_state.mode; const hasO=!!s.o;
  if(hasO&&!s.fr)dm="la";
  let h=`<div class="pr-sec ${dm==="duo"&&hasO?"duo":"only"}${p.lit?" lit":""}">`;
  if(hasO&&dm!=="fr")h+=`<div class="pr-la">${esc(s.o).replace(/\n/g,"<br>")}${s.tr&&dm!=="fr"?`<span class="pr-vr" style="margin-top:.35rem">${esc(s.tr)}</span>`:""}</div>`;
  if(s.fr&&(dm!=="la"||!hasO))h+=`<div class="pr-fr">${esc(s.fr).replace(/\n/g,"<br>")}</div>`;
  return h+"</div>";
}

function prDetail(id){
  const flat=prOrdered().filter(p=>prMatch(p,""));
  const i=flat.findIndex(p=>p.id===id);
  const p=flat[i];if(!p)return prIndex();
  P_state.id=id;
  const stagesEl=document.getElementById("stages"),topEl=document.getElementById("top");
  topEl.innerHTML="";topEl.classList.add("on-dark");
  const hb=el(`<button>‹ Prières</button>`);hb.onclick=e=>{e.stopPropagation();prIndex();};topEl.appendChild(hb);
  const sp=el(`<div style="flex:1"></div>`);topEl.appendChild(sp);
  const cat=el(`<div style="font-family:var(--label);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sub);padding:.85rem .2rem">${esc(p.cat)}</div>`);
  topEl.appendChild(cat);
  const hasO=p.secs.some(s=>s.o);
  const hasFR=p.secs.some(s=>s.fr);
  const stage=el(`<div class="stage dark show" style="justify-content:flex-start;padding-top:calc(env(safe-area-inset-top,0px) + 4.4rem)">
    <div class="pr-wrap">
      <div class="pr-titlewrap"><div class="pr-title">${esc(p.t)}</div>
        <button class="pr-fav ${P_favs.has(p.id)?"on":""}" title="Mes prières">${P_favs.has(p.id)?"★":"☆"}</button></div>
      ${p.tl?`<div class="pr-subtitle">${esc(p.tl)}</div>`:""}
      ${hasO&&hasFR?`<div class="pr-modes">
        <button data-m="fr">Français</button>
        <button data-m="duo">Bilingue</button></div>`:""}
      <div class="pr-scroll"></div>
      <div class="pr-nav">
        <button class="pv">‹ ${i>0?esc(flat[i-1].t):""}</button>
        <button class="nx">${i<flat.length-1?esc(flat[i+1].t):""} ›</button>
      </div>
    </div></div>`);
  const scroll=stage.querySelector(".pr-scroll");
  const render=()=>{
    scroll.innerHTML=p.secs.map(s=>prSecHTML(p,s)).join("")+(p.note?`<div class="pr-note">${esc(p.note)}</div>`:"");
    if(hasO&&hasFR)stage.querySelectorAll(".pr-modes button").forEach(b=>b.classList.toggle("on",b.dataset.m===P_state.mode));
  };
  if(hasO&&hasFR)stage.querySelectorAll(".pr-modes button").forEach(b=>b.onclick=e=>{
    e.stopPropagation();P_state.mode=b.dataset.m;P_store.k=P_state.mode;render();
  });
  const go=d=>{const j=i+d;if(j>=0&&j<flat.length)prDetail(flat[j].id);};
  const favBtn=stage.querySelector(".pr-fav");
  favBtn.onclick=e=>{e.stopPropagation();const on=P_favs.toggle(p.id);
    favBtn.classList.toggle("on",on);favBtn.textContent=on?"★":"☆";
    toast(on?"Ajoutée à « Mes prières »":"Retirée de « Mes prières »");};
  stage.querySelector(".pv").onclick=e=>{e.stopPropagation();go(-1);};
  stage.querySelector(".nx").onclick=e=>{e.stopPropagation();go(1);};
  if(i===0)stage.querySelector(".pv").style.visibility="hidden";
  if(i===flat.length-1)stage.querySelector(".nx").style.visibility="hidden";
  render();
  stagesEl.innerHTML="";stagesEl.appendChild(stage);
  APP.swipe=d=>go(d);
}

/* clavier : navigation dans la fiche */
document.addEventListener("keydown",e=>{
  if(!P_state.id||!document.querySelector(".pr-scroll"))return;
  if(document.activeElement&&document.activeElement.tagName==="INPUT")return;
  if(e.key==="ArrowRight"||e.key==="PageDown"){e.preventDefault();if(APP.swipe)APP.swipe(1);}
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();if(APP.swipe)APP.swipe(-1);}
  else if(e.key==="Escape"){e.preventDefault();P_state.id=null;prIndex();}
});

/* =================== CALENDRIER LITURGIQUE ===================
   Règles fixes du calendrier romain général :
   - comput pascal (algorithme de Butcher-Meeus) ;
   - 1er dimanche de l'Avent : dimanche entre le 27 novembre et le 3 décembre ;
   - Épiphanie (France) : dimanche entre le 2 et le 8 janvier ;
     Baptême du Seigneur : dimanche suivant, ou lundi si l'Épiphanie tombe le 7 ou le 8 ;
   - antiennes mariales : Alma Redemptoris (Avent → 2 février inclus),
     Ave Regina cælorum (3 février → mercredi saint), Regina cæli (Pâques → Pentecôte),
     Salve Regina (le reste de l'année) ; aucune pendant le Triduum ;
   - au temps pascal, le Regina cæli remplace l'Angélus. */
const LIT=(function(){
  const D=(y,m,j)=>new Date(y,m-1,j);
  const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
  const cmp=(a,b)=>D(a.getFullYear(),a.getMonth()+1,a.getDate())-D(b.getFullYear(),b.getMonth()+1,b.getDate());

  function paques(Y){
    const a=Y%19,b=Math.floor(Y/100),c=Y%100,d=Math.floor(b/4),e=b%4,
      f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
      i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,
      m=Math.floor((a+11*h+22*l)/451),
      mois=Math.floor((h+l-7*m+114)/31),jour=((h+l-7*m+114)%31)+1;
    return D(Y,mois,jour);
  }
  function dimancheDans(y,m,j1,j2){ // premier dimanche entre j1 et j2 (mois m)
    for(let j=j1;j<=j2;j++){const d=D(y,m,j);if(d.getDay()===0)return d;}
    return null;
  }
  function avent(Y){return dimancheDans(Y,11,27,30)||dimancheDans(Y,12,1,3);}
  function epiphanie(Y){return dimancheDans(Y,1,2,8);}
  function bapteme(Y){
    const e=epiphanie(Y);
    return (e.getDate()>=7)?add(e,1):add(e,7); // lundi si Épiphanie le 7 ou le 8
  }

  function infos(date){
    date=date||new Date();
    const Y=date.getFullYear();
    const P=paques(Y), cendres=add(P,-46), mercrSaint=add(P,-4),
      jeudiSaint=add(P,-3), pentecote=add(P,49),
      noel=D(Y,12,25), av=avent(Y), bapt=bapteme(Y), chandeleur=D(Y,2,2);
    const inRange=(d,a,b)=>cmp(d,a)>=0&&cmp(d,b)<=0;

    /* temps liturgique */
    let temps;
    if(inRange(date,av,D(Y,12,24)))temps="Avent";
    else if(cmp(date,noel)>=0)temps="Temps de Noël";
    else if(cmp(date,bapt)<=0)temps="Temps de Noël";
    else if(inRange(date,cendres,add(jeudiSaint,-1)))temps="Carême";
    else if(inRange(date,jeudiSaint,add(P,-1)))temps="Triduum pascal";
    else if(inRange(date,P,pentecote))temps="Temps pascal";
    else temps="Temps ordinaire";

    /* antienne mariale du temps */
    let antienne;
    if(temps==="Triduum pascal")antienne=null;
    else if(temps==="Avent"||temps==="Temps de Noël"||
            (cmp(date,bapt)>0&&cmp(date,chandeleur)<=0&&date.getMonth()<6))antienne="alma";
    else if(cmp(date,chandeleur)>0&&cmp(date,mercrSaint)<=0)antienne="ave_regina";
    else if(temps==="Temps pascal")antienne="regina_caeli";
    else antienne="salve";
    /* précision janvier-février : entre le Baptême et la Chandeleur, l'usage
       maintient l'Alma Redemptoris (le temps de Noël marial court jusqu'à la
       Présentation) — couvert ci-dessus ; ordinaire d'été/automne → Salve. */
    if(temps==="Temps ordinaire"&&date.getMonth()===0)antienne="alma";           // janvier après le Baptême
    if(temps==="Temps ordinaire"&&date.getMonth()===1&&date.getDate()<=2)antienne="alma"; // 1er-2 février

    /* prière de midi */
    const midi=(temps==="Temps pascal")?"regina_caeli":"angelus";
    return {temps,antienne,midi,paques:P,pentecote,avent:av,bapteme:bapt};
  }
  return {paques,avent,epiphanie,bapteme,infos};
})();


/* =================== NOYAU — hub & environnement =================== */
const APP={swipe:null,_noclick:0,_wl:null};

/* thème : jour par défaut, nuit en option */
APP.theme=function(t){
  if(!t){try{t=localStorage.getItem("sm_theme")||"jour"}catch(e){t="jour"}}
  document.body.classList.toggle("nuit",t==="nuit");
  try{localStorage.setItem("sm_theme",t)}catch(e){}
  const m=document.querySelector('meta[name="theme-color"]');
  if(m)m.content=(t==="nuit")?"#0d1830":"#f2ede2";
  return t;
};

APP.noClick=function(){return Date.now()<APP._noclick;};

/* verrouillage d'écran pendant la prière */
APP.lock=async function(on){
  try{
    if(on&&"wakeLock" in navigator){APP._wl=await navigator.wakeLock.request("screen");}
    else if(!on&&APP._wl){await APP._wl.release();APP._wl=null;}
  }catch(e){}
};
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"&&APP._wl!==null&&APP._wl&&APP._wl.released)APP.lock(true);
});

/* swipe global — délégué au module actif */
let _ts=null;
document.addEventListener("touchstart",e=>{
  if(e.touches.length!==1)return;
  _ts={x:e.touches[0].clientX,y:e.touches[0].clientY,t:Date.now()};
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!_ts)return;
  const c=e.changedTouches[0],dx=c.clientX-_ts.x,dy=c.clientY-_ts.y,dt=Date.now()-_ts.t;_ts=null;
  if(document.getElementById("editor").classList.contains("show"))return;
  if(Math.abs(dx)>64&&Math.abs(dx)>1.6*Math.abs(dy)&&dt<650){
    APP._noclick=Date.now()+420;
    if(APP.swipe)APP.swipe(dx<0?1:-1);
  }
},{passive:true});

/* historique : le geste « retour » du téléphone ramène au seuil */
APP.enterModule=function(name){ try{history.pushState({m:name},"");}catch(e){} };
window.addEventListener("popstate",()=>{ showHub(); });

/* progression */
function updateProg(){
  const p=document.getElementById("prog");
  const on=typeof state!=="undefined"&&state.flow&&state.flow.length>1;
  p.style.opacity=on?1:0;
  if(on)p.firstElementChild.style.width=(state.idx/(state.flow.length-1)*100)+"%";
}

/* =================== HUB =================== */
function showHub(){
  APP.swipe=null;APP.lock(false);
  if(typeof state!=="undefined")state.flow=[];
  const stagesEl=document.getElementById("stages"),topEl=document.getElementById("top");
  document.getElementById("editor").classList.remove("show");
  stagesEl.innerHTML="";topEl.innerHTML="";topEl.classList.remove("on-dark");
  updateProg();
  const day=DAY_NAMES[new Date().getDay()];
  const sugg=seriesByKey[DAY_SERIES[new Date().getDay()]].name.toLowerCase();
  const stage=el(`<div class="stage dark show"><div class="home-inner"></div></div>`);
  const inner=stage.querySelector(".home-inner");
  inner.appendChild(el(`<div style="display:flex;flex-direction:column;align-items:center;gap:.6rem"><div class="logo"></div><svg class="wave" viewBox="0 0 120 12" aria-hidden="true"><path d="M0 6 Q 7.5 0 15 6 T 30 6 T 45 6 T 60 6 T 75 6 T 90 6 T 105 6 T 120 6"/></svg><h1 class="brand">Stella Maris</h1></div>`));
  const inf=LIT.infos();
  const pAnt=inf.antienne?PRIERES.find(x=>x.id===inf.antienne):null;
  inner.appendChild(el(`<div class="today">Nous sommes ${day} — l’Église médite volontiers les <b>${sugg}</b>.${pAnt?`<br>${esc(inf.temps)} : l’antienne du soir est le <b>${esc(pAnt.t)}</b>.`:""}</div>`));
  const cards=el(`<div class="hub-cards"></div>`);
  const c1=el(`<button class="hub-card"><div class="hc-t">Le Saint Rosaire</div><div class="hc-s">Méditer les mystères, à l’école des saints</div><div class="hc-arrow">›</div></button>`);
  c1.onclick=()=>{APP.enterModule("rosaire");renderHome();};
  const c2=el(`<button class="hub-card"><div class="hc-t">Prières</div><div class="hc-s">Les grandes prières de l’Église, en latin et en français</div><div class="hc-arrow">›</div></button>`);
  c2.onclick=()=>{APP.enterModule("prieres");prIndex();};
  cards.appendChild(c1);cards.appendChild(c2);
  inner.appendChild(cards);
  const nuit=document.body.classList.contains("nuit");
  const tg=el(`<button class="theme-toggle">${nuit?"☀ Mode jour":"☾ Mode nuit"}</button>`);
  tg.onclick=e=>{e.stopPropagation();APP.theme(nuit?"jour":"nuit");showHub();};
  inner.appendChild(tg);
  stagesEl.appendChild(stage);
}

APP.theme();
showHub();
</script>
